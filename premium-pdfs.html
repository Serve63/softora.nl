<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f1;
  --panel: #ffffff;
  --preview-bg: #e8e6e1;
  --crimson: #9b2355;
  --border: #e0ddd8;
  --text: #1a1a2e;
  --muted: #888;
  --light: #bbb;
  --input-bg: #faf9f7;
  --preview-scale: 1;
  --a4-width: 595px;
  --a4-height: 842px;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.dashboard-layout { display: flex; min-height: 100vh; }
.main-content {
  flex: 1;
  margin-left: 280px;
  width: calc(100% - 280px);
  min-height: 100vh;
  min-width: 0;
  padding: 0 !important;
  overflow: hidden;
}
.pdf-builder-shell {
  display: flex;
  flex-direction: column;
  width: 100%;
  min-width: 0;
  min-height: 100vh;
  max-height: 100vh;
}

.dashboard-layout[data-sidebar-shell="canonical"] > .main-content {
  padding: 0 !important;
}

/* -- TOP BAR -- */
.topbar {
  height: 56px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 24px;
  flex-shrink: 0;
}
.topbar-logo {
  font-family: 'Oswald', sans-serif;
  font-size: 0.96rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--crimson);
  text-transform: uppercase;
  margin-right: 8px;
}
.doc-tabs { display: flex; gap: 2px; }
.doc-tab {
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 6px 16px;
  border-radius: 4px;
  cursor: pointer;
  color: var(--muted);
  border: none; background: none;
  transition: all .15s;
}
.doc-tab:hover { color: var(--text); background: var(--bg); }
.doc-tab.active { color: var(--crimson); background: rgba(155,35,85,.07); font-weight: 600; }

.topbar-right { margin-left: auto; }
.btn-dl {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 20px;
  background: var(--crimson); color: #fff;
  border: none; border-radius: 5px;
  font-family: 'Oswald', sans-serif;
  font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: opacity .15s;
}
.btn-dl:hover { opacity: .88; }
.btn-dl svg { width: 13px; height: 13px; }

/* -- SPLIT -- */
.split { display: flex; flex: 1; overflow: hidden; min-width: 0; min-height: 0; }

/* -- FORM PANEL -- */
.form-panel {
  width: clamp(280px, 30vw, 340px);
  min-width: 280px;
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 28px 24px 40px;
  min-height: 0;
}

.section-title {
  font-family: 'Oswald', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--light);
  margin: 24px 0 12px;
}
.section-title:first-child { margin-top: 0; }

.field {
  margin-bottom: 12px;
}
.field label {
  display: block;
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  margin-bottom: 4px;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--input-bg);
  outline: none;
  transition: border-color .15s;
  appearance: none;
}
.field input:focus, .field textarea:focus { border-color: var(--crimson); background: #fff; }
.field textarea { resize: none; min-height: 60px; line-height: 1.5; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* REGELS */
.regel {
  display: grid;
  grid-template-columns: 1fr 52px 72px 22px;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}
.regel input {
  padding: 7px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--text);
  background: var(--input-bg);
  outline: none;
  width: 100%;
  transition: border-color .15s;
}
.regel input:focus { border-color: var(--crimson); background: #fff; }
.regel-header { display: grid; grid-template-columns: 1fr 52px 72px 22px; gap: 6px; margin-bottom: 4px; }
.regel-header span { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--light); }
.btn-remove-regel {
  width: 22px; height: 22px;
  background: none; border: none;
  color: var(--light); cursor: pointer;
  font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s; border-radius: 3px;
}
.btn-remove-regel:hover { color: #c0392b; background: rgba(192,57,43,.06); }
.btn-add-regel {
  font-family: 'Oswald', sans-serif;
  font-size: 11px; font-weight: 500;
  color: var(--crimson);
  background: none; border: 1px dashed rgba(155,35,85,.3);
  border-radius: 4px;
  padding: 6px 12px;
  cursor: pointer;
  width: 100%;
  transition: all .15s;
  margin-top: 4px;
}
.btn-add-regel:hover { border-color: var(--crimson); background: rgba(155,35,85,.04); }

/* -- PREVIEW PANEL -- */
.preview-panel {
  flex: 1;
  min-width: 0;
  min-height: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: 0;
  gap: 0;
}
.preview-hint {
  display: none;
}

.preview-stage {
  flex: 1 1 auto;
  min-height: 0;
  min-width: 0;
  overflow: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

.a4-scale-shell {
  width: calc(var(--a4-width) * var(--preview-scale));
  min-width: calc(var(--a4-width) * var(--preview-scale));
  height: calc(var(--a4-height) * var(--preview-scale));
  min-height: calc(var(--a4-height) * var(--preview-scale));
  margin: 0 auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* -- A4 PAGE -- */
.a4 {
  width: var(--a4-width);
  min-height: var(--a4-height);
  background: #fff;
  box-shadow: none;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  font-family: 'Barlow', sans-serif;
  transform: scale(var(--preview-scale));
  transform-origin: top center;
}

/* PDF HEADER */
.pdf-top {
  background: var(--crimson);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pdf-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 800;
  letter-spacing: 1px;
  color: #fff;
}
.pdf-doctype {
  font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,.65);
}

/* PDF BODY */
.pdf-body { padding: 28px 32px; flex: 1; }

/* ADDRESS BLOCK */
.pdf-addresses {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
.pdf-addr { background: #f9f8f6; border-radius: 3px; padding: 14px 16px; }
.pdf-addr-label {
  font-size: 8px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: #bbb;
  margin-bottom: 8px;
}
.pdf-addr-name { font-size: 11px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
.pdf-addr-line { font-size: 10px; color: #888; line-height: 1.6; }

/* META STRIP */
.pdf-meta {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #f9f8f6;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 24px;
}
.pdf-meta-cell { padding: 10px 14px; border-right: 1px solid #eee; }
.pdf-meta-cell:last-child { border-right: none; }
.pdf-meta-key { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; margin-bottom: 4px; }
.pdf-meta-val { font-size: 11px; font-weight: 600; color: #1a1a2e; }

/* ITEMS TABLE */
.pdf-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 0; }
.pdf-table thead tr { background: var(--crimson); }
.pdf-table thead th { padding: 7px 12px; text-align: left; font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; }
.pdf-table thead th:not(:first-child) { text-align: right; width: 72px; }
.pdf-table tbody tr:nth-child(even) { background: #f9f8f6; }
.pdf-table tbody td { padding: 8px 12px; color: #333; border-bottom: 1px solid #f0eeeb; }
.pdf-table tbody td:not(:first-child) { text-align: right; color: #555; }
.pdf-table .empty-row td { color: #ccc; font-style: italic; }

/* TOTALS */
.pdf-totals { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; margin-top: 10px; }
.pdf-total-row { display: flex; gap: 32px; font-size: 10px; color: #888; }
.pdf-total-row span:last-child { width: 90px; text-align: right; color: #444; font-weight: 500; }
.pdf-total-grand {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--crimson); color: #fff;
  padding: 7px 12px;
  margin-top: 6px;
  width: 240px;
  border-radius: 2px;
}
.pdf-total-grand-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.pdf-total-grand-amount { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; }

/* NOTES */
.pdf-notes { margin-top: 20px; }
.pdf-notes-label { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; margin-bottom: 6px; }
.pdf-notes-text { font-size: 10px; color: #666; line-height: 1.7; background: #f9f8f6; padding: 10px 12px; border-radius: 3px; }

/* PDF FOOTER */
.pdf-footer {
  margin-top: auto;
  border-top: 1px solid #f0eeeb;
  padding: 12px 32px;
  text-align: center;
  font-size: 8px;
  color: #ccc;
}

/* TOAST */
.toast { position: fixed; bottom: 20px; right: 20px; background: #1a1a2e; color: #fff; padding: 10px 16px; border-radius: 5px; font-size: 12px; opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none; z-index: 99; }
.toast.show { opacity: 1; transform: none; }

@media (max-width: 1280px) {
  .topbar { padding: 0 20px; gap: 18px; }
  .form-panel { width: clamp(270px, 32vw, 320px); min-width: 270px; padding: 22px 18px 32px; }
}

@media (max-width: 1180px) {
  .split {
    flex-direction: column;
    overflow: auto;
  }
  .form-panel {
    width: 100%;
    min-width: 0;
    max-height: 44vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .preview-panel {
    flex: 1 1 auto;
    min-height: 420px;
  }
  .preview-stage {
    justify-content: flex-start;
  }
}

@media (max-width: 900px) {
  html, body { overflow: auto; }
  .main-content {
    margin-left: 0;
    width: 100%;
  }
  .pdf-builder-shell {
    min-height: auto;
    max-height: none;
  }
  .topbar {
    height: auto;
    min-height: 56px;
    padding: 12px 16px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .topbar-right {
    margin-left: 0;
  }
  .split {
    flex-direction: column;
    overflow: auto;
  }
  .form-panel {
    width: 100%;
    min-width: 0;
    max-height: 44vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .preview-panel {
    flex: 1 1 auto;
    min-height: 420px;
  }
  .preview-stage {
    justify-content: flex-start;
  }
}
</style>
</head>

<script>
// -- STATE --
let docType = 'offerte';
let regels = [{ id:1, omschrijving:'', aantal:1, prijs:0 }];
let rc = 2;
const A4_PREVIEW_WIDTH = 595;
const A4_PREVIEW_HEIGHT = 842;
let previewResizeObserver = null;

const fields = {};
function v(id) { return (fields[id] && fields[id].value) || ''; }
function fmtEur(n) { return '€\u00a0' + (isNaN(n)?'0,00':n.toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2})); }
function fmtDate(s) { if(!s) return '-'; const[y,m,d]=s.split('-'); return `${d}-${m}-${y}`; }
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(n) { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }

function fitPreviewToViewport() {
  const panel = document.getElementById('previewPanel');
  const stage = document.getElementById('previewStage');
  if (!panel || !stage) return;
  const availableWidth = Math.max(240, stage.clientWidth);
  const scale = Math.min(1, availableWidth / A4_PREVIEW_WIDTH);
  panel.style.setProperty('--preview-scale', String(scale));
}

function setupPreviewAutoFit() {
  const stage = document.getElementById('previewStage');
  if (!stage) return;
  if (!previewResizeObserver && typeof ResizeObserver === 'function') {
    previewResizeObserver = new ResizeObserver(() => fitPreviewToViewport());
    previewResizeObserver.observe(stage);
  }
  window.addEventListener('resize', fitPreviewToViewport, { passive: true });
}

// -- DOC TYPE --
function setDoc(type, el) {
  docType = type;
  document.querySelectorAll('.doc-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  buildForm();
  update();
  fitPreviewToViewport();
}

// -- BUILD FORM --
function buildForm() {
  const panel = document.getElementById('form-panel');
  const types = {
    offerte: [
      { section: 'Klantgegevens' },
      { id:'bedrijf',  label:'Bedrijfsnaam',       placeholder:'De Vries B.V.' },
      { id:'contact',  label:'Contactpersoon',      placeholder:'Dhr. De Vries' },
      { id:'email',    label:'E-mailadres',          placeholder:'info@devries.nl', type:'email' },
      { id:'adres',    label:'Adres',                placeholder:'Hoofdstraat 1, 1234 AB Amsterdam' },
      { id:'kvk',      label:'KvK-nummer',           placeholder:'12345678' },
      { id:'tel',      label:'Telefoonnummer',       placeholder:'+31 6 ...' },
      { section: 'Offerte details' },
      { id:'nummer',   label:'Offertenummer',        placeholder:'OFF-2026-001' },
      { id:'datum',    label:'Datum',                type:'date', default: today() },
      { id:'geldig',   label:'Geldig tot',           type:'date', default: addDays(30) },
      { id:'onderwerp',label:'Project / onderwerp',  placeholder:'Website Business pakket' },
      { section: 'Regelomschrijvingen', isRegels: true },
      { section: 'Opmerkingen' },
      { id:'notities', label:'Notities (optioneel)', textarea: true, placeholder:'Bijv. betalingstermijn, voorwaarden...' },
    ],
    factuur: [
      { section: 'Klantgegevens' },
      { id:'bedrijf',  label:'Bedrijfsnaam',       placeholder:'De Vries B.V.' },
      { id:'contact',  label:'Contactpersoon',      placeholder:'Dhr. De Vries' },
      { id:'email',    label:'E-mailadres',          placeholder:'info@devries.nl', type:'email' },
      { id:'adres',    label:'Adres',                placeholder:'Hoofdstraat 1, 1234 AB Amsterdam' },
      { id:'kvk',      label:'KvK-nummer',           placeholder:'12345678' },
      { id:'btwnum',   label:'BTW-nummer',           placeholder:'NL123456789B01' },
      { section: 'Factuurdetails' },
      { id:'nummer',   label:'Factuurnummer',        placeholder:'FACT-2026-001' },
      { id:'datum',    label:'Factuurdatum',         type:'date', default: today() },
      { id:'verval',   label:'Vervaldatum',          type:'date', default: addDays(14) },
      { id:'iban',     label:'IBAN',                 placeholder:'NL91 ABNA 0417 ...' },
      { id:'ref',      label:'Referentie / Project', placeholder:'Website Business pakket' },
      { section: 'Regelomschrijvingen', isRegels: true },
      { section: 'Opmerkingen' },
      { id:'notities', label:'Notities (optioneel)', textarea: true, placeholder:'Bijv. betaalverzoek...' },
    ],
    herinnering: [
      { section: 'Klantgegevens' },
      { id:'bedrijf',  label:'Bedrijfsnaam',         placeholder:'De Vries B.V.' },
      { id:'contact',  label:'Contactpersoon',        placeholder:'Dhr. De Vries' },
      { id:'email',    label:'E-mailadres',            placeholder:'info@devries.nl', type:'email' },
      { id:'adres',    label:'Adres',                  placeholder:'Hoofdstraat 1, 1234 AB Amsterdam' },
      { section: 'Factuurgegevens' },
      { id:'factnr',   label:'Factuurnummer',          placeholder:'FACT-2026-001' },
      { id:'factdatum',label:'Factuurdatum',           type:'date', default: addDays(-30) },
      { id:'verval',   label:'Vervallen op',           type:'date', default: addDays(-16) },
      { id:'bedrag',   label:'Openstaand bedrag',      placeholder:'€ 1.813,50' },
      { id:'nieuwdat', label:'Nieuwe betaaldatum',     type:'date', default: addDays(7) },
      { id:'iban',     label:'IBAN',                   placeholder:'NL91 ABNA 0417 ...' },
      { id:'htype',    label:'Type herinnering',       select: ['1e Herinnering - vriendelijk','2e Herinnering - dringend','Aanmaning - formeel'] },
      { section: 'Toelichting' },
      { id:'notities', label:'Persoonlijke boodschap (optioneel)', textarea: true, placeholder:'Bijv. mochten er vragen zijn...' },
    ],
  };

  const config = types[docType];
  let html = '';
  config.forEach(f => {
    if (f.section && !f.isRegels) {
      html += `<div class="section-title">${f.section}</div>`;
    } else if (f.isRegels) {
      html += `<div class="section-title">Regelomschrijvingen</div><div id="regels-wrap"></div><button class="btn-add-regel" onclick="addRegel()">+ Regel toevoegen</button>`;
    } else if (f.select) {
      html += `<div class="field"><label>${f.label}</label><select id="f-${f.id}" onchange="update()">${f.select.map((o,i)=>`<option value="${i+1}">${o}</option>`).join('')}</select></div>`;
    } else if (f.textarea) {
      html += `<div class="field"><label>${f.label}</label><textarea id="f-${f.id}" placeholder="${f.placeholder||''}" oninput="update()"></textarea></div>`;
    } else {
      html += `<div class="field"><label>${f.label}</label><input type="${f.type||'text'}" id="f-${f.id}" placeholder="${f.placeholder||''}" oninput="update()" ${f.default?`value="${f.default}"`:''}></div>`;
    }
  });

  panel.innerHTML = html;

  // cache field refs
  panel.querySelectorAll('input,textarea,select').forEach(el => {
    const id = el.id.replace('f-','');
    fields[id] = el;
  });

  renderRegels();
  update();
}

// -- REGELS --
function renderRegels() {
  const wrap = document.getElementById('regels-wrap');
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="regel-header"><span>Omschrijving</span><span>Aantal</span><span>Prijs</span><span></span></div>
    ${regels.map(r => `
      <div class="regel">
        <input type="text" value="${r.omschrijving}" placeholder="Dienst..." oninput="updateRegel(${r.id},'omschrijving',this.value)">
        <input type="number" value="${r.aantal}" min="1" oninput="updateRegel(${r.id},'aantal',this.value)">
        <input type="number" value="${r.prijs||''}" placeholder="0,00" step="0.01" oninput="updateRegel(${r.id},'prijs',this.value)">
        <button class="btn-remove-regel" onclick="removeRegel(${r.id})">×</button>
      </div>`).join('')}`;
}

function addRegel() { regels.push({id:rc++,omschrijving:'',aantal:1,prijs:0}); renderRegels(); update(); }
function removeRegel(id) { if(regels.length>1) regels=regels.filter(r=>r.id!==id); renderRegels(); update(); }
function updateRegel(id, field, val) {
  const r=regels.find(r=>r.id===id); if(!r) return;
  r[field] = field==='omschrijving' ? val : (parseFloat(val)||0);
  update();
}

function getSubtotal() { return regels.reduce((s,r)=>s+r.aantal*r.prijs,0); }

// -- PREVIEW --
function update() {
  const a4 = document.getElementById('a4');

  if (docType === 'offerte' || docType === 'factuur') {
    const isOff = docType === 'offerte';
    const sub = getSubtotal(), btw = sub*.21, grand = sub+btw;
    const numLabel = isOff ? 'Offertenummer' : 'Factuurnummer';
    const datLabel = isOff ? 'Datum' : 'Factuurdatum';
    const d3label  = isOff ? 'Geldig tot' : 'Vervaldatum';
    const d3val    = isOff ? fmtDate(v('geldig')) : fmtDate(v('verval'));
    const d4label  = isOff ? 'Onderwerp' : 'Referentie';
    const d4val    = isOff ? (v('onderwerp')||'-') : (v('ref')||'-');
    const addr2extra = !isOff && v('btwnum') ? `<div class="pdf-addr-line">BTW: ${v('btwnum')}</div>` : '';
    const ibanLine = !isOff && v('iban') ? `<div class="pdf-addr-line">IBAN: ${v('iban')}</div>` : '';

    const rows = regels.length === 0
      ? `<tr class="empty-row"><td colspan="4">Nog geen regels...</td></tr>`
      : regels.map(r=>`<tr>
          <td>${r.omschrijving||'-'}</td>
          <td style="text-align:right">${r.aantal}</td>
          <td style="text-align:right">${fmtEur(r.prijs)}</td>
          <td style="text-align:right;font-weight:600">${fmtEur(r.aantal*r.prijs)}</td>
        </tr>`).join('');

    const notes = v('notities') ? `<div class="pdf-notes"><div class="pdf-notes-label">Opmerkingen</div><div class="pdf-notes-text">${v('notities').replace(/\n/g,'<br>')}</div></div>` : '';

    a4.innerHTML = `
      <div class="pdf-top">
        <div class="pdf-logo">SOFTORA.NL</div>
        <div class="pdf-doctype">${isOff ? 'Offerte' : 'Factuur'}</div>
      </div>
      <div class="pdf-body">
        <div class="pdf-addresses">
          <div class="pdf-addr">
            <div class="pdf-addr-label">Van</div>
            <div class="pdf-addr-name">Softora.nl</div>
            <div class="pdf-addr-line">info@softora.nl</div>
            <div class="pdf-addr-line">www.softora.nl</div>
            ${ibanLine}
            <div class="pdf-addr-line">KvK: 12345678</div>
          </div>
          <div class="pdf-addr">
            <div class="pdf-addr-label">Aan</div>
            <div class="pdf-addr-name">${v('bedrijf')||'-'}</div>
            ${v('contact')?`<div class="pdf-addr-line">${v('contact')}</div>`:''}
            ${v('adres')?`<div class="pdf-addr-line">${v('adres')}</div>`:''}
            ${v('email')?`<div class="pdf-addr-line">${v('email')}</div>`:''}
            ${v('kvk')?`<div class="pdf-addr-line">KvK: ${v('kvk')}</div>`:''}
            ${addr2extra}
          </div>
        </div>
        <div class="pdf-meta">
          <div class="pdf-meta-cell"><div class="pdf-meta-key">${numLabel}</div><div class="pdf-meta-val">${v('nummer')||'-'}</div></div>
          <div class="pdf-meta-cell"><div class="pdf-meta-key">${datLabel}</div><div class="pdf-meta-val">${fmtDate(v('datum'))}</div></div>
          <div class="pdf-meta-cell"><div class="pdf-meta-key">${d3label}</div><div class="pdf-meta-val">${d3val}</div></div>
          <div class="pdf-meta-cell"><div class="pdf-meta-key">${d4label}</div><div class="pdf-meta-val">${d4val}</div></div>
        </div>
        <table class="pdf-table">
          <thead><tr><th>Omschrijving</th><th style="text-align:right">Aantal</th><th style="text-align:right">Prijs</th><th style="text-align:right">Totaal</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="pdf-totals">
          <div class="pdf-total-row"><span>Subtotaal excl. BTW</span><span>${fmtEur(sub)}</span></div>
          <div class="pdf-total-row"><span>BTW (21%)</span><span>${fmtEur(btw)}</span></div>
          <div class="pdf-total-grand"><span class="pdf-total-grand-label">Totaal</span><span class="pdf-total-grand-amount">${fmtEur(grand)}</span></div>
        </div>
        ${notes}
      </div>
      <div class="pdf-footer">Softora.nl - info@softora.nl - www.softora.nl - KvK: 12345678</div>`;

  } else {
    // HERINNERING
    const htype = fields['htype'] ? parseInt(fields['htype'].value) : 1;
    const hcols = { 1:'#16733c', 2:'#b45a00', 3:'#c0392b' };
    const hlabels = { 1:'1e Betalingsherinnering', 2:'2e Betalingsherinnering - Dringend', 3:'Aanmaning' };
    const col = hcols[htype];
    const contact = v('contact') || 'relatie';
    const msgs = {
      1:`Geachte ${contact},\n\nWij attenderen u er vriendelijk op dat onderstaande factuur nog niet is voldaan. Wellicht is de betaling al onderweg - in dat geval kunt u dit bericht als niet verzonden beschouwen.`,
      2:`Geachte ${contact},\n\nOndanks onze eerdere herinnering hebben wij uw betaling nog niet ontvangen. Wij verzoeken u dringend het openstaande bedrag zo spoedig mogelijk te voldoen.`,
      3:`Geachte ${contact},\n\nNadat wij u meerdere malen hebben verzocht te betalen, is betaling uitgebleven. Wij sommeren u het verschuldigde bedrag uiterlijk op de vermelde datum te voldoen. Bij uitblijven treffen wij verdere incassomaatregelen.`
    };

    a4.innerHTML = `
      <div class="pdf-top">
        <div class="pdf-logo">SOFTORA.NL</div>
        <div class="pdf-doctype">${hlabels[htype]}</div>
      </div>
      <div class="pdf-body">
        <div class="pdf-addresses">
          <div class="pdf-addr">
            <div class="pdf-addr-label">Van</div>
            <div class="pdf-addr-name">Softora.nl</div>
            <div class="pdf-addr-line">info@softora.nl</div>
            <div class="pdf-addr-line">www.softora.nl</div>
          </div>
          <div class="pdf-addr">
            <div class="pdf-addr-label">Aan</div>
            <div class="pdf-addr-name">${v('bedrijf')||'-'}</div>
            ${v('contact')?`<div class="pdf-addr-line">${v('contact')}</div>`:''}
            ${v('adres')?`<div class="pdf-addr-line">${v('adres')}</div>`:''}
            ${v('email')?`<div class="pdf-addr-line">${v('email')}</div>`:''}
          </div>
        </div>
        <div style="background:${col};color:#fff;border-radius:3px;padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px">${hlabels[htype]}</div>
        <div style="font-size:11px;color:#555;line-height:1.9;margin-bottom:18px">${msgs[htype].replace(/\n/g,'<br>')}</div>
        <div class="pdf-meta" style="margin-bottom:16px">
          <div class="pdf-meta-cell"><div class="pdf-meta-key">Factuurnummer</div><div class="pdf-meta-val">${v('factnr')||'-'}</div></div>
          <div class="pdf-meta-cell"><div class="pdf-meta-key">Factuurdatum</div><div class="pdf-meta-val">${fmtDate(v('factdatum'))}</div></div>
          <div class="pdf-meta-cell"><div class="pdf-meta-key">Vervallen op</div><div class="pdf-meta-val">${fmtDate(v('verval'))}</div></div>
          <div class="pdf-meta-cell"><div class="pdf-meta-key">Openstaand</div><div class="pdf-meta-val" style="color:${col}">${v('bedrag')||'-'}</div></div>
        </div>
        <div style="background:${col};color:#fff;border-radius:3px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:11px;line-height:1.7">
            <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;margin-bottom:2px">Betaal uiterlijk</div>
            <strong>${fmtDate(v('nieuwdat'))}</strong> - IBAN: ${v('iban')||'-'}
          </div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800">${v('bedrag')||'-'}</div>
        </div>
        ${v('notities')?`<div class="pdf-notes"><div class="pdf-notes-label">Toelichting</div><div class="pdf-notes-text">${v('notities').replace(/\n/g,'<br>')}</div></div>`:''}
      </div>
      <div class="pdf-footer">Softora.nl - info@softora.nl - www.softora.nl - KvK: 12345678</div>`;
  }
  fitPreviewToViewport();
}

// -- DOWNLOAD --
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W=210, PL=20, PR=190;
  const CR=[155,35,85], DK=[26,26,46], MD=[100,100,110], BG=[249,248,246];
  const fmtD=s=>{ if(!s) return '-'; const[y,m,d]=s.split('-'); return `${d}-${m}-${y}`; };
  const fmtN=n=>n.toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2});

  // header
  doc.setFillColor(...CR); doc.rect(0,0,W,26,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(255,255,255);
  doc.text('SOFTORA.NL', PL, 16);
  const dtLabel = docType==='offerte'?'OFFERTE':docType==='factuur'?'FACTUUR':'BETALINGSHERINNERING';
  doc.setFontSize(8); doc.setTextColor(255,200,220); doc.text(dtLabel, PR, 16, {align:'right'});

  let y=34;

  if (docType==='offerte'||docType==='factuur') {
    const isOff = docType==='offerte';
    // address boxes
    const van=['Softora.nl','info@softora.nl','www.softora.nl','KvK: 12345678'];
    const aan=[v('bedrijf')||'-',v('contact'),v('adres'),v('email'),v('kvk')?'KvK: '+v('kvk'):null].filter(Boolean);
    [[PL,van,'VAN'],[112,aan,'AAN']].forEach(([x,lines,lbl])=>{
      doc.setFillColor(...BG); doc.rect(x,y,78,36,'F');
      doc.setFontSize(6.5); doc.setFont('helvetica','bold'); doc.setTextColor(...MD); doc.text(lbl,x+3,y+5);
      lines.forEach((l,i)=>{
        if(i===0){doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...DK);}
        else{doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...MD);}
        doc.text(String(l),x+3,y+10+i*5);
      });
    });
    y+=42;

    // meta strip
    const metas = isOff
      ? [['OFFERTENUMMER',v('nummer')||'-'],['DATUM',fmtD(v('datum'))],['GELDIG TOT',fmtD(v('geldig'))],['ONDERWERP',v('onderwerp')||'-']]
      : [['FACTUURNUMMER',v('nummer')||'-'],['FACTUURDATUM',fmtD(v('datum'))],['VERVALDATUM',fmtD(v('verval'))],['REFERENTIE',v('ref')||'-']];
    doc.setFillColor(...BG); doc.rect(PL,y,170,14,'F');
    metas.forEach(([k,val],i)=>{
      const x=PL+3+i*43;
      doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.setTextColor(...MD); doc.text(k,x,y+4.5);
      doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(...DK); doc.text(val,x,y+11);
    });
    y+=20;

    // table header
    doc.setFillColor(...CR); doc.rect(PL,y,170,7,'F');
    doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('OMSCHRIJVING',PL+3,y+4.8);doc.text('AANTAL',130,y+4.8);doc.text('PRIJS',152,y+4.8);doc.text('TOTAAL',172,y+4.8);
    y+=7;

    regels.forEach((r,i)=>{
      const bg=i%2===0?[255,255,255]:BG;
      doc.setFillColor(...bg); doc.rect(PL,y,170,7,'F');
      doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(...DK);
      doc.text(r.omschrijving||'-',PL+3,y+4.8);
      doc.text(String(r.aantal),134,y+4.8,{align:'right'});
      doc.text('€'+fmtN(r.prijs),162,y+4.8,{align:'right'});
      doc.setFont('helvetica','bold'); doc.text('€'+fmtN(r.aantal*r.prijs),188,y+4.8,{align:'right'});
      y+=7;
    });

    const sub=getSubtotal(),btw=sub*.21,grand=sub+btw;
    y+=4;
    doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(...MD);
    doc.text('Subtotaal excl. BTW:',142,y);doc.text('€'+fmtN(sub),188,y,{align:'right'}); y+=5.5;
    doc.text('BTW (21%):',142,y);doc.text('€'+fmtN(btw),188,y,{align:'right'}); y+=3;
    doc.setFillColor(...CR);doc.rect(142,y,48,9,'F');
    doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('TOTAAL',145,y+6.2);doc.text('€'+fmtN(grand),188,y+6.2,{align:'right'});
    y+=14;

    if(v('notities')){ doc.setFillColor(...BG);doc.rect(PL,y,170,6,'F'); doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...MD);doc.text('OPMERKINGEN',PL+3,y+4);y+=6; doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(70,70,80); const ls=doc.splitTextToSize(v('notities'),164);doc.text(ls,PL+3,y+5); }

  } else {
    // herinnering
    const htype=fields['htype']?parseInt(fields['htype'].value):1;
    const hcols={1:[22,115,60],2:[180,90,0],3:[192,57,43]};
    const hlabels={1:'1E BETALINGSHERINNERING',2:'2E BETALINGSHERINNERING - DRINGEND',3:'AANMANING'};
    const hc=hcols[htype];
    [[PL,['Softora.nl','info@softora.nl','www.softora.nl'],'VAN'],[112,[v('bedrijf')||'-',v('contact'),v('adres'),v('email')].filter(Boolean),'AAN']].forEach(([x,lines,lbl])=>{
      doc.setFillColor(...BG);doc.rect(x,y,78,30,'F');
      doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.setTextColor(...MD);doc.text(lbl,x+3,y+4.5);
      lines.forEach((l,i)=>{if(i===0){doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...DK);}else{doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...MD);}doc.text(String(l),x+3,y+9+i*5);});
    });
    y+=36;
    doc.setFillColor(...hc);doc.rect(PL,y,170,9,'F');
    doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);doc.text(hlabels[htype],PL+4,y+6.2);y+=14;
    const msgs={1:`Geachte ${v('contact')||'relatie'},\n\nWij attenderen u er vriendelijk op dat onderstaande factuur nog niet is voldaan.`,2:`Geachte ${v('contact')||'relatie'},\n\nOndanks onze herinnering ontvingen wij uw betaling nog niet. Wij verzoeken u dringend te betalen.`,3:`Geachte ${v('contact')||'relatie'},\n\nNadat wij u meerdere malen verzochten te betalen, is betaling uitgebleven. Wij sommeren u te betalen.`};
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(...DK);const ml=doc.splitTextToSize(msgs[htype],170);doc.text(ml,PL,y);y+=ml.length*5+8;
    doc.setFillColor(...BG);doc.rect(PL,y,170,8,'F');
    doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...MD);
    [[PL+2,'FACTUURNR'],[57,'FACTUURDATUM'],[100,'VERVALLEN OP'],[143,'OPENSTAAND']].forEach(([x,l])=>doc.text(l,x,y+4.8));
    y+=8;doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...DK);
    doc.text(v('factnr')||'-',PL+2,y+5);doc.text(fmtD(v('factdatum')),57,y+5);doc.text(fmtD(v('verval')),100,y+5);
    doc.setFont('helvetica','bold');doc.setTextColor(...hc);doc.text(v('bedrag')||'-',143,y+5);y+=14;
    doc.setFillColor(...hc);doc.rect(PL,y,170,11,'F');
    doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('Betaal uiterlijk: '+fmtD(v('nieuwdat')),PL+4,y+5);doc.text('IBAN: '+(v('iban')||'-'),PL+4,y+9.5);
    doc.text(v('bedrag')||'-',188,y+7,{align:'right'});
  }

  doc.setFillColor(...BG);doc.rect(0,284,W,13,'F');
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(180,175,168);
  doc.text('Softora.nl  -  info@softora.nl  -  www.softora.nl  -  KvK: 12345678',W/2,291,{align:'center'});

  doc.save(`${docType}-${new Date().toISOString().split('T')[0]}.pdf`);
  showToast('PDF gedownload');
}

function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

// init
buildForm();
setupPreviewAutoFit();
fitPreviewToViewport();
</script>

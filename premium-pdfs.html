<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/assets/D80D8A58-B985-491E-A39B-27879E4C593A.PNG?v=20260414f" sizes="any">
<link rel="apple-touch-icon" href="/assets/D80D8A58-B985-491E-A39B-27879E4C593A.PNG?v=20260414f">
<title>PDF's - Softora.nl</title>

<link rel="stylesheet" href="assets/personnel-theme.css?v=20260411a">
<script>
  (function () {
    document.documentElement.setAttribute("data-personnel-loading", "true");
    try {
      document.documentElement.setAttribute("data-theme-mode", "light");
      document.documentElement.setAttribute("data-theme", "light");
    } catch (_) {
      /* ignore */
    }
  })();
</script>
<script src="assets/personnel-theme.js?v=20260414a" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: var(--bg-primary, #f8f7f4);
  --panel: var(--bg-secondary, #ffffff);
  --preview-bg: var(--bg-primary, #f8f7f4);
  --crimson: var(--accent, #8b2252);
  --crimson-light: var(--accent-light, #a62d65);
  --border: rgba(0, 0, 0, 0.08);
  --text: var(--text-primary, #1a1a2e);
  --muted: var(--text-secondary, #606272);
  --light: var(--text-tertiary, #9a9cac);
  --input-bg: #faf9f7;
}
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
.dashboard-layout { height: 100%; display: flex; min-height: 100vh; }
.sidebar { width: 280px; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; display: flex; flex-direction: column; }
.main-content {
  margin-left: 280px;
  width: calc(100% - 280px);
  min-width: 0;
  min-height: 0;
  height: 100vh;
  max-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* -- TOP BAR -- */
.topbar {
  height: 62px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px 0 16px;
  gap: 12px;
  flex-shrink: 0;
}
.doc-tabs {
  display: flex;
  gap: 2px;
  flex: 0 1 auto;
  justify-content: flex-start;
  min-width: 0;
}
.doc-tab {
  font-family: 'Oswald', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  color: var(--muted);
  border: none; background: none;
  transition: all .15s;
}
.doc-tab:hover { color: var(--text); background: var(--bg); }
.doc-tab.active { color: var(--crimson); background: rgba(139,34,82,.07); font-weight: 600; }

.topbar-right { margin-left: auto; }
.btn-dl {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 20px;
  background: var(--crimson); color: #fff;
  border: none; border-radius: 5px;
  font-family: 'Oswald', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: opacity .15s;
}
.btn-dl:hover { opacity: .88; }
.btn-dl svg { width: 13px; height: 13px; }

/* -- SPLIT -- */
.split {
  display: grid;
  grid-template-columns: minmax(280px, min(380px, 34vw)) minmax(0, 1fr);
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* -- FORM PANEL -- */
.form-panel {
  width: 100%;
  max-width: 460px;
  min-height: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 22px 22px 34px;
}

.section-title {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--light);
  margin: 24px 0 12px;
}
.section-title:first-child { margin-top: 0; }

.field {
  margin-bottom: 12px;
}
.field label {
  display: block;
  font-size: 12px; font-weight: 500;
  color: var(--muted);
  margin-bottom: 4px;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 9px 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--input-bg);
  outline: none;
  transition: border-color .15s;
  appearance: none;
}
.field input:focus, .field textarea:focus { border-color: var(--crimson); background: #fff; }
.field textarea { resize: none; min-height: 60px; line-height: 1.5; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* REGELS */
.regel {
  display: grid;
  grid-template-columns: 1fr 52px 72px 22px;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}
.regel input {
  padding: 7px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--text);
  background: var(--input-bg);
  outline: none;
  width: 100%;
  transition: border-color .15s;
}
.regel input:focus { border-color: var(--crimson); background: #fff; }
.regel-header { display: grid; grid-template-columns: 1fr 52px 72px 22px; gap: 6px; margin-bottom: 4px; }
.regel-header span { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--light); }
.btn-remove-regel {
  width: 22px; height: 22px;
  background: none; border: none;
  color: var(--light); cursor: pointer;
  font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s; border-radius: 3px;
}
.btn-remove-regel:hover { color: #c0392b; background: rgba(192,57,43,.06); }
.btn-add-regel {
  font-size: 11px; font-weight: 600;
  color: var(--crimson);
  background: none; border: 1px dashed rgba(139,34,82,.3);
  border-radius: 4px;
  padding: 6px 12px;
  cursor: pointer;
  width: 100%;
  transition: all .15s;
  margin-top: 4px;
}
.btn-add-regel:hover { border-color: var(--crimson); background: rgba(139,34,82,.04); }

/* -- PREVIEW PANEL -- */
.preview-panel {
  min-width: 0;
  min-height: 0;
  background: var(--preview-bg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 0;
}
.preview-panel-head {
  flex-shrink: 0;
  padding: 13px 18px 11px;
  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  background: var(--preview-bg);
}
.preview-hint {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--light);
  margin: 0;
}
.a4-stage {
  flex: 1;
  min-height: 0;
  width: 100%;
  position: relative;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 16px 28px;
  background: rgba(255,255,255,0.42);
}
.a4-scale-wrap {
  flex-shrink: 0;
  margin: 0 auto;
  overflow: hidden;
}

/* -- A4 PAGE -- */
.a4 {
  width: 595px;
  min-height: 842px;
  background: #fff;
  box-shadow: 0 2px 24px rgba(0,0,0,.14);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  font-family: 'Inter', sans-serif;
  transform-origin: top left;
}

/* PDF HEADER */
.pdf-top {
  background: var(--crimson);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pdf-logo {
  font-family: 'Oswald', sans-serif;
  font-size: 18px; font-weight: 800;
  letter-spacing: 1px;
  color: #fff;
}
.pdf-doctype {
  font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,.65);
}

/* PDF BODY */
.pdf-body { padding: 28px 32px; flex: 1; }

/* ADDRESS BLOCK */
.pdf-addresses {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
.pdf-addr { background: #f9f8f6; border-radius: 3px; padding: 14px 16px; }
.pdf-addr-label {
  font-size: 8px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: #bbb;
  margin-bottom: 8px;
}
.pdf-addr-name { font-size: 11px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
.pdf-addr-line { font-size: 10px; color: #888; line-height: 1.6; }

/* META STRIP */
.pdf-meta {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #f9f8f6;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 24px;
}
.pdf-meta-cell { padding: 10px 14px; border-right: 1px solid #eee; }
.pdf-meta-cell:last-child { border-right: none; }
.pdf-meta-key { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; margin-bottom: 4px; }
.pdf-meta-val { font-size: 11px; font-weight: 600; color: #1a1a2e; }

/* ITEMS TABLE */
.pdf-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 0; }
.pdf-table thead tr { background: var(--crimson); }
.pdf-table thead th { padding: 7px 12px; text-align: left; font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; }
.pdf-table thead th:not(:first-child) { text-align: right; width: 72px; }
.pdf-table tbody tr:nth-child(even) { background: #f9f8f6; }
.pdf-table tbody td { padding: 8px 12px; color: #333; border-bottom: 1px solid #f0eeeb; }
.pdf-table tbody td:not(:first-child) { text-align: right; color: #555; }
.pdf-table .empty-row td { color: #ccc; font-style: italic; }

/* TOTALS */
.pdf-totals { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; margin-top: 10px; }
.pdf-total-row { display: flex; gap: 32px; font-size: 10px; color: #888; }
.pdf-total-row span:last-child { width: 90px; text-align: right; color: #444; font-weight: 500; }
.pdf-total-grand {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--crimson); color: #fff;
  padding: 7px 12px;
  margin-top: 6px;
  width: 240px;
  border-radius: 2px;
}
.pdf-total-grand-label { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.pdf-total-grand-amount { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; }

/* NOTES */
.pdf-notes { margin-top: 20px; }
.pdf-notes-label { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; margin-bottom: 6px; }
.pdf-notes-text { font-size: 10px; color: #666; line-height: 1.7; background: #f9f8f6; padding: 10px 12px; border-radius: 3px; }

/* PDF FOOTER */
.pdf-footer {
  margin-top: auto;
  border-top: 1px solid #f0eeeb;
  padding: 12px 32px;
  text-align: center;
  font-size: 8px;
  color: #ccc;
}

/* TOAST */
.toast { position: fixed; bottom: 20px; right: 20px; background: #1a1a2e; color: #fff; padding: 10px 16px; border-radius: 5px; font-size: 12px; opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none; z-index: 99; }
.toast.show { opacity: 1; transform: none; }

@media (max-width: 900px) {
  .main-content { margin-left: 0; width: 100%; max-height: none; height: auto; min-height: 100vh; }
  .sidebar { display: none; }
  .form-panel { max-width: none; }
  .split { grid-template-columns: 1fr; }
  .a4-stage { min-height: 420px; }
  .a4 { width: min(595px, calc(100vw - 32px)); min-height: auto; }
  .a4-scale-wrap {
    overflow: visible !important;
    width: auto !important;
    height: auto !important;
    margin: 0 auto;
  }
  .a4 { transform: none !important; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="dashboard-layout" data-sidebar-shell="canonical">
<aside class="sidebar"></aside>
<main class="main-content">
<div class="topbar">
  <div class="doc-tabs">
    <button class="doc-tab active" onclick="setDoc('offerte',this)">Offerte</button>
    <button class="doc-tab" onclick="setDoc('factuur',this)">Factuur</button>
    <button class="doc-tab" onclick="setDoc('herinnering',this)">Betalingsherinnering</button>
  </div>
  <div class="topbar-right">
    <button class="btn-dl" onclick="downloadPDF()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PDF Downloaden
    </button>
  </div>
</div>

<!-- SPLIT -->
<div class="split">

  <!-- FORM -->
  <div class="form-panel" id="form-panel">
    <!-- filled by JS -->
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="preview-panel-head">
      <div class="preview-hint">Live preview</div>
    </div>
    <div class="a4-stage" id="a4-stage">
      <div class="a4-scale-wrap" id="a4-scale-wrap">
        <div class="a4" id="a4">
          <!-- filled by JS -->
        </div>
      </div>
    </div>
  </div>

</div>
</main>
</div>

<div class="toast" id="toast"></div>

<script>
// -- STATE --
let docType = 'offerte';
let regels = [{ id:1, omschrijving:'', aantal:1, prijs:0 }];
let rc = 2;

const fields = {};
function v(id) { return (fields[id] && fields[id].value) || ''; }
function fmtEur(n) { return '€\u00a0' + (isNaN(n)?'0,00':n.toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2})); }
function fmtDate(s) { if(!s) return '—'; const[y,m,d]=s.split('-'); return `${d}-${m}-${y}`; }
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(n) { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }

// -- DOC TYPE --
function setDoc(type, el) {
  docType = type;
  document.querySelectorAll('.doc-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  buildForm();
  update();
}

// -- BUILD FORM --
function buildForm() {
  const panel = document.getElementById('form-panel');
  const types = {
    offerte: [
      { section: 'Klantgegevens' },
      { id:'bedrijf',  label:'Bedrijfsnaam',       placeholder:'De Vries B.V.' },
      { id:'contact',  label:'Contactpersoon',      placeholder:'Dhr. De Vries' },
      { id:'email',    label:'E-mailadres',          placeholder:'info@devries.nl', type:'email' },
      { id:'adres',    label:'Adres',                placeholder:'Hoofdstraat 1, 1234 AB Amsterdam' },
      { id:'kvk',      label:'KvK-nummer',           placeholder:'12345678' },
      { id:'tel',      label:'Telefoonnummer',       placeholder:'+31 6 ...' },
      { section: 'Offerte details' },
      { id:'nummer',   label:'Offertenummer',        placeholder:'OFF-2026-001' },
      { id:'datum',    label:'Datum',                type:'date', default: today() },
      { id:'geldig',   label:'Geldig tot',           type:'date', default: addDays(30) },
      { id:'onderwerp',label:'Project / onderwerp',  placeholder:'Website Business pakket' },
      { section: 'Regelomschrijvingen', isRegels: true },
      { section: 'Opmerkingen' },
      { id:'notities', label:'Notities (optioneel)', textarea: true, placeholder:'Bijv. betalingstermijn, voorwaarden...' },
    ],
    factuur: [
      { section: 'Klantgegevens' },
      { id:'bedrijf',  label:'Bedrijfsnaam',       placeholder:'De Vries B.V.' },
      { id:'contact',  label:'Contactpersoon',      placeholder:'Dhr. De Vries' },
      { id:'email',    label:'E-mailadres',          placeholder:'info@devries.nl', type:'email' },
      { id:'adres',    label:'Adres',                placeholder:'Hoofdstraat 1, 1234 AB Amsterdam' },
      { id:'kvk',      label:'KvK-nummer',           placeholder:'12345678' },
      { id:'btwnum',   label:'BTW-nummer',           placeholder:'NL123456789B01' },
      { section: 'Factuurdetails' },
      { id:'nummer',   label:'Factuurnummer',        placeholder:'FACT-2026-001' },
      { id:'datum',    label:'Factuurdatum',         type:'date', default: today() },
      { id:'verval',   label:'Vervaldatum',          type:'date', default: addDays(14) },
      { id:'iban',     label:'IBAN',                 placeholder:'NL91 ABNA 0417 ...' },
      { id:'ref',      label:'Referentie / Project', placeholder:'Website Business pakket' },
      { section: 'Regelomschrijvingen', isRegels: true },
      { section: 'Opmerkingen' },
      { id:'notities', label:'Notities (optioneel)', textarea: true, placeholder:'Bijv. betaalverzoek...' },
    ],
    herinnering: [
      { section: 'Klantgegevens' },
      { id:'bedrijf',  label:'Bedrijfsnaam',         placeholder:'De Vries B.V.' },
      { id:'contact',  label:'Contactpersoon',        placeholder:'Dhr. De Vries' },
      { id:'email',    label:'E-mailadres',            placeholder:'info@devries.nl', type:'email' },
      { id:'adres',    label:'Adres',                  placeholder:'Hoofdstraat 1, 1234 AB Amsterdam' },
      { section: 'Factuurgegevens' },
      { id:'factnr',   label:'Factuurnummer',          placeholder:'FACT-2026-001' },
      { id:'factdatum',label:'Factuurdatum',           type:'date', default: addDays(-30) },
      { id:'verval',   label:'Vervallen op',           type:'date', default: addDays(-16) },
      { id:'bedrag',   label:'Openstaand bedrag',      placeholder:'€ 1.813,50' },
      { id:'nieuwdat', label:'Nieuwe betaaldatum',     type:'date', default: addDays(7) },
      { id:'iban',     label:'IBAN',                   placeholder:'NL91 ABNA 0417 ...' },
      { id:'htype',    label:'Type herinnering',       select: ['1e Herinnering - vriendelijk','2e Herinnering - dringend','Aanmaning - formeel'] },
      { section: 'Toelichting' },
      { id:'notities', label:'Persoonlijke boodschap (optioneel)', textarea: true, placeholder:'Bijv. mochten er vragen zijn...' },
    ],
  };

  const config = types[docType];
  let html = '';
  config.forEach(f => {
    if (f.section && !f.isRegels) {
      html += `<div class="section-title">${f.section}</div>`;
    } else if (f.isRegels) {
      html += `<div class="section-title">Regelomschrijvingen</div><div id="regels-wrap"></div><button class="btn-add-regel" onclick="addRegel()">+ Regel toevoegen</button>`;
    } else if (f.select) {
      html += `<div class="field"><label>${f.label}</label><select id="f-${f.id}" onchange="update()">${f.select.map((o,i)=>`<option value="${i+1}">${o}</option>`).join('')}</select></div>`;
    } else if (f.textarea) {
      html += `<div class="field"><label>${f.label}</label><textarea id="f-${f.id}" placeholder="${f.placeholder||''}" oninput="update()"></textarea></div>`;
    } else {
      html += `<div class="field"><label>${f.label}</label><input type="${f.type||'text'}" id="f-${f.id}" placeholder="${f.placeholder||''}" oninput="update()" ${f.default?`value="${f.default}"`:''}></div>`;
    }
  });

  panel.innerHTML = html;

  // cache field refs
  panel.querySelectorAll('input,textarea,select').forEach(el => {
    const id = el.id.replace('f-','');
    fields[id] = el;
  });

  renderRegels();
  update();
}

// -- REGELS --
function renderRegels() {
  const wrap = document.getElementById('regels-wrap');
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="regel-header"><span>Omschrijving</span><span>Aantal</span><span>Prijs</span><span></span></div>
    ${regels.map(r => `
      <div class="regel">
        <input type="text" value="${r.omschrijving}" placeholder="Dienst..." oninput="updateRegel(${r.id},'omschrijving',this.value)">
        <input type="number" value="${r.aantal}" min="1" oninput="updateRegel(${r.id},'aantal',this.value)">
        <input type="number" value="${r.prijs||''}" placeholder="0,00" step="0.01" oninput="updateRegel(${r.id},'prijs',this.value)">
        <button class="btn-remove-regel" onclick="removeRegel(${r.id})">x</button>
      </div>`).join('')}`;
}

function addRegel() { regels.push({id:rc++,omschrijving:'',aantal:1,prijs:0}); renderRegels(); update(); }
function removeRegel(id) { if(regels.length>1) regels=regels.filter(r=>r.id!==id); renderRegels(); update(); }
function updateRegel(id, field, val) {
  const r=regels.find(r=>r.id===id); if(!r) return;
  r[field] = field==='omschrijving' ? val : (parseFloat(val)||0);
  update();
}

function getSubtotal() { return regels.reduce((s,r)=>s+r.aantal*r.prijs,0); }

// -- PREVIEW --
function update() {
  const a4 = document.getElementById('a4');

  if (docType === 'offerte' || docType === 'factuur') {
    const isOff = docType === 'offerte';
    const sub = getSubtotal(), btw = sub*.21, grand = sub+btw;
    const numLabel = isOff ? 'Offertenummer' : 'Factuurnummer';
    const datLabel = isOff ? 'Datum' : 'Factuurdatum';
    const d3label  = isOff ? 'Geldig tot' : 'Vervaldatum';
    const d3val    = isOff ? fmtDate(v('geldig')) : fmtDate(v('verval'));
    const d4label  = isOff ? 'Onderwerp' : 'Referentie';
    const d4val    = isOff ? (v('onderwerp')||'—') : (v('ref')||'—');
    const addr2extra = !isOff && v('btwnum') ? `<div class="pdf-addr-line">BTW: ${v('btwnum')}</div>` : '';

function scheduleFitPreview() {
  requestAnimationFrame(function () {
    requestAnimationFrame(fitPreview);
  });
}

function fitPreview() {
  const stage = document.getElementById('a4-stage');
  const wrap = document.getElementById('a4-scale-wrap');
  const a4 = document.getElementById('a4');
  if (!stage || !wrap || !a4) return;

  if (window.innerWidth <= 900) {
    a4.style.transform = '';
    wrap.style.width = '';
    wrap.style.height = '';
    wrap.style.overflow = '';
    stage.style.minHeight = '';
    return;
  }

  const padX = 32;
  const padY = 24;
  const availW = Math.max(120, stage.clientWidth - padX);

  const baseW = 595;
  const baseH = Math.max(842, a4.offsetHeight || 842);

  // Keep the page visually large in fullscreen: fit on width, allow vertical scroll.
  let scale = Math.min(availW / baseW, 1);
  scale = Math.max(scale, 0.42);

  const scaledW = Math.ceil(baseW * scale);
  const scaledH = Math.ceil(baseH * scale);

  wrap.style.width = scaledW + 'px';
  wrap.style.height = scaledH + 'px';
  wrap.style.overflow = 'hidden';

  a4.style.transform = 'scale(' + scale + ')';
  a4.style.transformOrigin = 'top left';
  stage.style.minHeight = '';
}

  doc.save(`${docType}-${new Date().toISOString().split('T')[0]}.pdf`);
  showToast('✓ PDF gedownload');
}

function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

// init
buildForm();
window.addEventListener('resize', scheduleFitPreview);

(function initPreviewFit() {
  const stage = document.getElementById('a4-stage');
  if (!stage || typeof ResizeObserver === 'undefined') {
    window.addEventListener('load', scheduleFitPreview);
    return;
  }
  var ro = new ResizeObserver(function () {
    scheduleFitPreview();
  });
  ro.observe(stage);
  window.addEventListener('load', scheduleFitPreview);
})();
</script>

services:
  - type: web
    name: softora-sip-mixer-control
    env: node
    rootDir: .
    buildCommand: npm -C sip-mixer-control-service install
    startCommand: npm -C sip-mixer-control-service start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10001
      - key: SIP_MIXER_CONTROL_API_KEY
        sync: false
      - key: SIP_MIXER_ENGINE_MODE
        value: twilio_stream
      - key: SIP_MIXER_REQUEST_TIMEOUT_MS
        value: 15000
      - key: SIP_MIXER_PROFILE_ID
        value: default
      - key: SIP_MIXER_PUBLIC_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_OUTBOUND_CALLER_NUMBER
        sync: false
      - key: TWILIO_MEDIA_WS_URL
        sync: false

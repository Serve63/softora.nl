<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #080808;
      --panel: #0d0d0d;
      --text: #f5f5f5;
      --muted: #888;
      --border: rgba(255,255,255,0.06);
      --accent: #A62D65;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(139, 34, 82, 0.22), transparent 45%),
        radial-gradient(circle at 95% 5%, rgba(139, 34, 82, 0.10), transparent 40%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .card {
      width: min(640px, 92vw);
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 2rem;
    }

    h1 {
      font-family: Oswald, system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin: 0 0 0.8rem;
      line-height: 1;
      font-size: 2rem;
    }

    p { margin: 0 0 1.4rem; color: var(--muted); line-height: 1.7; }

    a {
      color: var(--accent);
      text-decoration: none;
      font-family: Oswald, system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card" id="fallback">
    <h1>Preview niet gevonden</h1>
    <p>Deze preview staat (nog) niet lokaal opgeslagen. Ga terug naar Actieve Opdrachten en voer de opdracht opnieuw uit.</p>
    <a href="/premium-actieve-opdrachten">Terug naar Actieve Opdrachten</a>
  </div>

  <script>
    (function () {
      const PREVIEW_HTML_PREFIX = 'softora_preview_html_premium_v4_';
      const PREVIEW_HTML_PREFIX_OLD = 'softora_preview_html_premium_v2_';
      const ORDER_STATE_KEY = 'softora_order_state_premium_v1';
      const BUILD_MODE_KEY = 'softora_build_mode_premium_v1';
      const CUSTOM_ORDERS_KEY = 'softora_custom_orders_premium_v1';
      const ORDER_RUNTIME_KEY = 'softora_order_runtime_premium_v1';
      const REMOTE_UI_STATE_SCOPE = 'premium_active_orders';
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) return;

      function encodeBase64Utf8(value) {
        const input = String(value || '');
        const bytes = new TextEncoder().encode(input);
        let binary = '';
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
          binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
        }
        return btoa(binary);
      }

      function buildPreviewControlsScript(state) {
        return `<script>
          (function () {
            const state = ${JSON.stringify(state)};
            const UI_STATE_SCOPE = ${JSON.stringify(REMOTE_UI_STATE_SCOPE)};
            const CUSTOM_ORDERS_KEY = ${JSON.stringify(CUSTOM_ORDERS_KEY)};
            const ORDER_RUNTIME_KEY = ${JSON.stringify(ORDER_RUNTIME_KEY)};
            const ORDER_STATE_KEY = ${JSON.stringify(ORDER_STATE_KEY)};
            const BUILD_MODE_KEY = ${JSON.stringify(BUILD_MODE_KEY)};
            const PREVIEW_HTML_KEY = ${JSON.stringify(PREVIEW_HTML_PREFIX)} + String(state.orderId);
            const overlayMessages = [
              'Briefing analyseren...',
              'Nieuwe variant ontwerpen...',
              'HTML en styling opbouwen...',
              'Laatste polish en controle...'
            ];
            let overlayTimer = null;

            function decodeBase64Utf8(value) {
              const binary = atob(String(value || ''));
              const bytes = Uint8Array.from(binary, function (char) { return char.charCodeAt(0); });
              return new TextDecoder().decode(bytes);
            }

            function safeJsonParse(raw, fallback) {
              try {
                return JSON.parse(raw);
              } catch (_) {
                return fallback;
              }
            }

            function escapeHtml(value) {
              return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
            }

            function getTime() {
              return new Date().toLocaleTimeString('nl-NL', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
              });
            }

            async function fetchUiStateGetWithFallback(scope) {
              const encodedScope = encodeURIComponent(String(scope || ''));
              const urls = [
                '/api/ui-state-get?scope=' + encodedScope,
                '/api/ui-state/' + encodedScope
              ];
              let lastError = null;

              for (const url of urls) {
                try {
                  const res = await fetch(url, {
                    method: 'GET',
                    cache: 'no-store'
                  });
                  if (!res.ok) throw new Error('UI-state GET mislukt (' + res.status + ')');
                  return await res.json().catch(function () { return {}; });
                } catch (error) {
                  lastError = error;
                }
              }

              throw lastError || new Error('UI-state GET mislukt');
            }

            async function fetchUiStateSetWithFallback(scope, body) {
              const encodedScope = encodeURIComponent(String(scope || ''));
              const urls = [
                '/api/ui-state-set?scope=' + encodedScope,
                '/api/ui-state/' + encodedScope
              ];
              let lastError = null;

              for (const url of urls) {
                try {
                  const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body || {})
                  });
                  if (!res.ok) throw new Error('UI-state POST mislukt (' + res.status + ')');
                  return await res.json().catch(function () { return {}; });
                } catch (error) {
                  lastError = error;
                }
              }

              throw lastError || new Error('UI-state POST mislukt');
            }

            async function postGenerateSiteRequest(payload) {
              const endpoints = [
                '/api/active-order-generate-site',
                '/api/active-orders/generate-site'
              ];
              let lastError = null;

              for (const endpoint of endpoints) {
                const controller = new AbortController();
                const timer = window.setTimeout(function () {
                  controller.abort();
                }, 180000);

                try {
                  const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload || {}),
                    signal: controller.signal,
                    cache: 'no-store'
                  });
                  const data = await res.json().catch(function () { return {}; });
                  if (!res.ok || !data || !data.ok) {
                    throw new Error(String((data && (data.detail || data.error)) || ('Website generatie mislukt (' + res.status + ')')));
                  }
                  return data;
                } catch (error) {
                  if (String(error && error.name || '') === 'AbortError') {
                    lastError = new Error('Timeout: AI website generatie duurde te lang.');
                  } else {
                    lastError = error;
                  }
                } finally {
                  window.clearTimeout(timer);
                }
              }

              throw lastError || new Error('Website generatie mislukt.');
            }

            function buildFallbackSitePrompt(order) {
              const company = String(order && order.clientName || 'bedrijf').trim();
              const title = String(order && order.title || 'website').trim();
              const description = String(order && order.description || '').trim();
              return [
                'Bouw een complete professionele HTML website voor ' + company + '.',
                'Projecttitel: ' + title + '.',
                description ? ('Context: ' + description) : '',
                'Lever een volledig HTML-bestand met inline CSS en eventuele inline JavaScript.',
                'Eisen: responsive, duidelijke CTA, contactsectie, nette typografie, semantische HTML.',
                'Taal van de website: Nederlands.',
                'Output: alleen geldige HTML code zonder markdown.'
              ].filter(Boolean).join('\\n');
            }

            function copyText(text) {
              const value = String(text || '');
              if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                return navigator.clipboard.writeText(value);
              }
              return new Promise(function (resolve, reject) {
                try {
                  const input = document.createElement('textarea');
                  input.value = value;
                  input.setAttribute('readonly', 'readonly');
                  input.style.position = 'fixed';
                  input.style.opacity = '0';
                  input.style.pointerEvents = 'none';
                  document.body.appendChild(input);
                  input.focus();
                  input.select();
                  const ok = document.execCommand('copy');
                  input.remove();
                  if (!ok) throw new Error('Kopieren mislukt.');
                  resolve();
                } catch (error) {
                  reject(error);
                }
              });
            }

            function createChrome() {
              const host = document.createElement('div');
              host.id = 'softora-preview-host';
              host.style.cssText = [
                'all: initial',
                'position: fixed',
                'top: 18px',
                'left: 18px',
                'z-index: 2147483647',
                'font-family: Inter, system-ui, sans-serif'
              ].join(';');
              document.documentElement.appendChild(host);

              const shadow = host.attachShadow({ mode: 'open' });
              shadow.innerHTML = \`
                <style>
                  :host, * { box-sizing: border-box; }
                  .toolbar {
                    display: flex;
                    align-items: center;
                    gap: 12px;
                  }
                  .btn {
                    appearance: none;
                    border: 1px solid rgba(18, 32, 58, 0.12);
                    background: rgba(255, 255, 255, 0.94);
                    color: #11203a;
                    border-radius: 14px;
                    padding: 12px 16px;
                    font: 700 13px/1.1 Inter, system-ui, sans-serif;
                    letter-spacing: 0.04em;
                    text-transform: uppercase;
                    cursor: pointer;
                    box-shadow: 0 18px 45px rgba(17, 32, 58, 0.18);
                    backdrop-filter: blur(20px);
                    display: inline-flex;
                    align-items: center;
                    gap: 8px;
                    transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, color 0.16s ease, opacity 0.16s ease;
                  }
                  .btn:hover:not(:disabled) {
                    transform: translateY(-1px);
                    box-shadow: 0 20px 52px rgba(17, 32, 58, 0.24);
                  }
                  .btn:disabled {
                    opacity: 0.55;
                    cursor: progress;
                  }
                  .btn.variant {
                    background: linear-gradient(135deg, #133c78, #2f67c1);
                    border-color: rgba(28, 78, 164, 0.32);
                    color: #fff;
                  }
                  .btn.copy {
                    background: rgba(255, 255, 255, 0.92);
                    color: #18345d;
                  }
                  .btn svg {
                    width: 15px;
                    height: 15px;
                    flex-shrink: 0;
                  }
                  .overlay {
                    position: fixed;
                    inset: 0;
                    display: none;
                    align-items: center;
                    justify-content: center;
                    padding: 24px;
                    background: rgba(7, 16, 31, 0.64);
                    backdrop-filter: blur(12px);
                  }
                  .overlay.show {
                    display: flex;
                  }
                  .panel {
                    width: min(520px, calc(100vw - 40px));
                    border-radius: 24px;
                    padding: 28px 28px 24px;
                    background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(241,246,255,0.97));
                    color: #11203a;
                    box-shadow: 0 30px 90px rgba(7, 16, 31, 0.25);
                    border: 1px solid rgba(17, 32, 58, 0.08);
                  }
                  .eyebrow {
                    margin: 0 0 10px;
                    color: #2f67c1;
                    font: 800 12px/1 Inter, system-ui, sans-serif;
                    letter-spacing: 0.12em;
                    text-transform: uppercase;
                  }
                  .title {
                    margin: 0 0 10px;
                    color: #0e1a2e;
                    font: 800 34px/1.02 Inter, system-ui, sans-serif;
                    letter-spacing: -0.03em;
                  }
                  .desc {
                    margin: 0;
                    color: rgba(17, 32, 58, 0.74);
                    font: 500 16px/1.6 Inter, system-ui, sans-serif;
                  }
                  .row {
                    margin-top: 22px;
                    display: flex;
                    align-items: center;
                    gap: 12px;
                  }
                  .spinner {
                    width: 18px;
                    height: 18px;
                    border-radius: 999px;
                    border: 2px solid rgba(47, 103, 193, 0.18);
                    border-top-color: #2f67c1;
                    animation: spin 0.9s linear infinite;
                    flex-shrink: 0;
                  }
                  .status {
                    color: #153059;
                    font: 700 14px/1.4 Inter, system-ui, sans-serif;
                    letter-spacing: 0.02em;
                  }
                  .meta {
                    margin-top: 18px;
                    padding-top: 16px;
                    border-top: 1px solid rgba(17, 32, 58, 0.08);
                    color: rgba(17, 32, 58, 0.48);
                    font: 600 12px/1.5 Inter, system-ui, sans-serif;
                    letter-spacing: 0.03em;
                    text-transform: uppercase;
                  }
                  .actions {
                    margin-top: 18px;
                    display: none;
                    justify-content: flex-end;
                  }
                  .actions.show {
                    display: flex;
                  }
                  .ghost {
                    appearance: none;
                    border: 1px solid rgba(17, 32, 58, 0.14);
                    background: transparent;
                    color: #153059;
                    border-radius: 12px;
                    padding: 10px 14px;
                    font: 700 12px/1 Inter, system-ui, sans-serif;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
                    cursor: pointer;
                  }
                  .overlay.error .spinner {
                    display: none;
                  }
                  .overlay.error .eyebrow {
                    color: #b42318;
                  }
                  .overlay.error .title {
                    color: #7a1010;
                  }
                  .overlay.error .status {
                    color: #8e1c1c;
                  }
                  @keyframes spin {
                    to { transform: rotate(360deg); }
                  }
                  @media (max-width: 640px) {
                    .toolbar {
                      flex-direction: column;
                      align-items: stretch;
                    }
                    .btn {
                      width: 100%;
                      justify-content: center;
                    }
                    .panel {
                      padding: 24px 22px 20px;
                    }
                    .title {
                      font-size: 28px;
                    }
                  }
                </style>
                <div class="toolbar">
                  <button class="btn variant" id="variantBtn" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 0 0 4.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 0 1-15.357-2m15.357 2H15"></path>
                    </svg>
                    Nieuwe variant
                  </button>
                  <button class="btn copy" id="copyBtn" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    HTML copy
                  </button>
                </div>
                <div class="overlay" id="overlay" aria-live="polite">
                  <div class="panel">
                    <p class="eyebrow" id="overlayEyebrow">Nieuwe variant</p>
                    <h2 class="title" id="overlayTitle">Website wordt opnieuw gebouwd</h2>
                    <p class="desc" id="overlayDesc">De AI maakt nu een verse variant van deze pagina. Dit tabblad ververst automatisch zodra de nieuwe versie klaarstaat.</p>
                    <div class="row">
                      <div class="spinner"></div>
                      <div class="status" id="overlayStatus">Briefing analyseren...</div>
                    </div>
                    <div class="meta" id="overlayMeta">Opdracht #\${escapeHtml(String(state.orderId || ''))}</div>
                    <div class="actions" id="overlayActions">
                      <button class="ghost" id="closeOverlayBtn" type="button">Sluiten</button>
                    </div>
                  </div>
                </div>
              \`;

              return {
                shadow: shadow,
                variantBtn: shadow.getElementById('variantBtn'),
                copyBtn: shadow.getElementById('copyBtn'),
                overlay: shadow.getElementById('overlay'),
                overlayEyebrow: shadow.getElementById('overlayEyebrow'),
                overlayTitle: shadow.getElementById('overlayTitle'),
                overlayDesc: shadow.getElementById('overlayDesc'),
                overlayStatus: shadow.getElementById('overlayStatus'),
                overlayMeta: shadow.getElementById('overlayMeta'),
                overlayActions: shadow.getElementById('overlayActions'),
                closeOverlayBtn: shadow.getElementById('closeOverlayBtn')
              };
            }

            const ui = createChrome();

            function setButtonsDisabled(disabled) {
              ui.variantBtn.disabled = Boolean(disabled);
              ui.copyBtn.disabled = Boolean(disabled);
            }

            function setOverlayVisible(visible) {
              ui.overlay.classList.toggle('show', Boolean(visible));
              document.documentElement.style.overflow = visible ? 'hidden' : '';
              document.body.style.overflow = visible ? 'hidden' : '';
            }

            function startOverlay(message) {
              window.clearInterval(overlayTimer);
              ui.overlay.classList.remove('error');
              ui.overlayActions.classList.remove('show');
              ui.overlayEyebrow.textContent = 'Nieuwe variant';
              ui.overlayTitle.textContent = 'Website wordt opnieuw gebouwd';
              ui.overlayDesc.textContent = 'De AI maakt nu een verse variant van deze pagina. Dit tabblad ververst automatisch zodra de nieuwe versie klaarstaat.';
              ui.overlayStatus.textContent = message || overlayMessages[0];
              ui.overlayMeta.textContent = 'Opdracht #' + String(state.orderId || '');
              setOverlayVisible(true);

              let index = 0;
              overlayTimer = window.setInterval(function () {
                index = (index + 1) % overlayMessages.length;
                ui.overlayStatus.textContent = overlayMessages[index];
              }, 1600);
            }

            function finishOverlay(message) {
              window.clearInterval(overlayTimer);
              ui.overlay.classList.remove('error');
              ui.overlayActions.classList.remove('show');
              ui.overlayEyebrow.textContent = 'Klaar';
              ui.overlayTitle.textContent = 'Nieuwe variant staat klaar';
              ui.overlayDesc.textContent = 'De pagina wordt nu vernieuwd met de nieuwe HTML.';
              ui.overlayStatus.textContent = message || 'Nieuwe website laden...';
              ui.overlayMeta.textContent = 'Opdracht #' + String(state.orderId || '');
              setOverlayVisible(true);
            }

            function showOverlayError(message) {
              window.clearInterval(overlayTimer);
              ui.overlay.classList.add('error');
              ui.overlayActions.classList.add('show');
              ui.overlayEyebrow.textContent = 'Generatie mislukt';
              ui.overlayTitle.textContent = 'Nieuwe variant kon niet worden gebouwd';
              ui.overlayDesc.textContent = 'De huidige preview blijft staan. Sluit dit venster en probeer het opnieuw zodra de API weer reageert.';
              ui.overlayStatus.textContent = String(message || 'Onbekende fout');
              ui.overlayMeta.textContent = 'Opdracht #' + String(state.orderId || '');
              setOverlayVisible(true);
            }

            function readCustomOrders(values) {
              const parsed = safeJsonParse(String(values && values[CUSTOM_ORDERS_KEY] || '[]'), []);
              return Array.isArray(parsed) ? parsed : [];
            }

            function readRuntime(values) {
              const parsed = safeJsonParse(String(values && values[ORDER_RUNTIME_KEY] || '{}'), {});
              return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
            }

            function resolveBuildMode(values) {
              const value = String(values && values[BUILD_MODE_KEY] || '').trim().toLowerCase();
              return value === 'quick' ? 'quick' : 'premium';
            }

            function findOrderRecord(values) {
              const orders = readCustomOrders(values);
              const match = orders.find(function (item) {
                return Number(item && item.id) === Number(state.orderId);
              });
              if (!match) throw new Error('Opdrachtdata niet gevonden voor deze preview.');
              return match;
            }

            async function persistVariantMetadata(values, order, result, promptUsed) {
              const customOrders = readCustomOrders(values);
              const runtime = readRuntime(values);
              const orderIndex = customOrders.findIndex(function (item) {
                return Number(item && item.id) === Number(state.orderId);
              });
              const apiCost = result && result.apiCost || {};
              const nowIso = new Date().toISOString();
              const nextOrder = {
                ...(order || {}),
                prompt: String(promptUsed || ''),
                apiCostEur: Number.isFinite(Number(apiCost && apiCost.eur)) ? Number(apiCost.eur) : null,
                apiCostUsd: Number.isFinite(Number(apiCost && apiCost.usd)) ? Number(apiCost.usd) : null,
                apiTokensInput: Number.isFinite(Number(apiCost && apiCost.promptTokens)) ? Number(apiCost.promptTokens) : null,
                apiTokensOutput: Number.isFinite(Number(apiCost && apiCost.completionTokens)) ? Number(apiCost.completionTokens) : null,
                apiModel: String((result && result.model) || (apiCost && apiCost.model) || ''),
                lastRunAt: nowIso,
                status: 'klaar'
              };

              if (orderIndex >= 0) {
                customOrders[orderIndex] = nextOrder;
              }

              const existingRuntime = runtime[String(state.orderId)] && typeof runtime[String(state.orderId)] === 'object'
                ? runtime[String(state.orderId)]
                : {};
              const logs = Array.isArray(existingRuntime.logs) ? existingRuntime.logs.slice(-199) : [];
              logs.push({
                time: getTime(),
                msg: 'Nieuwe variant gegenereerd vanuit preview.',
                highlight: true
              });

              runtime[String(state.orderId)] = {
                name: String(nextOrder.clientName || existingRuntime.name || ''),
                type: String(nextOrder.title || existingRuntime.type || ''),
                logs: logs,
                progressPct: 100,
                statusKey: 'klaar',
                updatedAt: Date.now()
              };

              const patch = {
                [ORDER_RUNTIME_KEY]: JSON.stringify(runtime),
                [ORDER_STATE_KEY]: JSON.stringify({
                  lastOrderId: String(state.orderId),
                  updatedAt: nowIso
                })
              };
              if (orderIndex >= 0) {
                patch[CUSTOM_ORDERS_KEY] = JSON.stringify(customOrders);
              }

              await fetchUiStateSetWithFallback(UI_STATE_SCOPE, {
                patch: patch,
                source: 'premium-opdracht-preview',
                actor: 'browser'
              });
            }

            async function generateNewVariant() {
              setButtonsDisabled(true);
              startOverlay('Briefing analyseren...');

              try {
                const uiState = await fetchUiStateGetWithFallback(UI_STATE_SCOPE);
                if (!uiState || !uiState.ok || !uiState.values) {
                  throw new Error('Opdrachtdata kon niet worden geladen.');
                }

                const values = uiState.values;
                const order = findOrderRecord(values);
                const prompt = String(order && order.prompt || '').trim() || buildFallbackSitePrompt(order);
                const result = await postGenerateSiteRequest({
                  orderId: Number(state.orderId),
                  company: String(order && order.clientName || 'Bedrijf'),
                  title: String(order && order.title || 'Project'),
                  description: String(order && order.description || ''),
                  prompt: prompt,
                  buildMode: resolveBuildMode(values),
                  language: 'nl'
                });

                const html = String(result && result.html || '');
                if (!html) throw new Error('AI gaf geen HTML terug.');

                localStorage.setItem(PREVIEW_HTML_KEY, html);
                await persistVariantMetadata(values, order, result, prompt);

                finishOverlay('Nieuwe website laden...');
                window.setTimeout(function () {
                  window.location.reload();
                }, 450);
              } catch (error) {
                showOverlayError(String(error && error.message || 'Website generatie mislukt.'));
                setButtonsDisabled(false);
              }
            }

            async function copyHtml() {
              const originalHtml = decodeBase64Utf8(String(state.htmlBase64 || ''));
              const originalLabel = ui.copyBtn.innerHTML;
              try {
                await copyText(originalHtml);
                ui.copyBtn.textContent = 'HTML gekopieerd';
                window.setTimeout(function () {
                  ui.copyBtn.innerHTML = originalLabel;
                }, 1800);
              } catch (error) {
                ui.copyBtn.textContent = 'Kopieren mislukt';
                window.setTimeout(function () {
                  ui.copyBtn.innerHTML = originalLabel;
                }, 1800);
              }
            }

            ui.variantBtn.addEventListener('click', function () {
              void generateNewVariant();
            });

            ui.copyBtn.addEventListener('click', function () {
              void copyHtml();
            });

            ui.closeOverlayBtn.addEventListener('click', function () {
              setOverlayVisible(false);
              setButtonsDisabled(false);
            });
          })();
        <\/script>`;
      }

      function injectPreviewChrome(html, orderId) {
        const controlsScript = buildPreviewControlsScript({
          orderId: String(orderId),
          htmlBase64: encodeBase64Utf8(html)
        });
        if (/<\/body>/i.test(html)) {
          return html.replace(/<\/body>/i, controlsScript + '</body>');
        }
        if (/<\/html>/i.test(html)) {
          return html.replace(/<\/html>/i, controlsScript + '</html>');
        }
        return html + controlsScript;
      }

      let html = null;
      try {
        html = localStorage.getItem(PREVIEW_HTML_PREFIX + id);
        if (!html) html = localStorage.getItem(PREVIEW_HTML_PREFIX_OLD + id);
      } catch (_) {
        html = null;
      }

      if (!html) return;

      html = injectPreviewChrome(html, id);
      document.open();
      document.write(html);
      document.close();
    })();
  </script>
</body>
</html>

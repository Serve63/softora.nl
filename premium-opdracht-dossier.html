<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softora | Uitvoerdossier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/personnel-theme.css">
    <script>
        (function () {
            document.documentElement.setAttribute("data-personnel-loading", "true");
            try {
                localStorage.setItem("softora_premium_personnel_theme_mode", "light");
                localStorage.setItem("softora_premium_public_theme_mode", "light");
                document.documentElement.setAttribute("data-theme-mode", "light");
                document.documentElement.setAttribute("data-theme", "light");
            } catch (_) {
                // ignore storage errors
            }
        })();
    </script>
    <script src="assets/personnel-theme.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #181d33;
            --muted: #687089;
            --line: rgba(26, 31, 52, 0.14);
            --accent: #8b2252;
            --accent-deep: #6f1a42;
            --paper-bg: #ffffff;
            --canvas-bg: #ececf1;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 10% 0%, rgba(139, 34, 82, 0.16), transparent 34%), var(--canvas-bg);
            overflow: hidden;
        }

        .dashboard-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            margin-left: 280px;
            width: calc(100% - 280px);
            height: 100vh;
            padding: 0.95rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dossier-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .dossier-page {
            width: min(100%, calc((100vh - 1.9rem) * 0.707));
            max-width: 794px;
            height: calc(100vh - 1.9rem);
            max-height: 1123px;
            min-height: 610px;
            background: var(--paper-bg);
            border: 1px solid rgba(26, 31, 52, 0.16);
            border-radius: 12px;
            box-shadow: 0 18px 48px rgba(16, 19, 34, 0.14);
            overflow: hidden;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .brand-bar {
            background: linear-gradient(136deg, var(--accent-deep), var(--accent));
            color: #fff;
            padding: 0.72rem 0.9rem 0.66rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.72rem;
        }

        .brand-logo {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .brand-sub {
            margin-top: 0.2rem;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .brand-meta {
            text-align: right;
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.45;
            opacity: 0.95;
        }

        .page-body {
            padding: 0.8rem 0.9rem;
            display: grid;
            gap: 0.42rem;
            align-content: start;
            overflow: hidden;
        }

        .loading,
        .error {
            width: min(100%, calc((100vh - 1.9rem) * 0.707));
            max-width: 794px;
            min-height: 220px;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 1rem;
            color: var(--muted);
            line-height: 1.55;
        }

        .error {
            color: #8f2f51;
            border-color: rgba(139, 34, 82, 0.24);
            background: rgba(139, 34, 82, 0.06);
        }

        .top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .top-row > div:first-child {
            min-width: 0;
            flex: 1 1 auto;
        }

        .eyebrow {
            font-family: 'Oswald', sans-serif;
            font-size: 0.59rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #838aa0;
        }

        .title {
            margin-top: 0.18rem;
            font-family: 'Oswald', sans-serif;
            font-size: clamp(0.98rem, 2vw, 1.46rem);
            line-height: 1.04;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #171b2f;
            max-width: 32ch;
        }

        .subtitle {
            margin-top: 0.24rem;
            color: var(--muted);
            font-size: 0.64rem;
            line-height: 1.38;
            max-width: 58ch;
        }

        .actions {
            display: flex;
            gap: 0.34rem;
            flex-wrap: nowrap;
            justify-content: flex-end;
            flex: 0 0 auto;
        }

        .btn {
            appearance: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0.36rem 0.5rem;
            font-size: 0.53rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: none;
            cursor: pointer;
            color: #1e243a;
            background: rgba(255, 255, 255, 0.95);
        }

        .btn-primary {
            background: linear-gradient(136deg, var(--accent-deep), var(--accent));
            color: #fff;
            border-color: transparent;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.35rem;
        }

        .meta-item {
            border: 1px solid var(--line);
            background: #fbfcff;
            border-radius: 8px;
            padding: 0.36rem 0.44rem;
            min-height: 50px;
        }

        .meta-label {
            font-size: 0.53rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8a91a6;
        }

        .meta-value {
            margin-top: 0.14rem;
            font-size: 0.71rem;
            line-height: 1.28;
            color: #1f2438;
            word-break: break-word;
        }

        .section {
            border: 1px solid var(--line);
            background: #fafbff;
            border-radius: 8px;
            padding: 0.34rem 0.44rem;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.48rem;
            margin-bottom: 0.18rem;
        }

        .section-title {
            font-family: 'Oswald', sans-serif;
            font-size: 0.64rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #7d8499;
        }

        .wishes-text {
            font-size: 0.66rem;
            line-height: 1.34;
            color: #1f243a;
            word-break: break-word;
            max-height: 88px;
            overflow: hidden;
        }

        .prompt-box {
            border: 1px solid rgba(26, 31, 52, 0.16);
            border-radius: 8px;
            background: #fff;
            color: #1f243a;
            font-size: 0.62rem;
            line-height: 1.28;
            padding: 0.42rem;
            white-space: pre-wrap;
            overflow: hidden;
            height: 146px;
        }

        .copy-status {
            margin-top: 0.2rem;
            font-size: 0.55rem;
            color: var(--muted);
            min-height: 1em;
        }

        @media (max-width: 1200px) {
            .title {
                font-size: clamp(0.92rem, 1.95vw, 1.32rem);
            }

            .subtitle {
                font-size: 0.6rem;
            }

            .wishes-text,
            .prompt-box {
                font-size: 0.59rem;
            }
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .sidebar {
                position: static;
                width: 100%;
                height: auto;
            }

            .dashboard-layout {
                display: block;
                height: auto;
                overflow: visible;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                height: auto;
                min-height: 100vh;
                overflow: visible;
                display: block;
                padding: 0.75rem;
            }

            .dossier-wrap {
                height: auto;
                display: block;
            }

            .dossier-page {
                width: 100%;
                height: auto;
                min-height: auto;
                max-height: none;
                border-radius: 12px;
            }

            .loading,
            .error {
                width: 100%;
            }

            .meta-grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-wrap: wrap;
            }

            .wishes-text {
                max-height: none;
            }

            .prompt-box {
                height: auto;
            }
        }

        @media print {
            @page {
                size: A4;
                margin: 9mm;
            }

            html,
            body {
                overflow: visible !important;
                height: auto !important;
                background: #fff !important;
            }

            .sidebar,
            .screen-only {
                display: none !important;
            }

            .dashboard-layout {
                display: block !important;
                height: auto !important;
            }

            .main-content {
                margin: 0 !important;
                width: 100% !important;
                height: auto !important;
                min-height: auto !important;
                padding: 0 !important;
                overflow: visible !important;
                display: block !important;
            }

            .dossier-wrap {
                width: 100% !important;
                height: auto !important;
                display: block !important;
            }

            .dossier-page {
                width: 100% !important;
                max-width: none !important;
                height: auto !important;
                min-height: auto !important;
                max-height: none !important;
                border: 1px solid #d8dbe5;
                border-radius: 0;
                box-shadow: none !important;
            }

            .brand-bar {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .meta-item,
            .section,
            .prompt-box {
                break-inside: avoid;
            }

            .wishes-text {
                max-height: none;
            }

            .prompt-box {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="dossier-wrap" id="dossierRoot">
                <div class="loading">Uitvoerdossier laden...</div>
            </div>
        </main>
    </div>

    <script>
        (function initDossierPage() {
            const REMOTE_SCOPE = 'premium_active_orders';
            const CUSTOM_ORDERS_KEY = 'softora_custom_orders_premium_v1';
            const ORDER_RUNTIME_KEY = 'softora_order_runtime_premium_v1';
            const root = document.getElementById('dossierRoot');

            function esc(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function safeJsonParse(value, fallback) {
                try {
                    const parsed = JSON.parse(String(value || ''));
                    return parsed === null || parsed === undefined ? fallback : parsed;
                } catch (_) {
                    return fallback;
                }
            }

            function normalizeText(value) {
                return String(value || '')
                    .replace(/\r/g, '\n')
                    .replace(/\s*\|\s*/g, '. ')
                    .replace(/\s*·\s*/g, '. ')
                    .replace(/[\t ]+/g, ' ')
                    .replace(/\n+/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
            }

            function truncateText(value, maxChars) {
                const text = String(value || '').trim();
                if (!text || !Number.isFinite(maxChars) || maxChars <= 0) return '';
                if (text.length <= maxChars) return text;
                const slice = text.slice(0, Math.max(0, maxChars)).trim();
                if (!slice) return '';
                const minUseful = Math.max(24, Math.floor(maxChars * 0.55));
                const punctMatches = [...slice.matchAll(/[.!?](?=\s|$)/g)];
                let end = -1;
                if (punctMatches.length > 0) {
                    end = punctMatches[punctMatches.length - 1].index;
                }
                if (Number.isFinite(end) && end >= minUseful) {
                    return slice.slice(0, end + 1).trim();
                }
                const lastSpace = slice.lastIndexOf(' ');
                const base = lastSpace >= minUseful ? slice.slice(0, lastSpace).trim() : slice;
                return /[.!?]$/.test(base) ? base : `${base}.`;
            }

            function formatDateTime(value) {
                const raw = String(value || '').trim();
                if (!raw) return '—';
                const asNumber = Number(raw);
                if (Number.isFinite(asNumber) && asNumber > 0) {
                    const d = new Date(asNumber);
                    return Number.isNaN(d.getTime()) ? raw : d.toLocaleString('nl-NL');
                }
                const d = new Date(raw);
                return Number.isNaN(d.getTime()) ? raw : d.toLocaleString('nl-NL');
            }

            function formatDateOnly(value) {
                const raw = String(value || '').trim();
                if (!raw) return new Date().toLocaleDateString('nl-NL');
                const asNumber = Number(raw);
                if (Number.isFinite(asNumber) && asNumber > 0) {
                    const d = new Date(asNumber);
                    return Number.isNaN(d.getTime()) ? new Date().toLocaleDateString('nl-NL') : d.toLocaleDateString('nl-NL');
                }
                const d = new Date(raw);
                return Number.isNaN(d.getTime()) ? new Date().toLocaleDateString('nl-NL') : d.toLocaleDateString('nl-NL');
            }

            async function fetchUiStateValues(scope) {
                const encoded = encodeURIComponent(String(scope || ''));
                const endpoints = [
                    `/api/ui-state-get?scope=${encoded}`,
                    `/api/ui-state/${encoded}`
                ];

                for (const endpoint of endpoints) {
                    try {
                        const response = await fetch(endpoint, { cache: 'no-store' });
                        if (!response.ok) continue;
                        const data = await response.json().catch(() => ({}));
                        if (data?.ok && data?.values && typeof data.values === 'object') {
                            return data.values;
                        }
                    } catch (_) {
                        // try next endpoint
                    }
                }
                return {};
            }

            function getOrderIdFromQuery() {
                const params = new URLSearchParams(window.location.search || '');
                const id = Number(params.get('id'));
                return Number.isFinite(id) && id > 0 ? id : 0;
            }

            function shouldAutoPrint() {
                const params = new URLSearchParams(window.location.search || '');
                return /^(1|true|yes)$/i.test(String(params.get('autoprint') || ''));
            }

            function renderError(message) {
                root.innerHTML = `<div class="error">${esc(message || 'Uitvoerdossier niet gevonden.')}</div>`;
            }

            function buildWishesText(order) {
                const description = normalizeText(order?.description || '');
                const transcript = normalizeText(order?.transcript || '');
                let merged = description;

                if (transcript) {
                    const transcriptPart = truncateText(transcript, 420);
                    if (merged) {
                        merged = `${merged} Aanvullend uit gesprek: ${transcriptPart}`;
                    } else {
                        merged = transcriptPart;
                    }
                }

                if (!merged) {
                    merged = 'Er zijn nog geen uitgebreide wensen vastgelegd. Gebruik dit dossier als startpunt en vul de klantwensen aan na direct klantcontact.';
                }

                return truncateText(merged, 420);
            }

            function buildOpusPrompt(data) {
                const company = String(data.company || 'Onbekend').trim() || 'Onbekend';
                const contact = String(data.contact || 'Onbekend').trim() || 'Onbekend';
                const title = String(data.title || 'Website opdracht').trim() || 'Website opdracht';
                const domainName = String(data.domainName || '').trim();
                const deliveryTime = String(data.deliveryTime || '').trim();
                const wishesText = truncateText(String(data.wishesText || '').trim(), 150);

                const lines = [
                    'Je bent senior webbouwer bij Softora. Werk deze opdracht uit in Claude Opus 4.6.',
                    '',
                    'Context:',
                    `- Bedrijf: ${company}`,
                    `- Contactpersoon: ${contact}`,
                    `- Opdracht: ${title}`,
                    `- Domein: ${domainName || 'nog niet bekend'}`,
                    `- Oplevertijd: ${deliveryTime || 'niet opgegeven'}`,
                    `- Klantwens: ${wishesText || 'nog niet volledig ingevuld'}`,
                    '',
                    'Lever exact dit op:',
                    '1) Uitvoerplan in duidelijke stappen (volgorde + prioriteit).',
                    '2) Volledige pagina- en sectiestructuur voor de website.',
                    '3) Direct bruikbare Nederlandse copy per sectie.',
                    '4) Korte lijst met ontbrekende info die nog bij klant opgehaald moet worden.',
                    '',
                    'Schrijf praktisch en concreet, zonder vage tekst.'
                ];

                return truncateText(lines.join('\n'), 720);
            }

            async function copyText(value) {
                const text = String(value || '');
                if (!text) return false;

                if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                    try {
                        await navigator.clipboard.writeText(text);
                        return true;
                    } catch (_) {
                        // fallback below
                    }
                }

                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.setAttribute('readonly', 'readonly');
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.select();
                    textarea.setSelectionRange(0, textarea.value.length);
                    const ok = document.execCommand('copy');
                    textarea.remove();
                    return Boolean(ok);
                } catch (_) {
                    return false;
                }
            }

            function renderDossier(orderId, customOrder, runtimeOrder) {
                const order = customOrder || {};
                const runtime = runtimeOrder || {};

                const title = String(order?.title || runtime?.type || `Opdracht #${orderId}`).trim();
                const company = String(order?.clientName || runtime?.name || 'Onbekend').trim();
                const contact = String(order?.location || '').trim();
                const domainName = String(order?.domainName || '').trim();
                const deliveryTime = String(order?.deliveryTime || '').trim();
                const claimedBy = String(order?.claimedBy || runtime?.claimedBy || '').trim();
                const claimedAt = String(order?.claimedAt || runtime?.claimedAt || '').trim();
                const orderDateLabel = formatDateOnly(claimedAt || Date.now());

                const wishesText = buildWishesText(order);
                const opusPrompt = buildOpusPrompt({
                    company,
                    contact,
                    title,
                    domainName,
                    deliveryTime,
                    wishesText
                });

                document.title = `Softora | Uitvoerdossier #${orderId}`;

                root.innerHTML = `
                    <article class="dossier-page">
                        <header class="brand-bar">
                            <div>
                                <div class="brand-logo">SOFTORA.NL</div>
                                <div class="brand-sub">Uitvoerdossier voor uitvoering</div>
                            </div>
                            <div class="brand-meta">
                                <div>Order #${esc(orderId)}</div>
                                <div>${esc(orderDateLabel)}</div>
                            </div>
                        </header>

                        <div class="page-body">
                            <div class="top-row">
                                <div>
                                    <div class="eyebrow">Uitvoerdossier</div>
                                    <h1 class="title">${esc(title || `Opdracht #${orderId}`)}</h1>
                                    <p class="subtitle">Compact 1-pagina dossier in Softora stijl met klantwensen en directe Claude Opus 4.6 prompt.</p>
                                </div>
                                <div class="actions screen-only">
                                    <button type="button" class="btn btn-primary" id="printBtn">Download PDF</button>
                                    <a class="btn" href="/premium-actieve-opdrachten">Terug</a>
                                </div>
                            </div>

                            <section class="meta-grid">
                                <div class="meta-item"><div class="meta-label">Bedrijf</div><div class="meta-value">${esc(company || '—')}</div></div>
                                <div class="meta-item"><div class="meta-label">Contactpersoon</div><div class="meta-value">${esc(contact || '—')}</div></div>
                                <div class="meta-item"><div class="meta-label">Domein</div><div class="meta-value">${esc(domainName || '—')}</div></div>
                                <div class="meta-item"><div class="meta-label">Oplevertijd</div><div class="meta-value">${esc(deliveryTime || '—')}</div></div>
                                <div class="meta-item"><div class="meta-label">Geclaimd door</div><div class="meta-value">${esc(claimedBy || '—')}</div></div>
                                <div class="meta-item"><div class="meta-label">Geclaimd op</div><div class="meta-value">${esc(formatDateTime(claimedAt))}</div></div>
                            </section>

                            <section class="section">
                                <div class="section-head">
                                    <h2 class="section-title">Wensen van de klant</h2>
                                </div>
                                <p class="wishes-text">${esc(wishesText)}</p>
                            </section>

                            <section class="section">
                                <div class="section-head">
                                    <h2 class="section-title">Prompt voor Claude Opus 4.6</h2>
                                    <button type="button" class="btn screen-only" id="copyPromptBtn">Kopieer prompt</button>
                                </div>
                                <pre class="prompt-box" id="opusPromptDisplay">${esc(opusPrompt)}</pre>
                                <div class="copy-status screen-only" id="copyStatus" aria-live="polite"></div>
                            </section>
                        </div>
                    </article>
                `;

                const printBtn = document.getElementById('printBtn');
                if (printBtn) {
                    printBtn.addEventListener('click', () => {
                        window.print();
                    });
                }

                const copyBtn = document.getElementById('copyPromptBtn');
                const copyStatus = document.getElementById('copyStatus');
                if (copyBtn && copyStatus) {
                    copyBtn.addEventListener('click', async () => {
                        const ok = await copyText(opusPrompt);
                        copyStatus.textContent = ok
                            ? 'Prompt gekopieerd. Direct plakken in Claude Opus 4.6.'
                            : 'Kopiëren mislukt. Kopieer handmatig uit het promptblok.';
                    });
                }
            }

            async function start() {
                const orderId = getOrderIdFromQuery();
                if (!orderId) {
                    renderError('Geen geldig order-ID meegegeven.');
                    return;
                }

                const values = await fetchUiStateValues(REMOTE_SCOPE);
                const customOrders = safeJsonParse(values?.[CUSTOM_ORDERS_KEY], []);
                const runtimeMap = safeJsonParse(values?.[ORDER_RUNTIME_KEY], {});
                const customOrder = Array.isArray(customOrders)
                    ? customOrders.find((item) => Number(item?.id) === orderId)
                    : null;
                const runtimeOrder = runtimeMap && typeof runtimeMap === 'object'
                    ? runtimeMap[String(orderId)] || null
                    : null;

                if (!customOrder && !runtimeOrder) {
                    renderError(`Geen dossierdata gevonden voor opdracht #${orderId}.`);
                    return;
                }

                renderDossier(orderId, customOrder, runtimeOrder);

                if (shouldAutoPrint()) {
                    window.setTimeout(() => {
                        window.print();
                    }, 340);
                }
            }

            void start();
        })();
    </script>
</body>
</html>

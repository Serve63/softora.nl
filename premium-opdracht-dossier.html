<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softora | Uitvoerdossier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/personnel-theme.css">
    <script>
        (function () {
            document.documentElement.setAttribute("data-personnel-loading", "true");
            try {
                localStorage.setItem("softora_premium_personnel_theme_mode", "light");
                localStorage.setItem("softora_premium_public_theme_mode", "light");
                document.documentElement.setAttribute("data-theme-mode", "light");
                document.documentElement.setAttribute("data-theme", "light");
            } catch (_) {
                // ignore storage errors
            }
        })();
    </script>
    <script src="assets/personnel-theme.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --surface: #ffffff;
            --ink: #1b1f33;
            --muted: #687089;
            --line: rgba(26, 31, 52, 0.12);
            --accent: #8b2252;
            --bg: #f6f6f8;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 0%, rgba(139, 34, 82, 0.12), transparent 34%),
                radial-gradient(circle at 98% 18%, rgba(139, 34, 82, 0.07), transparent 32%),
                var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            margin-left: 280px;
            width: calc(100% - 280px);
            min-height: 100vh;
            padding: clamp(0.9rem, 2.2vw, 1.5rem);
        }

        .dossier-wrap {
            width: min(900px, 100%);
            margin: 0 auto;
        }

        .dossier-page {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: clamp(0.95rem, 1.8vw, 1.25rem);
            display: grid;
            gap: 0.82rem;
        }

        .loading,
        .error {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 1rem;
            line-height: 1.55;
            color: var(--muted);
        }

        .error {
            color: #8f2f51;
            border-color: rgba(139, 34, 82, 0.24);
            background: rgba(139, 34, 82, 0.06);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .eyebrow {
            font-family: 'Oswald', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: #8a8fa3;
        }

        .title {
            margin-top: 0.22rem;
            font-family: 'Oswald', sans-serif;
            font-size: clamp(1.4rem, 2.3vw, 1.85rem);
            line-height: 1.04;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #171b2f;
        }

        .subtitle {
            margin-top: 0.4rem;
            color: var(--muted);
            font-size: 0.87rem;
            line-height: 1.45;
            max-width: 66ch;
        }

        .actions {
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            appearance: none;
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 0.52rem 0.78rem;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            text-decoration: none;
            cursor: pointer;
            color: #1e243a;
            background: rgba(255, 255, 255, 0.9);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b2252, #a62d65);
            color: #fff;
            border-color: transparent;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
        }

        .meta-item {
            border: 1px solid var(--line);
            background: #f8f9fc;
            border-radius: 10px;
            padding: 0.54rem 0.62rem;
        }

        .meta-label {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #8b92a6;
        }

        .meta-value {
            margin-top: 0.2rem;
            font-size: 0.83rem;
            color: #20253d;
            line-height: 1.35;
            word-break: break-word;
        }

        .section {
            border: 1px solid var(--line);
            background: #fafbfd;
            border-radius: 10px;
            padding: 0.68rem 0.76rem;
        }

        .section-title {
            font-family: 'Oswald', sans-serif;
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #868da2;
            margin-bottom: 0.38rem;
        }

        .wishes-text {
            font-size: 0.84rem;
            line-height: 1.5;
            color: #1f243a;
            white-space: normal;
            word-break: break-word;
        }

        .prompt-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.38rem;
        }

        .prompt-box {
            width: 100%;
            min-height: 205px;
            border: 1px solid rgba(26, 31, 52, 0.16);
            border-radius: 9px;
            background: #ffffff;
            color: #1f243a;
            font-family: 'Inter', sans-serif;
            font-size: 0.81rem;
            line-height: 1.45;
            padding: 0.62rem;
            resize: none;
            white-space: pre-wrap;
        }

        .copy-status {
            margin-top: 0.3rem;
            font-size: 0.72rem;
            color: var(--muted);
            min-height: 1em;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 0.75rem;
            }
        }

        @media (max-width: 620px) {
            .meta-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            @page {
                size: A4;
                margin: 9mm;
            }

            body {
                background: #fff !important;
            }

            .sidebar,
            .screen-only {
                display: none !important;
            }

            .main-content {
                margin: 0 !important;
                width: 100% !important;
                padding: 0 !important;
            }

            .dossier-wrap {
                width: 100% !important;
                max-width: 100% !important;
            }

            .dossier-page {
                border: 1px solid #d3d6df;
                border-radius: 0;
                box-shadow: none;
                padding: 6mm;
                gap: 0.65rem;
            }

            .meta-item,
            .section,
            .prompt-box {
                break-inside: avoid;
            }

            .prompt-box {
                border-color: #d3d6df;
                min-height: 170px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="dossier-wrap" id="dossierRoot">
                <div class="loading">Uitvoerdossier laden...</div>
            </div>
        </main>
    </div>

    <script>
        (function initDossierPage() {
            const REMOTE_SCOPE = 'premium_active_orders';
            const CUSTOM_ORDERS_KEY = 'softora_custom_orders_premium_v1';
            const ORDER_RUNTIME_KEY = 'softora_order_runtime_premium_v1';
            const root = document.getElementById('dossierRoot');

            function esc(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function safeJsonParse(value, fallback) {
                try {
                    const parsed = JSON.parse(String(value || ''));
                    return parsed === null || parsed === undefined ? fallback : parsed;
                } catch (_) {
                    return fallback;
                }
            }

            function normalizeText(value) {
                return String(value || '')
                    .replace(/\r/g, '\n')
                    .replace(/\s*\|\s*/g, '. ')
                    .replace(/\s*·\s*/g, '. ')
                    .replace(/[\t ]+/g, ' ')
                    .replace(/\n+/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
            }

            function truncateText(value, maxChars) {
                const text = String(value || '').trim();
                if (!text || !Number.isFinite(maxChars) || maxChars <= 0) return '';
                if (text.length <= maxChars) return text;
                return `${text.slice(0, Math.max(0, maxChars - 1)).trimEnd()}…`;
            }

            function formatDateTime(value) {
                const raw = String(value || '').trim();
                if (!raw) return '—';
                const asNumber = Number(raw);
                if (Number.isFinite(asNumber) && asNumber > 0) {
                    const d = new Date(asNumber);
                    return Number.isNaN(d.getTime()) ? raw : d.toLocaleString('nl-NL');
                }
                const d = new Date(raw);
                return Number.isNaN(d.getTime()) ? raw : d.toLocaleString('nl-NL');
            }

            async function fetchUiStateValues(scope) {
                const encoded = encodeURIComponent(String(scope || ''));
                const endpoints = [
                    `/api/ui-state-get?scope=${encoded}`,
                    `/api/ui-state/${encoded}`
                ];

                for (const endpoint of endpoints) {
                    try {
                        const response = await fetch(endpoint, { cache: 'no-store' });
                        if (!response.ok) continue;
                        const data = await response.json().catch(() => ({}));
                        if (data?.ok && data?.values && typeof data.values === 'object') {
                            return data.values;
                        }
                    } catch (_) {
                        // try next endpoint
                    }
                }
                return {};
            }

            function getOrderIdFromQuery() {
                const params = new URLSearchParams(window.location.search || '');
                const id = Number(params.get('id'));
                return Number.isFinite(id) && id > 0 ? id : 0;
            }

            function shouldAutoPrint() {
                const params = new URLSearchParams(window.location.search || '');
                return /^(1|true|yes)$/i.test(String(params.get('autoprint') || ''));
            }

            function renderError(message) {
                root.innerHTML = `<div class="error">${esc(message || 'Uitvoerdossier niet gevonden.')}</div>`;
            }

            function buildWishesText(order) {
                const description = normalizeText(order?.description || '');
                const transcript = normalizeText(order?.transcript || '');
                let merged = description;

                if (transcript) {
                    const transcriptPart = truncateText(transcript, 650);
                    if (merged) {
                        merged = `${merged} Aanvullend uit het gesprek: ${transcriptPart}`;
                    } else {
                        merged = transcriptPart;
                    }
                }

                if (!merged) {
                    merged = 'Er zijn nog geen uitgebreide wensen vastgelegd. Gebruik dit dossier als startpunt en vul de klantwensen aan na direct klantcontact.';
                }

                return truncateText(merged, 980);
            }

            function buildOpusPrompt(data) {
                const company = String(data.company || 'Onbekend').trim() || 'Onbekend';
                const contact = String(data.contact || 'Onbekend').trim() || 'Onbekend';
                const title = String(data.title || 'Website opdracht').trim() || 'Website opdracht';
                const domainName = String(data.domainName || '').trim();
                const deliveryTime = String(data.deliveryTime || '').trim();
                const wishesText = String(data.wishesText || '').trim();

                const lines = [
                    'Je bent een senior webbouwer bij Softora.',
                    'Voer deze opdracht uit met Claude Opus 4.6 en lever direct uitvoerbare output op.',
                    '',
                    'Projectgegevens:',
                    `- Bedrijf: ${company}`,
                    `- Contactpersoon: ${contact}`,
                    `- Opdracht: ${title}`,
                    `- Domein: ${domainName || 'nog niet bekend'}`,
                    `- Gewenste oplevertijd: ${deliveryTime || 'niet opgegeven'}`,
                    '',
                    'Wensen van de klant (doorlopende tekst):',
                    wishesText || 'Nog geen specifieke wensen vastgelegd.',
                    '',
                    'Lever op in deze volgorde:',
                    '1) Kort uitvoerplan in duidelijke stappen.',
                    '2) Volledige pagina- en sectiestructuur van de website.',
                    '3) Concrete copy per sectie (Nederlands, direct bruikbaar).',
                    '4) Lijst met ontbrekende klantinformatie als gerichte vragen.',
                    '',
                    'Schrijf helder, praktisch en zonder vaagheden.'
                ];

                return truncateText(lines.join('\n'), 1800);
            }

            async function copyText(value) {
                const text = String(value || '');
                if (!text) return false;

                if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                    try {
                        await navigator.clipboard.writeText(text);
                        return true;
                    } catch (_) {
                        // fallback below
                    }
                }

                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.setAttribute('readonly', 'readonly');
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.select();
                    textarea.setSelectionRange(0, textarea.value.length);
                    const ok = document.execCommand('copy');
                    textarea.remove();
                    return Boolean(ok);
                } catch (_) {
                    return false;
                }
            }

            function renderDossier(orderId, customOrder, runtimeOrder) {
                const order = customOrder || {};
                const runtime = runtimeOrder || {};

                const title = String(order?.title || runtime?.type || `Opdracht #${orderId}`).trim();
                const company = String(order?.clientName || runtime?.name || 'Onbekend').trim();
                const contact = String(order?.location || '').trim();
                const domainName = String(order?.domainName || '').trim();
                const deliveryTime = String(order?.deliveryTime || '').trim();
                const claimedBy = String(order?.claimedBy || runtime?.claimedBy || '').trim();
                const claimedAt = String(order?.claimedAt || runtime?.claimedAt || '').trim();

                const wishesText = buildWishesText(order);
                const opusPrompt = buildOpusPrompt({
                    company,
                    contact,
                    title,
                    domainName,
                    deliveryTime,
                    wishesText
                });

                document.title = `Softora | Uitvoerdossier #${orderId}`;

                root.innerHTML = `
                    <article class="dossier-page">
                        <header class="header">
                            <div>
                                <div class="eyebrow">Uitvoerdossier · Order #${esc(orderId)}</div>
                                <h1 class="title">${esc(title || `Opdracht #${orderId}`)}</h1>
                                <p class="subtitle">Simpel uitvoerdossier op 1 pagina: klantwensen + directe prompt voor Claude Opus 4.6.</p>
                            </div>
                            <div class="actions screen-only">
                                <button type="button" class="btn btn-primary" id="printBtn">Download PDF</button>
                                <a class="btn" href="/premium-actieve-opdrachten">Terug</a>
                            </div>
                        </header>

                        <section class="meta-grid">
                            <div class="meta-item"><div class="meta-label">Bedrijf</div><div class="meta-value">${esc(company || '—')}</div></div>
                            <div class="meta-item"><div class="meta-label">Contactpersoon</div><div class="meta-value">${esc(contact || '—')}</div></div>
                            <div class="meta-item"><div class="meta-label">Domein</div><div class="meta-value">${esc(domainName || '—')}</div></div>
                            <div class="meta-item"><div class="meta-label">Oplevertijd</div><div class="meta-value">${esc(deliveryTime || '—')}</div></div>
                            <div class="meta-item"><div class="meta-label">Geclaimd door</div><div class="meta-value">${esc(claimedBy || '—')}</div></div>
                            <div class="meta-item"><div class="meta-label">Geclaimd op</div><div class="meta-value">${esc(formatDateTime(claimedAt))}</div></div>
                        </section>

                        <section class="section">
                            <h2 class="section-title">Wensen van de klant</h2>
                            <p class="wishes-text">${esc(wishesText)}</p>
                        </section>

                        <section class="section">
                            <div class="prompt-head">
                                <h2 class="section-title" style="margin-bottom: 0;">Prompt voor Claude Opus 4.6</h2>
                                <button type="button" class="btn screen-only" id="copyPromptBtn">Kopieer prompt</button>
                            </div>
                            <textarea class="prompt-box" id="opusPrompt" readonly>${esc(opusPrompt)}</textarea>
                            <div class="copy-status screen-only" id="copyStatus" aria-live="polite"></div>
                        </section>
                    </article>
                `;

                const printBtn = document.getElementById('printBtn');
                if (printBtn) {
                    printBtn.addEventListener('click', () => {
                        window.print();
                    });
                }

                const copyBtn = document.getElementById('copyPromptBtn');
                const promptEl = document.getElementById('opusPrompt');
                const copyStatus = document.getElementById('copyStatus');
                if (copyBtn && promptEl && copyStatus) {
                    copyBtn.addEventListener('click', async () => {
                        const ok = await copyText(promptEl.value);
                        copyStatus.textContent = ok
                            ? 'Prompt gekopieerd. Je kunt deze direct plakken in Claude Opus 4.6.'
                            : 'Kopiëren mislukt. Selecteer de tekst handmatig en kopieer opnieuw.';
                    });
                }
            }

            async function start() {
                const orderId = getOrderIdFromQuery();
                if (!orderId) {
                    renderError('Geen geldig order-ID meegegeven.');
                    return;
                }

                const values = await fetchUiStateValues(REMOTE_SCOPE);
                const customOrders = safeJsonParse(values?.[CUSTOM_ORDERS_KEY], []);
                const runtimeMap = safeJsonParse(values?.[ORDER_RUNTIME_KEY], {});
                const customOrder = Array.isArray(customOrders)
                    ? customOrders.find((item) => Number(item?.id) === orderId)
                    : null;
                const runtimeOrder = runtimeMap && typeof runtimeMap === 'object'
                    ? runtimeMap[String(orderId)] || null
                    : null;

                if (!customOrder && !runtimeOrder) {
                    renderError(`Geen dossierdata gevonden voor opdracht #${orderId}.`);
                    return;
                }

                renderDossier(orderId, customOrder, runtimeOrder);

                if (shouldAutoPrint()) {
                    window.setTimeout(() => {
                        window.print();
                    }, 360);
                }
            }

            void start();
        })();
    </script>
</body>
</html>

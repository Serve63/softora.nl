<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softora | Uitvoerdossier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/personnel-theme.css">
    <script>
        (function () {
            document.documentElement.setAttribute("data-personnel-loading", "true");
            try {
                localStorage.setItem("softora_premium_personnel_theme_mode", "light");
                localStorage.setItem("softora_premium_public_theme_mode", "light");
                document.documentElement.setAttribute("data-theme-mode", "light");
                document.documentElement.setAttribute("data-theme", "light");
            } catch (_) {
                // ignore storage errors
            }
        })();
    </script>
    <script src="assets/personnel-theme.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #181d33;
            --muted: #687089;
            --line: rgba(26, 31, 52, 0.14);
            --accent: #8b2252;
            --accent-deep: #6f1a42;
            --paper-bg: #ffffff;
            --canvas-bg: #f6f6f8;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            background: var(--canvas-bg);
            overflow: hidden;
        }

        .dashboard-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            margin-left: 280px;
            width: calc(100% - 280px);
            height: 100vh;
            padding: 0.95rem;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .dossier-wrap {
            width: 100%;
            min-height: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
        }

        .dossier-page {
            width: min(100%, 794px);
            max-width: 794px;
            min-height: 1123px;
            background: var(--paper-bg);
            border: 1px solid rgba(26, 31, 52, 0.16);
            border-radius: 12px;
            box-shadow: 0 18px 48px rgba(16, 19, 34, 0.14);
            overflow: visible;
            display: block;
        }

        .brand-bar {
            background: linear-gradient(136deg, var(--accent-deep), var(--accent));
            color: #fff;
            padding: 0.72rem 0.9rem 0.66rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.72rem;
        }

        .brand-logo {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .brand-sub {
            margin-top: 0.2rem;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .brand-meta {
            text-align: right;
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.45;
            opacity: 0.95;
        }

        .page-body {
            padding: 0.8rem 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 0.42rem;
            align-content: stretch;
        }

        .loading,
        .error {
            width: min(100%, 794px);
            max-width: 794px;
            min-height: 220px;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 1rem;
            color: var(--muted);
            line-height: 1.55;
        }

        .error {
            color: #8f2f51;
            border-color: rgba(139, 34, 82, 0.24);
            background: rgba(139, 34, 82, 0.06);
        }

        .top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .top-row > div:first-child {
            min-width: 0;
            flex: 1 1 auto;
        }

        .eyebrow {
            font-family: 'Oswald', sans-serif;
            font-size: 0.59rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #838aa0;
        }

        .title {
            margin-top: 0.18rem;
            font-family: 'Oswald', sans-serif;
            font-size: clamp(0.98rem, 2vw, 1.46rem);
            line-height: 1.04;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #171b2f;
            max-width: 32ch;
        }

        .subtitle {
            margin-top: 0.24rem;
            color: var(--muted);
            font-size: 0.64rem;
            line-height: 1.38;
            max-width: 58ch;
        }

        .source-chip {
            margin-top: 0.26rem;
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0.16rem 0.42rem;
            font-size: 0.52rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #7d8499;
            background: #fbfcff;
        }

        .actions {
            display: flex;
            gap: 0.34rem;
            flex-wrap: nowrap;
            justify-content: flex-end;
            flex: 0 0 auto;
        }

        .btn {
            appearance: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0.36rem 0.5rem;
            font-size: 0.53rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: none;
            cursor: pointer;
            color: #1e243a;
            background: rgba(255, 255, 255, 0.95);
        }

        .btn-primary {
            background: linear-gradient(136deg, var(--accent-deep), var(--accent));
            color: #fff;
            border-color: transparent;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.35rem;
        }

        .meta-item {
            border: 1px solid var(--line);
            background: #fbfcff;
            border-radius: 8px;
            padding: 0.36rem 0.44rem;
            min-height: 50px;
        }

        .meta-label {
            font-size: 0.53rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8a91a6;
        }

        .meta-value {
            margin-top: 0.14rem;
            font-size: 0.71rem;
            line-height: 1.28;
            color: #1f2438;
            word-break: break-word;
        }

        .layout-block {
            border: 1px solid var(--line);
            background: #fafbff;
            border-radius: 8px;
            padding: 0.34rem 0.44rem;
        }

        .layout-block-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.48rem;
            margin-bottom: 0.18rem;
        }

        .section-title {
            font-family: 'Oswald', sans-serif;
            font-size: 0.64rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #7d8499;
        }

        .block-text {
            font-size: 0.66rem;
            line-height: 1.34;
            color: #1f243a;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .block-list {
            margin: 0;
            padding-left: 1.05rem;
            font-size: 0.64rem;
            line-height: 1.36;
            color: #1f243a;
        }

        .block-list li + li {
            margin-top: 0.12rem;
        }

        .prompt-box {
            border: 1px solid rgba(26, 31, 52, 0.16);
            border-radius: 8px;
            background: #fff;
            color: #1f243a;
            font-size: 0.62rem;
            line-height: 1.28;
            padding: 0.42rem;
            white-space: pre-wrap;
            overflow: visible;
            height: auto;
            min-height: 0;
            max-height: none;
        }

        .copy-status {
            margin-top: 0.2rem;
            font-size: 0.55rem;
            color: var(--muted);
            min-height: 1em;
        }

        .warning-note {
            border: 1px solid rgba(139, 34, 82, 0.26);
            border-radius: 8px;
            padding: 0.34rem 0.42rem;
            background: rgba(139, 34, 82, 0.06);
            color: #7a2d4a;
            font-size: 0.58rem;
            line-height: 1.34;
        }

        @media (max-width: 1200px) {
            .title {
                font-size: clamp(0.92rem, 1.95vw, 1.32rem);
            }

            .subtitle {
                font-size: 0.6rem;
            }

            .block-text,
            .block-list,
            .prompt-box {
                font-size: 0.59rem;
            }
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .sidebar {
                position: static;
                width: 100%;
                height: auto;
            }

            .dashboard-layout {
                display: block;
                height: auto;
                overflow: visible;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                height: auto;
                min-height: 100vh;
                overflow: visible;
                display: block;
                padding: 0.75rem;
            }

            .dossier-wrap {
                height: auto;
                display: block;
            }

            .dossier-page {
                width: 100%;
                height: auto;
                min-height: auto;
                max-height: none;
                border-radius: 12px;
            }

            .loading,
            .error {
                width: 100%;
            }

            .meta-grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-wrap: wrap;
            }

            .prompt-box {
                height: auto;
                overflow: visible;
            }
        }

        @media print {
            @page {
                size: A4;
                margin: 9mm;
            }

            html,
            body {
                overflow: visible !important;
                height: auto !important;
                background: #fff !important;
            }

            .sidebar,
            .screen-only {
                display: none !important;
            }

            .dashboard-layout {
                display: block !important;
                height: auto !important;
            }

            .main-content {
                margin: 0 !important;
                width: 100% !important;
                height: auto !important;
                min-height: auto !important;
                padding: 0 !important;
                overflow: visible !important;
                display: block !important;
            }

            .dossier-wrap {
                width: 100% !important;
                height: auto !important;
                display: block !important;
            }

            .dossier-page {
                width: 100% !important;
                max-width: none !important;
                height: auto !important;
                min-height: auto !important;
                max-height: none !important;
                border: 1px solid #d8dbe5;
                border-radius: 0;
                box-shadow: none !important;
            }

            .brand-bar {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .meta-item,
            .layout-block,
            .prompt-box {
                break-inside: avoid;
            }

            .prompt-box {
                height: auto;
                overflow: visible;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="dossier-wrap" id="dossierRoot">
                <div class="loading">Uitvoerdossier laden...</div>
            </div>
        </main>
    </div>

    <script>
        (function initDossierPage() {
            const REMOTE_SCOPE = 'premium_active_orders';
            const CUSTOM_ORDERS_KEY = 'softora_custom_orders_premium_v1';
            const ORDER_RUNTIME_KEY = 'softora_order_runtime_premium_v1';
            const root = document.getElementById('dossierRoot');

            function esc(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function safeJsonParse(value, fallback) {
                try {
                    const parsed = JSON.parse(String(value || ''));
                    return parsed === null || parsed === undefined ? fallback : parsed;
                } catch (_) {
                    return fallback;
                }
            }

            function normalizeText(value) {
                return String(value || '')
                    .replace(/\r/g, '\n')
                    .replace(/[ \t]+/g, ' ')
                    .replace(/\n{3,}/g, '\n\n')
                    .trim();
            }

            function clipText(value, maxChars) {
                const text = String(value || '').trim();
                if (!text || !Number.isFinite(maxChars) || maxChars <= 0) return '';
                if (text.length <= maxChars) return text;
                return text.slice(0, Math.max(0, maxChars)).trim();
            }

            function formatDateTime(value) {
                const raw = String(value || '').trim();
                if (!raw) return '—';
                const asNumber = Number(raw);
                if (Number.isFinite(asNumber) && asNumber > 0) {
                    const d = new Date(asNumber);
                    return Number.isNaN(d.getTime()) ? raw : d.toLocaleString('nl-NL');
                }
                const d = new Date(raw);
                return Number.isNaN(d.getTime()) ? raw : d.toLocaleString('nl-NL');
            }

            function formatDateOnly(value) {
                const raw = String(value || '').trim();
                if (!raw) return new Date().toLocaleDateString('nl-NL');
                const asNumber = Number(raw);
                if (Number.isFinite(asNumber) && asNumber > 0) {
                    const d = new Date(asNumber);
                    return Number.isNaN(d.getTime()) ? new Date().toLocaleDateString('nl-NL') : d.toLocaleDateString('nl-NL');
                }
                const d = new Date(raw);
                return Number.isNaN(d.getTime()) ? new Date().toLocaleDateString('nl-NL') : d.toLocaleDateString('nl-NL');
            }

            async function fetchUiStateValues(scope) {
                const encoded = encodeURIComponent(String(scope || ''));
                const endpoints = [
                    `/api/ui-state-get?scope=${encoded}`,
                    `/api/ui-state/${encoded}`
                ];

                for (const endpoint of endpoints) {
                    try {
                        const response = await fetch(endpoint, { cache: 'no-store' });
                        if (!response.ok) continue;
                        const data = await response.json().catch(() => ({}));
                        if (data?.ok && data?.values && typeof data.values === 'object') {
                            return data.values;
                        }
                    } catch (_) {
                        // try next endpoint
                    }
                }
                return {};
            }

            function getOrderIdFromQuery() {
                const params = new URLSearchParams(window.location.search || '');
                const id = Number(params.get('id'));
                return Number.isFinite(id) && id > 0 ? id : 0;
            }

            function shouldAutoPrint() {
                const params = new URLSearchParams(window.location.search || '');
                return /^(1|true|yes)$/i.test(String(params.get('autoprint') || ''));
            }

            function renderError(message) {
                root.innerHTML = `<div class="error">${esc(message || 'Uitvoerdossier niet gevonden.')}</div>`;
            }

            function buildBaseOrderData(orderId, customOrder, runtimeOrder) {
                const order = customOrder || {};
                const runtime = runtimeOrder || {};
                return {
                    orderId,
                    title: String(order?.title || runtime?.type || `Opdracht #${orderId}`).trim(),
                    company: String(order?.clientName || runtime?.name || 'Onbekend').trim(),
                    contact: String(order?.location || '').trim(),
                    domainName: String(order?.domainName || '').trim(),
                    deliveryTime: String(order?.deliveryTime || '').trim(),
                    claimedBy: String(order?.claimedBy || runtime?.claimedBy || '').trim(),
                    claimedAt: String(order?.claimedAt || runtime?.claimedAt || '').trim(),
                    description: normalizeText(order?.description || runtime?.description || ''),
                    transcript: normalizeText(order?.transcript || runtime?.transcript || ''),
                    sourceAppointmentLabel: String(order?.sourceAppointmentLabel || runtime?.sourceAppointmentLabel || '').trim(),
                };
            }

            function buildFallbackNarrative(baseData) {
                const chunks = [];
                if (baseData.description) chunks.push(baseData.description);
                if (baseData.transcript) {
                    chunks.push(baseData.description ? `Aanvullende gespreksnotities: ${baseData.transcript}` : baseData.transcript);
                }
                const narrative = normalizeText(chunks.join('\n\n'));
                if (narrative) return clipText(narrative, 5000);
                return 'Nog geen uitgebreide klantwensen vastgelegd. Neem direct contact op met de klant om ontbrekende details te verzamelen.';
            }

            function buildFallbackLayout(baseData) {
                const narrative = buildFallbackNarrative(baseData);
                const prompt = [
                    'Je bent senior webbouwer bij Softora. Werk deze opdracht uit in Claude Opus 4.6.',
                    '',
                    'Projectgegevens:',
                    `- Bedrijf: ${baseData.company || 'Onbekend'}`,
                    `- Contactpersoon: ${baseData.contact || 'Onbekend'}`,
                    `- Opdracht: ${baseData.title || `Opdracht #${baseData.orderId}`}`,
                    `- Domein: ${baseData.domainName || 'Nog niet bekend'}`,
                    `- Gewenste oplevertijd: ${baseData.deliveryTime || 'Niet opgegeven'}`,
                    baseData.sourceAppointmentLabel ? `- Bronafspraak: ${baseData.sourceAppointmentLabel}` : '',
                    '',
                    'Klantwensen (bron):',
                    narrative,
                    '',
                    'Lever op:',
                    '1) Concreet uitvoerplan in stappen (volgorde + prioriteit).',
                    '2) Volledige pagina-/sectiestructuur met doel per sectie.',
                    '3) Direct bruikbare Nederlandse copy per sectie.',
                    '4) Korte lijst met ontbrekende klantinformatie als vragen.',
                    '',
                    'Werk praktisch en concreet, zonder vage algemeenheden.',
                ]
                    .filter(Boolean)
                    .join('\n');

                return {
                    documentTitle: baseData.title || `Opdracht #${baseData.orderId}`,
                    subtitle: 'Dynamisch uitvoerdossier op basis van actuele opdrachtinformatie en klantwensen.',
                    opusPrompt: clipText(prompt, 22000),
                    blocks: [
                        {
                            kind: 'meta',
                            title: 'Projectkern',
                            pairs: [
                                { label: 'Bedrijf', value: baseData.company || '—' },
                                { label: 'Contactpersoon', value: baseData.contact || '—' },
                                { label: 'Domein', value: baseData.domainName || '—' },
                                { label: 'Oplevertijd', value: baseData.deliveryTime || '—' },
                                { label: 'Geclaimd door', value: baseData.claimedBy || '—' },
                                { label: 'Geclaimd op', value: formatDateTime(baseData.claimedAt) },
                            ],
                        },
                        {
                            kind: 'text',
                            title: 'Klantwensen',
                            text: narrative,
                        },
                        {
                            kind: 'bullets',
                            title: 'Uitvoerfocus',
                            items: [
                                'Start met een concreet stappenplan en prioriteiten.',
                                'Werk met duidelijke pagina- en sectiestructuur.',
                                'Schrijf copy direct inzetbaar voor productie.',
                                'Markeer ontbrekende klantinformatie als gerichte vragen.',
                            ],
                        },
                    ],
                };
            }

            function normalizePairs(pairs) {
                if (!Array.isArray(pairs)) return [];
                return pairs
                    .map((pair) => ({
                        label: clipText(String(pair?.label || '').trim(), 80),
                        value: clipText(String(pair?.value || '').trim(), 260),
                    }))
                    .filter((pair) => pair.label && pair.value)
                    .slice(0, 12);
            }

            function normalizeItems(items, maxItems = 12) {
                if (!Array.isArray(items)) return [];
                return items
                    .map((item) => clipText(String(item || '').trim(), 380))
                    .filter(Boolean)
                    .slice(0, Math.max(1, Math.min(20, Number(maxItems) || 12)));
            }

            function normalizeLayoutPayload(rawLayout, baseData) {
                const fallback = buildFallbackLayout(baseData);
                if (!rawLayout || typeof rawLayout !== 'object') return fallback;

                const documentTitle =
                    clipText(String(rawLayout.documentTitle || rawLayout.title || fallback.documentTitle).trim(), 220) ||
                    fallback.documentTitle;
                const subtitle =
                    clipText(String(rawLayout.subtitle || rawLayout.lead || fallback.subtitle).trim(), 320) ||
                    fallback.subtitle;
                const opusPrompt =
                    clipText(String(rawLayout.opusPrompt || rawLayout.prompt || fallback.opusPrompt).trim(), 22000) ||
                    fallback.opusPrompt;

                const blocks = (Array.isArray(rawLayout.blocks) ? rawLayout.blocks : [])
                    .map((block) => {
                        const kind = String(block?.kind || block?.type || '').trim().toLowerCase();
                        const title = clipText(String(block?.title || '').trim(), 120) || 'Sectie';

                        if (kind === 'meta') {
                            const pairs = normalizePairs(block?.pairs || block?.items || []);
                            if (!pairs.length) return null;
                            return { kind: 'meta', title, pairs };
                        }

                        if (kind === 'bullets' || kind === 'checklist') {
                            const items = normalizeItems(block?.items || [], 12);
                            if (!items.length) return null;
                            return { kind: 'bullets', title, items };
                        }

                        if (kind === 'steps' || kind === 'timeline') {
                            const items = normalizeItems(block?.items || block?.steps || [], 12);
                            if (!items.length) return null;
                            return { kind: 'steps', title, items };
                        }

                        const text = clipText(String(block?.text || block?.content || '').trim(), 5500);
                        if (!text) return null;
                        return { kind: 'text', title, text };
                    })
                    .filter(Boolean)
                    .slice(0, 10);

                return {
                    documentTitle,
                    subtitle,
                    opusPrompt,
                    blocks: blocks.length ? blocks : fallback.blocks,
                };
            }

            async function fetchDynamicLayoutFromAi(baseData) {
                const payload = {
                    orderId: baseData.orderId,
                    title: baseData.title,
                    company: baseData.company,
                    contact: baseData.contact,
                    domainName: baseData.domainName,
                    deliveryTime: baseData.deliveryTime,
                    claimedBy: baseData.claimedBy,
                    claimedAt: baseData.claimedAt,
                    description: baseData.description,
                    transcript: baseData.transcript,
                    sourceAppointmentLabel: baseData.sourceAppointmentLabel,
                    language: 'nl',
                };

                const endpoints = ['/api/ai/order-dossier', '/api/ai-order-dossier'];
                let lastError = '';

                for (const endpoint of endpoints) {
                    const controller = new AbortController();
                    const timeoutId = window.setTimeout(() => controller.abort(), 90000);
                    try {
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                            signal: controller.signal,
                        });
                        const data = await response.json().catch(() => ({}));
                        if (!response.ok || data?.ok === false) {
                            lastError = String(data?.detail || data?.error || `Serverfout (${response.status})`);
                            continue;
                        }
                        return data || {};
                    } catch (error) {
                        lastError = error?.name === 'AbortError'
                            ? 'AI dossier generatie duurde te lang.'
                            : String(error?.message || 'AI dossier generatie mislukt.');
                    } finally {
                        window.clearTimeout(timeoutId);
                    }
                }

                throw new Error(lastError || 'AI dossier generatie mislukt.');
            }

            async function copyText(value) {
                const text = String(value || '');
                if (!text) return false;

                if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                    try {
                        await navigator.clipboard.writeText(text);
                        return true;
                    } catch (_) {
                        // fallback below
                    }
                }

                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.setAttribute('readonly', 'readonly');
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.select();
                    textarea.setSelectionRange(0, textarea.value.length);
                    const ok = document.execCommand('copy');
                    textarea.remove();
                    return Boolean(ok);
                } catch (_) {
                    return false;
                }
            }

            function renderLayoutBlock(block) {
                if (!block || typeof block !== 'object') return '';
                const title = esc(block.title || 'Sectie');

                if (block.kind === 'meta') {
                    const pairs = Array.isArray(block.pairs) ? block.pairs : [];
                    if (!pairs.length) return '';
                    const pairHtml = pairs
                        .map((pair) => {
                            const label = esc(pair?.label || '');
                            const value = esc(pair?.value || '');
                            if (!label || !value) return '';
                            return `<div class="meta-item"><div class="meta-label">${label}</div><div class="meta-value">${value}</div></div>`;
                        })
                        .filter(Boolean)
                        .join('');
                    if (!pairHtml) return '';
                    return `
                        <section class="layout-block">
                            <div class="layout-block-head"><h2 class="section-title">${title}</h2></div>
                            <div class="meta-grid">${pairHtml}</div>
                        </section>
                    `;
                }

                if (block.kind === 'bullets' || block.kind === 'steps') {
                    const items = Array.isArray(block.items) ? block.items : [];
                    if (!items.length) return '';
                    const listTag = block.kind === 'steps' ? 'ol' : 'ul';
                    const listHtml = items.map((item) => `<li>${esc(item)}</li>`).join('');
                    return `
                        <section class="layout-block">
                            <div class="layout-block-head"><h2 class="section-title">${title}</h2></div>
                            <${listTag} class="block-list">${listHtml}</${listTag}>
                        </section>
                    `;
                }

                const text = esc(block.text || '');
                if (!text) return '';
                return `
                    <section class="layout-block">
                        <div class="layout-block-head"><h2 class="section-title">${title}</h2></div>
                        <p class="block-text">${text}</p>
                    </section>
                `;
            }

            function renderDossier(baseData, layoutResponse) {
                const orderId = Number(baseData.orderId) || 0;
                const orderDateLabel = formatDateOnly(baseData.claimedAt || Date.now());
                const layout = normalizeLayoutPayload(layoutResponse?.layout || layoutResponse || {}, baseData);
                const source = String(layoutResponse?.source || '').trim();
                const model = String(layoutResponse?.model || '').trim();
                const warning = String(layoutResponse?.warning || '').trim();
                const opusPrompt = String(layout.opusPrompt || '').trim();
                const blocksHtml = (Array.isArray(layout.blocks) ? layout.blocks : [])
                    .map((block) => renderLayoutBlock(block))
                    .join('');

                document.title = `Softora | Uitvoerdossier #${orderId}`;

                root.innerHTML = `
                    <article class="dossier-page">
                        <header class="brand-bar">
                            <div>
                                <div class="brand-logo">SOFTORA.NL</div>
                                <div class="brand-sub">Uitvoerdossier voor uitvoering</div>
                            </div>
                            <div class="brand-meta">
                                <div>Order #${esc(orderId)}</div>
                                <div>${esc(orderDateLabel)}</div>
                            </div>
                        </header>

                        <div class="page-body">
                            <div class="top-row">
                                <div>
                                    <div class="eyebrow">Uitvoerdossier</div>
                                    <h1 class="title">${esc(layout.documentTitle || `Opdracht #${orderId}`)}</h1>
                                    <p class="subtitle">${esc(layout.subtitle || 'Dynamisch uitvoerdossier op basis van actuele opdrachtinformatie.')}</p>
                                    ${source ? `<div class="source-chip">Dynamisch via ${esc(model || source)}</div>` : ''}
                                </div>
                                <div class="actions screen-only">
                                    <button type="button" class="btn btn-primary" id="printBtn">Download PDF</button>
                                    <a class="btn" href="/premium-actieve-opdrachten">Terug</a>
                                </div>
                            </div>

                            ${warning ? `<div class="warning-note">${esc(warning)}</div>` : ''}
                            ${blocksHtml}

                            <section class="layout-block">
                                <div class="layout-block-head">
                                    <h2 class="section-title">Prompt voor Claude Opus 4.6</h2>
                                    <button type="button" class="btn screen-only" id="copyPromptBtn">Kopieer prompt</button>
                                </div>
                                <pre class="prompt-box" id="opusPromptDisplay">${esc(opusPrompt)}</pre>
                                <div class="copy-status screen-only" id="copyStatus" aria-live="polite"></div>
                            </section>
                        </div>
                    </article>
                `;

                const printBtn = document.getElementById('printBtn');
                if (printBtn) {
                    printBtn.addEventListener('click', () => {
                        window.print();
                    });
                }

                const copyBtn = document.getElementById('copyPromptBtn');
                const copyStatus = document.getElementById('copyStatus');
                if (copyBtn && copyStatus) {
                    copyBtn.addEventListener('click', async () => {
                        const ok = await copyText(opusPrompt || '');
                        copyStatus.textContent = ok
                            ? 'Prompt gekopieerd. Direct plakken in Claude Opus 4.6.'
                            : 'Kopiëren mislukt. Kopieer handmatig uit het promptblok.';
                    });
                }
            }

            async function start() {
                const orderId = getOrderIdFromQuery();
                if (!orderId) {
                    renderError('Geen geldig order-ID meegegeven.');
                    return;
                }

                const values = await fetchUiStateValues(REMOTE_SCOPE);
                const customOrders = safeJsonParse(values?.[CUSTOM_ORDERS_KEY], []);
                const runtimeMap = safeJsonParse(values?.[ORDER_RUNTIME_KEY], {});
                const customOrder = Array.isArray(customOrders)
                    ? customOrders.find((item) => Number(item?.id) === orderId)
                    : null;
                const runtimeOrder = runtimeMap && typeof runtimeMap === 'object'
                    ? runtimeMap[String(orderId)] || null
                    : null;

                if (!customOrder && !runtimeOrder) {
                    renderError(`Geen dossierdata gevonden voor opdracht #${orderId}.`);
                    return;
                }

                const baseData = buildBaseOrderData(orderId, customOrder, runtimeOrder);
                root.innerHTML = '<div class="loading">Dynamisch uitvoerdossier genereren met Claude Opus 4.6...</div>';

                let layoutResponse = null;
                try {
                    layoutResponse = await fetchDynamicLayoutFromAi(baseData);
                } catch (error) {
                    layoutResponse = {
                        source: 'template-fallback',
                        warning: `Claude niet bereikbaar, fallback gebruikt: ${String(error?.message || 'onbekende fout')}`,
                        layout: buildFallbackLayout(baseData),
                    };
                }

                renderDossier(baseData, layoutResponse);

                if (shouldAutoPrint()) {
                    window.setTimeout(() => {
                        window.print();
                    }, 420);
                }
            }

            void start();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl" data-personnel-loading="true" data-theme-mode="light" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Live Momentum | Softora</title>
  <link rel="canonical" href="https://www.softora.nl/live-momentum">
  <link rel="icon" type="image/png" href="/assets/softora-search-favicon.png" sizes="512x512">
  <link rel="icon" type="image/png" href="/assets/softora-favicon-round.png?v=20260616a" sizes="any">
  <link rel="apple-touch-icon" href="/assets/softora-touch-icon.png?v=20260615a">
  <link rel="stylesheet" href="/assets/fonts.css?v=20260409a">
  <link rel="stylesheet" href="/assets/personnel-theme.css?v=20260519b">
  <link rel="stylesheet" href="/assets/premium-sidebar-autopilot.css?v=20260611a">
  <link rel="stylesheet" href="/assets/live-momentum.css?v=20260714e">
  <script src="/assets/personnel-theme.js?v=20260519b" defer></script>
  <script src="/assets/premium-sidebar-autopilot.js?v=20260611a" defer></script>
</head>
<body data-live-momentum-page>
  <div class="dashboard-layout momentum-layout" data-sidebar-shell="canonical">
    <aside class="sidebar" data-live-momentum-sidebar-host="1" aria-label="Premium navigatie"></aside>

    <main class="main-content momentum-page" aria-labelledby="momentum-title">
    <section class="momentum-hero" aria-label="Live momentum dashboard">
      <header class="momentum-head">
        <div>
          <h1 id="momentum-title">Live momentum</h1>
          <p>Juli 2026 · gestart op 13 juli</p>
        </div>
        <div class="momentum-actions">
          <div class="chart-switcher" role="group" aria-label="Grafiekweergave">
            <button class="chart-switch is-active" type="button" data-chart-mode="bars" aria-pressed="true">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V10h3v10H5Zm6 0V4h3v16h-3Zm6 0v-7h3v7h-3Z" /></svg>
              <span>Staven</span>
            </button>
            <button class="chart-switch" type="button" data-chart-mode="line" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 17 5-5 4 3 7-8" /></svg>
              <span>Lijn</span>
            </button>
          </div>
          <aside class="today-score" aria-label="Score vandaag">
            <span class="score-label">Vandaag</span>
            <strong>100%</strong>
          </aside>
        </div>
      </header>

      <div class="chart-card">
        <div class="chart-scale" aria-hidden="true">
          <span>100%</span>
          <span>75%</span>
          <span>50%</span>
          <span>25%</span>
          <span>0%</span>
        </div>

        <div class="bar-chart" aria-hidden="true"></div>

        <p class="sr-only">13 juli is vandaag met een momentumscore van 100 procent.</p>
      </div>
    </section>

    <section class="habit-board" aria-label="Dagelijkse taken">
      <div class="habit-grid" role="table" aria-label="Momentum taken in juli"></div>
    </section>
    </main>
  </div>
  <script src="/assets/premium-ui-state-client.js?v=20260605a"></script>
  <script src="/assets/live-momentum.js?v=20260714d" defer></script>
</body>
</html>

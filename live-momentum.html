<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Live Momentum | Softora</title>
  <link rel="canonical" href="https://www.softora.nl/live-momentum">
  <link rel="icon" type="image/png" href="/assets/softora-search-favicon.png" sizes="512x512">
  <link rel="icon" type="image/png" href="/assets/softora-favicon-round.png?v=20260616a" sizes="any">
  <link rel="apple-touch-icon" href="/assets/softora-touch-icon.png?v=20260615a">
  <link rel="stylesheet" href="/assets/fonts.css?v=20260409a">
  <link rel="stylesheet" href="/assets/live-momentum.css?v=20260714b">
</head>
<body>
  <main class="momentum-page" aria-labelledby="momentum-title">
    <section class="momentum-hero" aria-label="Live momentum dashboard">
      <header class="momentum-head">
        <div>
          <h1 id="momentum-title">Live momentum</h1>
          <p>Juli 2026 · gestart op 13 juli</p>
        </div>
        <aside class="today-score" aria-label="Score vandaag">
          <span class="score-label">Vandaag</span>
          <strong>100%</strong>
          <span class="score-points">100 / 100<br>punten</span>
        </aside>
      </header>

      <div class="chart-card">
        <div class="chart-scale" aria-hidden="true">
          <span>100%</span>
          <span>75%</span>
          <span>50%</span>
          <span>25%</span>
          <span>0%</span>
        </div>

        <div class="bar-chart" aria-hidden="true"></div>

        <p class="sr-only">13 juli is vandaag met een momentumscore van 100 procent.</p>
      </div>
    </section>

    <section class="habit-board" aria-label="Dagelijkse taken">
      <div class="habit-grid" role="table" aria-label="Momentum taken in juli"></div>
    </section>
  </main>
  <script src="/assets/live-momentum.js?v=20260714a" defer></script>
</body>
</html>

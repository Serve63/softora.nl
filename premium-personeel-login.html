<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/D80D8A58-B985-491E-A39B-27879E4C593A.PNG?v=20260414f" sizes="any">
    <link rel="apple-touch-icon" href="/assets/D80D8A58-B985-491E-A39B-27879E4C593A.PNG?v=20260414f">
        <link rel="stylesheet" href="/assets/iphone-optimizations.css">
<title>Softora | Personeel Login — Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light;
            --bg-primary: #f8f7f4;
            --bg-secondary: #ffffff;
            --bg-tertiary: #efeee9;
            --accent: #8B2252;
            --accent-dark: #6B1A3F;
            --accent-glow: rgba(139, 34, 82, 0.4);
            --accent-light: #A62D65;
            --text-primary: #1a1a2e;
            --text-secondary: #606272;
            --text-tertiary: #9599a8;
            --border: rgba(0, 0, 0, 0.1);
            --border-hover: rgba(139, 34, 82, 0.4);
            --error: #e74c3c;

            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-power: cubic-bezier(0.87, 0, 0.13, 1);
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100svh;
            cursor: none;
            display: flex;
        }

        h1, h2, h3, h4 {
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            line-height: 0.95;
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .cursor {
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent-light);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s var(--ease-out-expo),
                        background 0.2s ease,
                        width 0.3s var(--ease-out-expo),
                        height 0.3s var(--ease-out-expo);
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        .cursor.hover {
            width: 80px;
            height: 80px;
            background: var(--accent-light);
            border-color: transparent;
            mix-blend-mode: difference;
        }

        .cursor-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-light);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            transform: translate(-50%, -50%);
            transition: transform 0.02s linear;
        }

        .login-image {
            position: relative;
            width: 50%;
            min-height: 100svh;
            overflow: hidden;
        }

        .login-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(35%) contrast(1.05) brightness(0.9);
        }

        .login-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(248,247,244,0.02) 40%, var(--bg-secondary) 100%),
                        linear-gradient(135deg, rgba(139,34,82,0.1), transparent 60%),
                        linear-gradient(to bottom, transparent 60%, rgba(248,247,244,0.35) 100%);
        }

        .image-text {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            z-index: 2;
        }

        .image-text h2 {
            font-size: clamp(2rem, 4vw, 3.5rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1rem;
            color: #fff;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .image-text p {
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
            font-weight: 300;
            max-width: 350px;
        }

        .image-text .accent {
            color: var(--accent-light);
        }

        .login-panel {
            width: 50%;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: clamp(1.75rem, 3vw, 3.5rem);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            background: linear-gradient(180deg, rgba(255,255,255,0.88), var(--bg-secondary));
        }

        .login-panel-inner {
            width: 100%;
            max-width: 420px;
            margin: auto 0;
            padding-block: clamp(1rem, 2vh, 2rem);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s var(--ease-out-expo) 0.2s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            margin-bottom: clamp(1.5rem, 2.5vh, 2.5rem);
        }

        .login-header .eyebrow {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-tertiary);
            margin-bottom: 1rem;
            display: block;
        }

        .login-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.15rem;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-tertiary);
            margin-bottom: 0.6rem;
        }

        .form-input {
            width: 100%;
            padding: 1.1rem 1.3rem;
            background: rgba(26, 26, 46, 0.02);
            border: 2px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            outline: none;
            transition: all 0.3s var(--ease-out-expo);
            cursor: none;
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
            font-weight: 300;
        }

        .form-input:focus {
            border-color: var(--accent-light);
            background: rgba(139, 34, 82, 0.05);
            box-shadow: 0 0 22px rgba(139, 34, 82, 0.12);
        }

        .form-input.error {
            border-color: var(--error);
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: none;
        }

        .checkbox-group input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            background: var(--bg-secondary);
            cursor: none;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .checkbox-group input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkbox-group input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .checkbox-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 300;
            cursor: none;
        }

        .forgot-link {
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-light);
            text-decoration: none;
            cursor: none;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--accent-dark);
        }

        .login-btn {
            width: 100%;
            padding: 1.3rem;
            background: var(--accent);
            color: white;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: none;
            cursor: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s var(--ease-out-expo);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            margin-top: 0.5rem;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s;
        }

        .login-btn:hover {
            background: var(--accent-light);
            box-shadow: 0 0 40px var(--accent-glow);
            transform: translateY(-2px);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            display: none;
            align-items: center;
            gap: 0.6rem;
            padding: 1rem 1.2rem;
            background: rgba(231, 76, 60, 0.08);
            border: 1px solid rgba(231, 76, 60, 0.2);
            color: var(--error);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .error-message.show {
            display: flex;
        }

        .error-message svg {
            flex-shrink: 0;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .login-divider span {
            font-family: 'Oswald', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-tertiary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.35rem;
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: none;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s var(--ease-out-expo);
        }

        .back-link:hover svg {
            transform: translateX(-4px);
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            pointer-events: none;
        }

        .blob-form {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow), transparent 60%);
            bottom: -200px;
            right: -200px;
        }

        @media (max-width: 1024px) {
            body {
                flex-direction: column;
                cursor: auto;
                min-height: auto;
            }
            .cursor, .cursor-dot { display: none; }

            .login-image {
                width: 100%;
                min-height: 32vh;
                min-height: 250px;
            }

            .login-image::after {
                background: linear-gradient(to bottom, transparent 30%, var(--bg-secondary) 100%),
                            linear-gradient(135deg, rgba(139,34,82,0.1), transparent 60%);
            }

            .image-text {
                bottom: 2rem;
                left: 2rem;
            }

            .image-text h2 {
                font-size: 2rem;
            }

            .login-panel {
                width: 100%;
                min-height: auto;
                padding: 2rem;
            }

            .login-panel-inner {
                margin: 0 auto;
                padding-block: 0;
            }
        }

        @media (max-height: 860px) and (min-width: 1025px) {
            .login-panel {
                padding-top: 1.5rem;
                padding-bottom: 1.5rem;
            }

            .login-panel-inner {
                max-width: 430px;
                padding-block: 0.5rem;
            }

            .image-text {
                bottom: 2.5rem;
                left: 2.5rem;
            }

            .image-text h2 {
                font-size: clamp(1.7rem, 3vw, 3rem);
                margin-bottom: 0.75rem;
            }

            .image-text p {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .login-panel {
                padding: 1.35rem;
            }

            .login-header {
                margin-bottom: 1.25rem;
            }

            .login-header h1 {
                font-size: 2rem;
            }

            .login-form {
                gap: 1rem;
            }

            .form-input,
            .login-btn {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .form-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <div class="login-image">
        <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80" srcset="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=480&q=75 480w, https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=768&q=75 768w, https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80 1200w, https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1600&q=80 1600w" sizes="(max-width: 980px) 100vw, 52vw" alt="Office workspace" loading="eager" fetchpriority="high" decoding="async">
        <div class="image-text">
            <h2>Welkom <span class="accent">Terug.</span></h2>
            <p>Interne omgeving voor het team van Softora.</p>
        </div>
    </div>

    <div class="login-panel">
        <div class="ambient-blob blob-form"></div>

        <div class="login-panel-inner">
            <div class="login-header">
                <span class="eyebrow">Personeel</span>
                <h1>Inloggen</h1>
                <p>Vul je gegevens in om toegang te krijgen.</p>
            </div>

            <div class="error-message" id="errorMsg">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>Vul je e-mailadres en wachtwoord in.</span>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">E-mailadres</label>
                    <input type="email" id="email" name="email" class="form-input magnetic" placeholder="naam@softora.nl" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Wachtwoord</label>
                    <input type="password" id="password" name="password" class="form-input magnetic" placeholder="••••••••" autocomplete="current-password" required>
                </div>

                <div class="form-group" id="otpGroup" hidden>
                    <label class="form-label" for="otp">2FA-code</label>
                    <input type="text" id="otp" name="otp" class="form-input magnetic" placeholder="123456" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6">
                </div>

                <div class="form-row">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" class="magnetic">
                        <label for="remember">Onthoud mij</label>
                    </div>
                    <a href="mailto:info@softora.nl?subject=Wachtwoord%20reset%20Softora%20Premium" class="forgot-link magnetic">Wachtwoord vergeten?</a>
                </div>

                <button type="submit" class="login-btn magnetic">Inloggen</button>
            </form>

            <div class="login-divider">
                <span>of</span>
            </div>

            <a href="/" class="back-link magnetic">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 16l-4-4m0 0l4-4m-4 4h18"/>
                </svg>
                Terug naar de website
            </a>
        </div>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        const magneticElements = document.querySelectorAll('.magnetic');
        const hasFinePointer = window.matchMedia('(pointer: fine)').matches;
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const enablePointerFx = false && hasFinePointer && !prefersReducedMotion;

        if (enablePointerFx) {
            let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0, dotX = 0, dotY = 0;
            let cursorRafId = null;

            document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; }, { passive: true });

            function animateCursor() {
                cursorX += (mouseX - cursorX) * 1;
                cursorY += (mouseY - cursorY) * 1;
                cursor.style.left = cursorX + 'px';
                cursor.style.top = cursorY + 'px';
                dotX += (mouseX - dotX) * 1;
                dotY += (mouseY - dotY) * 1;
                cursorDot.style.left = dotX + 'px';
                cursorDot.style.top = dotY + 'px';
                cursorRafId = requestAnimationFrame(animateCursor);
            }

            function startCursorLoop() {
                if (cursorRafId === null) {
                    cursorRafId = requestAnimationFrame(animateCursor);
                }
            }

            function stopCursorLoop() {
                if (cursorRafId !== null) {
                    cancelAnimationFrame(cursorRafId);
                    cursorRafId = null;
                }
            }

            startCursorLoop();

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) stopCursorLoop();
                else startCursorLoop();
            });

            magneticElements.forEach((elem) => {
                elem.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                elem.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
            });
        } else {
            cursor.style.display = 'none';
            cursorDot.style.display = 'none';
            document.body.style.cursor = 'auto';
            magneticElements.forEach((elem) => {
                elem.style.cursor = 'pointer';
            });
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.querySelector('span').textContent = message;
            errorMsg.classList.add('show');
        }

        function hideError() {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.remove('show');
        }

        function getNextPath() {
            const params = new URLSearchParams(window.location.search);
            const next = params.get('next') || '';
            if (!next || !next.startsWith('/') || next.startsWith('//') || next.includes('://')) {
                return '/premium-personeel-dashboard';
            }
            return next;
        }

        function setOtpVisibility(isVisible) {
            const otpGroup = document.getElementById('otpGroup');
            const otp = document.getElementById('otp');
            const shouldShow = Boolean(isVisible);
            otpGroup.hidden = !shouldShow;
            otp.disabled = !shouldShow;
            otp.required = shouldShow;
            if (!shouldShow) {
                otp.value = '';
                otp.classList.remove('error');
            }
        }

        async function syncLoginState() {
            const params = new URLSearchParams(window.location.search);
            try {
                const response = await fetch('/api/auth/session', {
                    method: 'GET',
                    credentials: 'same-origin',
                    cache: 'no-store'
                });

                if (!response.ok) return;
                const payload = await response.json();
                setOtpVisibility(Boolean(payload && payload.mfaEnabled));
                if (payload && payload.authenticated && !params.has('logout')) {
                    window.location.replace(getNextPath());
                    return;
                }

                if (params.get('setup') === '1' || payload.configured === false) {
                    showError('Premium login is nog niet geconfigureerd op de server.');
                } else if (params.get('blocked') === '1') {
                    showError('Toegang geweigerd vanaf dit IP-adres.');
                }
            } catch (_) {
                if (params.get('setup') === '1') {
                    showError('Premium login is nog niet geconfigureerd op de server.');
                } else if (params.get('blocked') === '1') {
                    showError('Toegang geweigerd vanaf dit IP-adres.');
                }
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const otp = document.getElementById('otp');
            const btn = document.querySelector('.login-btn');
            const remember = document.getElementById('remember');
            if (!btn) return false;
            const originalBtnText = btn.textContent;

            email.classList.remove('error');
            password.classList.remove('error');
            otp.classList.remove('error');
            hideError();
            btn.textContent = 'Bezig...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            if (!email.value.trim()) email.classList.add('error');
            if (!password.value.trim()) password.classList.add('error');

            if (!email.value.trim() || !password.value.trim()) {
                showError('Vul je e-mailadres en wachtwoord in.');
                btn.textContent = originalBtnText;
                btn.style.opacity = '1';
                btn.disabled = false;
                return false;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        email: email.value.trim(),
                        password: password.value,
                        otp: otp.disabled ? '' : otp.value.trim(),
                        remember: remember.checked,
                        next: getNextPath()
                    })
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok || !payload.ok) {
                    const errorMessage = (payload && payload.error) || 'Inloggen mislukt.';
                    email.classList.add('error');
                    password.classList.add('error');
                    if (payload && payload.mfaRequired) {
                        setOtpVisibility(true);
                        otp.classList.add('error');
                    }
                    showError(errorMessage);
                    return false;
                }

                window.location.assign(payload.next || getNextPath());
                return false;
            } catch (_) {
                showError('De server reageert niet. Probeer het opnieuw.');
                return false;
            } finally {
                btn.textContent = originalBtnText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }

            return false;
        }

        document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
        setOtpVisibility(false);
        syncLoginState();
    </script>
</body>
</html>

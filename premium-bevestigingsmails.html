}

.sidebar-nav {

}

.sidebar-section-label {

}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 28px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.15s ease;
  text-decoration: none;
  position: relative;
}

.nav-item:hover {
  color: var(--text-dark);
  background: rgba(0, 0, 0, 0.025);
}

.nav-item.active {
  color: var(--text-dark);
  background: rgba(139, 34, 82, 0.06);
  font-weight: 600;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--crimson);
  border-radius: 0 2px 2px 0;
}

.nav-icon {
  width: 18px;
  height: 18px;
  opacity: 0.62;
  flex-shrink: 0;
}

.nav-item.active .nav-icon,
.nav-item:hover .nav-icon {
  opacity: 1;
}

.sidebar-footer {
  flex-shrink: 0;
  padding: 1.5rem 2rem;
  border-top: 1px solid var(--border);
}

.sidebar-user {
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.sidebar-avatar {
  width: 38px;
  height: 38px;
  background: var(--crimson);
  border-radius: 50%;

  align-items: center;
  justify-content: center;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: #fff;

.sidebar-user-info {

}

.sidebar-user-name {

  font-weight: 600;
  color: var(--text-dark);
}

.sidebar-user-role {

.logout-btn {

  align-items: center;
  justify-content: center;
  color: var(--text-light);
  text-decoration: none;
}

.logout-btn svg {

  height: 18px;
}

.main-content {
  flex: 1;
  margin-left: 280px;
  padding: 3rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.coming-shell {
  width: 100%;
  max-width: 980px;
  min-height: calc(100vh - 6rem);
  display: flex;
  align-items: center;
  justify-content: center;
}

.coming-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(2.8rem, 7vw, 5.6rem);
  font-weight: 700;
  line-height: 0.96;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--text-dark);
}

@media (max-width: 920px) {
  .sidebar {
    position: static;
    width: 100%;
    min-height: auto;

  .dashboard-layout {

  }

  .main-content {
    margin-left: 0;
    padding: 1.5rem;
  }

  .coming-shell {
    min-height: auto;
  }
}

@media (max-width: 640px) {

</style>

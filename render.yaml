services:
  - type: web
    name: softora-nl-final
    env: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: COLDCALLING_PROVIDER
        value: retell
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_FROM_NUMBER
        sync: false
      - key: RETELL_AGENT_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: COLDCALLING_START_CONFIRM_PIN
        sync: false
      - key: PREMIUM_SETTINGS_CONFIRM_PIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ADMIN_KEY
        sync: false
      - key: OPENAI_ADMIN_API_KEY
        sync: false
      - key: OPENAI_COSTS_API_KEY
        sync: false
      - key: OPENAI_ORGANIZATION_ID
        sync: false
      - key: OPENAI_ORG_ID
        sync: false
      - key: OPENAI_PROJECT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STATE_TABLE
        value: softora_runtime_state
      - key: SUPABASE_STATE_KEY
        value: core
      - key: MAIL_SMTP_HOST
        sync: false
      - key: MAIL_SMTP_PORT
        value: 587
      - key: MAIL_SMTP_SECURE
        value: false
      - key: MAIL_SMTP_USER
        sync: false
      - key: MAIL_SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_IMAP_HOST
        sync: false
      - key: MAIL_IMAP_PORT
        value: 993
      - key: MAIL_IMAP_SECURE
        value: true
      - key: MAIL_IMAP_USER
        sync: false
      - key: MAIL_IMAP_PASS
        sync: false
      - key: MAILBOX_SERVE_SOFTORA_NL_USER
        sync: false
      - key: MAILBOX_SERVE_SOFTORA_NL_PASS
        sync: false
      - key: MAILBOX_RUBEN_SOFTORA_NL_USER
        sync: false
      - key: MAILBOX_RUBEN_SOFTORA_NL_PASS
        sync: false
      - key: MAILBOX_MARTIJN_SOFTORA_NL_USER
        sync: false
      - key: MAILBOX_MARTIJN_SOFTORA_NL_PASS
        sync: false
      - key: COLDMAIL_REPLY_FORWARD_ENABLED
        value: false
      - key: COLDMAIL_REPLY_FORWARD_FROM
        sync: false
      - key: COLDMAIL_REPLY_FORWARD_TO
        sync: false
      - key: COLDMAIL_REPLY_SYNC_EMAIL
        sync: false
      - key: COLDMAIL_UNSUBSCRIBE_SECRET
        sync: false
      - key: COLDMAIL_BOUNCE_PROCESSING_ENABLED
        value: true
      - key: COLDMAIL_DAILY_SEND_LIMIT
        value: 30
      - key: COLDMAIL_PACKAGE_DAILY_SEND_LIMIT
        value: 60
      - key: COLDMAIL_SEND_DELAY_MS
        value: 90000
      - key: COLDMAIL_SAFETY_PAUSE_MS
        value: 21600000
      - key: COLDMAIL_PERSONAL_MAILBOX_DAILY_LIMIT
        value: 10
      - key: COLDMAIL_PERSONAL_MAILBOX_SEND_DELAY_MS
        value: 180000
      - key: COLDMAIL_BLOCK_PERSONAL_MAILBOX_DOMAINS
        value: false
      - key: GOOGLE_CALENDAR_SYNC_ENABLED
        value: false
      - key: GOOGLE_CALENDAR_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_CALENDAR_PRIVATE_KEY
        sync: false
      - key: GOOGLE_CALENDAR_SERVE_ID
        sync: false
      - key: GOOGLE_CALENDAR_MARTIJN_ID
        sync: false
      - key: TWILIO_MEDIA_WS_URL_GEMINI_FLASH_3_1_LIVE
        value: wss://twilio-media-bridge-ln3f.onrender.com/twilio-media
      - key: TWILIO_MEDIA_BRIDGE_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_API_REGION
        value: ie1
      - key: TWILIO_API_EDGE
        value: dublin
  - type: web
    name: twilio-media-bridge
    runtime: node
    rootDir: twilio-media-bridge
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-live-preview
      - key: GEMINI_VOICE
        value: Puck
      - key: GEMINI_REQUIRE_CUSTOM_PROMPT
        value: false
      - key: GEMINI_AUTO_START
        value: true
      - key: GEMINI_SYSTEM_PROMPT
        sync: false
      - key: GEMINI_SYSTEM_PROMPT_LOCKED
        value: true
      - key: AMBIENT_ENABLED
        value: true
      - key: AMBIENT_ASSET_PATH
        value: assets/office-freesound-community-6322-8k.raw
      - key: AMBIENT_NOISE_LEVEL
        value: 0.22
      - key: AMBIENT_DUCK_LEVEL
        value: 0.10
      - key: NOISE_GATE_RMS
        value: 250
      - key: BRIDGE_MEDIA_TOKEN
        sync: false
      - key: BRIDGE_DEBUG_TOKEN
        sync: false

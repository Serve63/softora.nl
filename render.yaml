services:
  - type: web
    name: softora-vapi-coldcalling
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
      - key: VAPI_PHONE_NUMBER_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STATE_TABLE
        value: softora_runtime_state
      - key: SUPABASE_STATE_KEY
        value: core
      - key: COLDCALL_LOW_LATENCY_ENABLED
        value: false
      - key: COLDCALL_DEFAULT_ENGINE
        value: vapi
      - key: CORS_ALLOWED_ORIGINS
        value: https://softora.nl,https://www.softora.nl
      - key: COLDCALL_LOW_LATENCY_PUBLIC_BASE_URL
        sync: false
      - key: COLDCALL_LOW_LATENCY_WS_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: COLDCALL_LOW_LATENCY_ELEVEN_VOICE_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6

services:
  - type: web
    name: softora-retell-coldcalling
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: COLDCALLING_PROVIDER
        value: retell
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_FROM_NUMBER
        sync: false
      - key: RETELL_AGENT_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STATE_TABLE
        value: softora_runtime_state
      - key: SUPABASE_STATE_KEY
        value: core
      - key: TWILIO_MEDIA_WS_URL_GEMINI_FLASH_3_1_LIVE
        value: wss://twilio-media-bridge-ln3f.onrender.com/twilio-media
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_API_REGION
        value: ie1
      - key: TWILIO_API_EDGE
        value: dublin
  - type: web
    name: twilio-media-bridge-pjzd
    runtime: node
    rootDir: twilio-media-bridge
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-live-preview
      - key: GEMINI_VOICE
        value: Puck
      - key: GEMINI_REQUIRE_CUSTOM_PROMPT
        value: false
      - key: GEMINI_AUTO_START
        value: true
      - key: GEMINI_SYSTEM_PROMPT
        sync: false
      - key: GEMINI_SYSTEM_PROMPT_LOCKED
        value: true
      - key: AMBIENT_ENABLED
        value: true
      - key: AMBIENT_ASSET_PATH
        value: assets/office-freesound-community-6322-8k.raw
      - key: AMBIENT_NOISE_LEVEL
        value: 0.22
      - key: AMBIENT_DUCK_LEVEL
        value: 0.10
      - key: NOISE_GATE_RMS
        value: 250
      - key: BRIDGE_DEBUG_TOKEN
        sync: false

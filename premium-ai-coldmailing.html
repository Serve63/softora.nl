<html lang="nl">
<head>

    <script>
        (function () {
            document.documentElement.setAttribute('data-personnel-loading', 'true');
            try {
                var storageKey = 'softora_premium_personnel_theme_mode';
                localStorage.setItem(storageKey, 'light');
                document.documentElement.setAttribute('data-theme-mode', 'light');
                document.documentElement.setAttribute('data-theme', 'light');
            } catch (error) {
                /* ignore storage errors */
            }
        })();
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #080808;
            --bg-secondary: #0d0d0d;
            --bg-tertiary: #111;
            --accent: #8b2252;
            --accent-dark: #6b1a3f;
            --accent-light: #a62d65;
            --text-primary: #f5f5f5;
            --text-secondary: #888;
            --text-tertiary: #555;
            --border: rgba(255, 255, 255, 0.06);
            --green: #2ecc71;
            --warn: #f39c12;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 2.5rem 0 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            padding: 0 2rem;
            margin-bottom: 2rem;
            display: block;
            text-transform: uppercase;
        }

        .sidebar-logo span { color: var(--accent-light); }
        .sidebar-nav {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }
        .sidebar-section { margin-bottom: 1.2rem; }

        .sidebar-flow-section {
            position: relative;
        }

        .sidebar-flow-section::before {
            content: '';
            position: absolute;
            left: 0.82rem;
            top: 6.45rem;
            bottom: 1.35rem;
            width: 0.7rem;
            background: rgba(139, 34, 82, 0.72);
            clip-path: polygon(50% 0, 100% 0.46rem, 66% 0.46rem, 66% 100%, 34% 100%, 34% 0.46rem, 0 0.46rem);
            pointer-events: none;
        }

        .sidebar-flow-section .sidebar-link {
            padding-left: 2.8rem;
        }

        .sidebar-section-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-tertiary);
            padding: 0 2rem;
            margin-bottom: 0.5rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            transition: all 0.2s;
            position: relative;
        }

        .sidebar-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .sidebar-link.active {
            color: var(--text-primary);
            background: rgba(139, 34, 82, 0.08);
            border-left: 3px solid var(--accent-light);
        }

        .sidebar-link svg {
            width: 19px;
            height: 19px;
            stroke: currentColor;
            opacity: 0.95;
            flex-shrink: 0;
        }

        .sidebar-footer {
            flex-shrink: 0;
            padding: 1.5rem 2rem;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-secondary);
        }

        .sidebar-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .sidebar-user-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-footer .sidebar-user .sidebar-user-role {
            display: block;
        }

        .sidebar-user-name {
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .sidebar-user-role {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-top: 0.1rem;

            margin-left: auto;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            text-decoration: none;
            background: transparent;
        }

        .logout-btn:hover {
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .logout-btn svg {

            height: 16px;
            transform: scaleX(-1);
        }

        .sidebar-footer .sidebar-user .logout-btn {
            margin-left: auto !important;
            flex-shrink: 0;

            margin-left: 280px;
            width: calc(100% - 280px);
            padding: 2.5rem 3rem;
        }

            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.6rem;

        .topbar p {
            color: var(--text-secondary);

        .reload-btn {
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 10px;
            width: 48px;
            height: 48px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .reload-btn:hover {
            border-color: var(--accent-light);
            color: var(--accent-light);
        }

        .reload-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
        }

        .panel {
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 1.2rem;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            margin-bottom: 0.9rem;
        }

        .panel-title {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.92rem;
            color: var(--text-tertiary);
        }

        .panel-count {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.82rem;
            padding: 0.32rem 0.55rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-secondary);
        }

        .search-wrap {
            margin-bottom: 0.9rem;
        }

        .search-input {
            width: 100%;
            height: 44px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 0 0.85rem;
            font-size: 0.95rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-light);
        }

        .lead-status {
            min-height: 20px;
            margin-bottom: 0.7rem;
            color: var(--text-tertiary);
            font-size: 0.88rem;
        }

        .lead-status.error {
            color: #f06b82;
        }

        .lead-list {
            display: grid;
            gap: 0.65rem;
        }

        .lead-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            padding: 0.8rem 0.9rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.8rem;
        }

        .lead-name {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.25;
        }

        .lead-meta {
            margin-top: 0.2rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.45;
        }

        .lead-chip {
            flex-shrink: 0;
            font-family: 'Oswald', sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.27rem 0.52rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .lead-chip.pending {
            border-color: rgba(243, 156, 18, 0.5);
            color: var(--warn);
        }

        .lead-chip.confirmed {
            border-color: rgba(46, 204, 113, 0.5);
            color: var(--green);
        }

        .lead-empty {
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.01);
        }

        @media (max-width: 900px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
            }

            .main-content {
                width: 100%;
                margin-left: 0;
                padding: 1.3rem;
            }

            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .lead-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

    <script>
        (function initLeadsOverview() {
            const listEl = document.getElementById('leadList');
            const statusEl = document.getElementById('leadStatus');
            const reloadBtn = document.getElementById('reloadLeadsBtn');
            if (!listEl || !statusEl || !reloadBtn) return;

            let allLeads = [];
            let pollTimer = null;

            function esc(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function normalize(value) {
                return String(value || '')
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .trim();
            }

            function formatDateTime(item) {
                const date = String(item?.date || '').trim();
                const time = String(item?.time || '').trim();
                if (!date && !time) return 'Geen afspraakmoment';
                if (!date) return time;
                const dt = new Date(`${date}T${time || '09:00'}:00`);
                if (Number.isNaN(dt.getTime())) return `${date}${time ? ` ${time}` : ''}`;
                return dt.toLocaleString('nl-NL', {
                    weekday: 'short',
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                });
            }

            function setStatus(message, variant) {
                statusEl.textContent = String(message || '');
                statusEl.className = `lead-status${variant ? ` ${variant}` : ''}`;
            }

            function renderList() {
                if (!allLeads.length) {
                    listEl.innerHTML = '<div class="lead-empty">Nog geen leads gevonden.</div>';
                    return;
                }

                listEl.innerHTML = allLeads.map((item) => {
                    const company = esc(item.company || 'Onbekende lead');
                    const contact = esc(item.contact || 'Onbekend contact');
                    const phone = esc(item.phone || 'Geen telefoon');
                    const moment = esc(formatDateTime(item));
                    const chipClass = 'pending';
                    const chipLabel = 'LEAD';

                    return `
                        <article class="lead-item">
                            <div>
                                <div class="lead-name">${company}</div>
                                <div class="lead-meta">${contact} · ${phone}</div>
                                <div class="lead-meta">${moment}</div>
                            </div>
                            <span class="lead-chip ${chipClass}">${chipLabel}</span>
                        </article>
                    `;
                }).join('');
            }

            function sortByDateDesc(a, b) {
                const aTs = Date.parse(`${String(a.date || '')}T${String(a.time || '00:00')}:00`) || 0;
                const bTs = Date.parse(`${String(b.date || '')}T${String(b.time || '00:00')}:00`) || 0;
                if (aTs === bTs) return String(a.company || '').localeCompare(String(b.company || ''));
                return bTs - aTs;
            }

            function normalizeLeadRow(item) {
                return {
                    id: Number(item?.id) || 0,
                    company: String(item?.company || 'Onbekende lead').trim() || 'Onbekende lead',
                    contact: String(item?.contact || '').trim(),
                    phone: String(item?.phone || '').trim(),
                    date: String(item?.date || '').trim(),
                    time: String(item?.time || '').trim(),
                };
            }

            function dedupe(rows) {
                const map = new Map();
                rows.forEach((row) => {
                    const key = [
                        normalize(row.company),
                        normalize(row.contact),
                        normalize(row.phone),
                        normalize(row.date),
                        normalize(row.time),
                    ].join('|');
                    if (!map.has(key)) map.set(key, row);
                });
                return Array.from(map.values());
            }

            async function loadLeads() {
                setStatus('Leads laden...', '');
                reloadBtn.disabled = true;
                try {
                    const [tasksRes, appointmentsRes] = await Promise.all([
                        fetch('/api/agenda/confirmation-tasks?limit=400', { cache: 'no-store' }),
                        fetch('/api/agenda/appointments?limit=400', { cache: 'no-store' }),
                    ]);

                    const tasksData = await tasksRes.json().catch(() => ({}));
                    const appointmentsData = await appointmentsRes.json().catch(() => ({}));

                    const pendingRows = Array.isArray(tasksData?.tasks)
                        ? tasksData.tasks.map((item) => normalizeLeadRow(item))
                        : [];
                    const agendaRows = Array.isArray(appointmentsData?.appointments)
                        ? appointmentsData.appointments.map((item) => normalizeLeadRow(item))
                        : [];

                    allLeads = dedupe(pendingRows.concat(agendaRows)).sort(sortByDateDesc);
                    renderList();

                    if (allLeads.length > 0) {
                        setStatus(`Laatste update: ${new Date().toLocaleTimeString('nl-NL')}`, '');
                    } else {
                        setStatus('Nog geen leads gevonden.', '');
                    }
                } catch (error) {
                    setStatus(`Leads laden mislukt: ${String(error?.message || error || 'onbekende fout')}`, 'error');
                    allLeads = [];
                    renderList();
                } finally {
                    reloadBtn.disabled = false;
                }
            }

            reloadBtn.addEventListener('click', () => {
                loadLeads();
            });

            loadLeads();

            pollTimer = window.setInterval(() => {
                loadLeads();
            }, 45000);

            window.addEventListener('beforeunload', () => {
                if (pollTimer) window.clearInterval(pollTimer);
            });
        })();
    </script>
</body>
</html>

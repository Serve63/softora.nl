<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boekhouding - Softora.nl</title>
<link rel="stylesheet" href="/assets/iphone-optimizations.css">
<link rel="stylesheet" href="assets/personnel-theme.css?v=20260411a">
<script>
  (function () {
    document.documentElement.setAttribute("data-personnel-loading", "true");
    try {
      document.documentElement.setAttribute("data-theme-mode", "light");
      document.documentElement.setAttribute("data-theme", "light");
    } catch (_) {
      /* ignore */
    }
  })();
</script>
<script src="assets/personnel-theme.js?v=20260411a" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: var(--bg-primary, #f8f7f4); --card: var(--bg-secondary, #fff); --tag: #f5f0eb; --border: rgba(0, 0, 0, 0.08);
  --crimson: var(--accent, #8b2252); --clight: var(--accent-light, #a62d65); --dark: var(--text-primary, #1a1a2e);
  --mid: var(--text-secondary, #606272); --light: var(--text-tertiary, #9a9cac); --green: #16733c; --orange: #b45a00; --red: #c0392b;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }
.dashboard-layout { display: flex; min-height: 100vh; }
.sidebar { width: 280px; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; display: flex; flex-direction: column; }
.main-content { margin-left: 280px; width: calc(100% - 280px); min-width: 0; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* -- SCHERM 1: OVERZICHT -- */
#screen-overzicht { padding: 40px 48px 60px; }

.logo { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; color: var(--crimson); margin-bottom: 6px; }
.page-title { font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.page-sub { font-size: 13px; color: var(--light); margin-top: 3px; margin-bottom: 32px; }

.year-nav { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
.year-label { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1px; }
.btn-yr { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--mid); transition: all .15s; }
.btn-yr:hover { border-color: var(--crimson); color: var(--crimson); }
.btn-yr svg { width: 13px; height: 13px; }

.section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--light); margin-bottom: 12px; margin-top: 24px; }
.section-label:first-child { margin-top: 0; }

/* AANGIFTE RIJEN */
.aangifte-list { display: flex; flex-direction: column; gap: 8px; }

.aangifte-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: grid;
  grid-template-columns: 40px 1fr 100px 160px 110px 32px;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  transition: all .15s;
}
.aangifte-row:hover { box-shadow: 0 2px 12px rgba(0,0,0,.07); border-color: rgba(139,34,82,.2); }
.aangifte-row.done { border-color: rgba(22,115,60,.2); background: rgba(22,115,60,.02); }
.aangifte-row.urgent { border-color: rgba(192,57,43,.25); }
.aangifte-row.soon { border-color: rgba(180,90,0,.2); }

.check-cell { display: flex; align-items: center; }
.check-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; flex-shrink: 0; }
.check-box:hover { border-color: var(--green); }
.check-box.checked { background: var(--green); border-color: var(--green); }
.check-box svg { width: 10px; height: 10px; color: #fff; opacity: 0; transition: opacity .15s; }
.check-box.checked svg { opacity: 1; }

.info-cell { padding-right: 16px; }
.row-name { font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 2px; }
.row-period { font-size: 11px; color: var(--light); }

.files-cell { font-size: 12px; color: var(--mid); text-align: center; }
.files-cell strong { display: block; font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: var(--dark); line-height: 1; }

.deadline-cell { text-align: right; }
.dl-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--light); margin-bottom: 2px; }
.dl-date { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; }

.badge-cell { display: flex; justify-content: flex-end; }
.badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 4px; white-space: nowrap; font-family: 'Oswald', sans-serif; letter-spacing: .5px; }
.badge-done     { background: rgba(22,115,60,.1); color: var(--green); }
.badge-urgent   { background: rgba(192,57,43,.1); color: var(--red); }
.badge-soon     { background: rgba(180,90,0,.1);  color: var(--orange); }
.badge-future   { background: rgba(0,0,0,.05);    color: var(--light); }

.arrow-cell { display: flex; justify-content: flex-end; color: var(--light); }
.aangifte-row:hover .arrow-cell { color: var(--crimson); }

/* -- SCHERM 2: MAP -- */
#screen-map { display: none; flex-direction: column; }
#screen-map.active { display: flex; }

.map-back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 18px;
  padding: 0;
  border: none;
  background: none;
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--light);
  cursor: pointer;
  transition: color 0.15s;
}
.map-back-link:hover { color: var(--crimson); }

.map-body { padding: 32px 48px 60px; flex: 1; }

/* FILES */
.files-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.files-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--light); }
.files-count { font-size: 11px; color: var(--light); }

.files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }

.file-tile { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 14px 12px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all .15s; position: relative; text-align: center; }
.file-tile:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); border-color: rgba(139,34,82,.2); transform: translateY(-1px); }

.file-doc { position: relative; width: 40px; height: 48px; }
.file-doc svg.doc-bg { width: 40px; height: 48px; position: absolute; top: 0; left: 0; }
.file-doc-ext { position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%); font-size: 7px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: #fff; background: rgba(0,0,0,.2); padding: 1px 4px; border-radius: 2px; white-space: nowrap; }

.file-name { font-size: 11px; font-weight: 600; color: var(--dark); line-height: 1.3; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { font-size: 10px; color: var(--light); }

.file-del { position: absolute; top: 5px; right: 5px; width: 18px; height: 18px; background: none; border: none; cursor: pointer; color: var(--light); display: none; align-items: center; justify-content: center; border-radius: 3px; transition: all .15s; }
.file-tile:hover .file-del { display: flex; }
.file-del:hover { color: var(--red); background: rgba(192,57,43,.08); }
.file-del svg { width: 10px; height: 10px; }

.files-empty { text-align: center; padding: 40px 0; color: var(--light); }
.files-empty svg { width: 32px; height: 32px; opacity: .2; margin: 0 auto 10px; display: block; }
.files-empty p { font-size: 13px; line-height: 1.55; }
.files-empty-trigger {
  cursor: pointer;
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  padding: 44px 20px;
  background: var(--card);
  transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
}
.files-empty-trigger:hover,
.files-empty-trigger.files-empty--over {
  border-color: rgba(139, 34, 82, 0.45);
  background: rgba(139, 34, 82, 0.03);
  box-shadow: 0 2px 14px rgba(0, 0, 0, 0.05);
}
.files-empty-trigger:hover svg,
.files-empty-trigger.files-empty--over svg { opacity: 0.35; }
.files-empty-trigger:focus {
  outline: 2px solid rgba(139, 34, 82, 0.35);
  outline-offset: 2px;
}
.files-empty-trigger .files-empty-accent { color: var(--crimson); font-weight: 600; }

/* NOTES */
.notes-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--light); margin-bottom: 10px; }
.notes-ta { width: 100%; border: 1px solid var(--border); border-radius: 5px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--dark); background: var(--card); resize: none; outline: none; min-height: 80px; transition: border-color .15s; line-height: 1.6; }
.notes-ta:focus { border-color: var(--crimson); }
.btn-save { margin-top: 10px; display: flex; align-items: center; gap: 7px; padding: 8px 18px; background: var(--crimson); color: #fff; border: none; border-radius: 4px; font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background .15s; }
.btn-save:hover { background: var(--clight); }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--dark); color: #fff; padding: 10px 16px; border-radius: 5px; font-size: 12px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; z-index: 99; }
.toast.show { opacity: 1; transform: translateY(0); }
@media (max-width: 900px) {
  .main-content { margin-left: 0; width: 100%; }
  .sidebar { display: none; }
}
</style>
</head>
<body>
<div class="dashboard-layout">
<aside class="sidebar"></aside>
<main class="main-content">

<!-- SCHERM 1: OVERZICHT -->
<div class="screen active" id="screen-overzicht">
  <div class="logo">SOFTORA.NL</div>
  <div class="page-title">Boekhouding</div>
  <div class="page-sub">Fiscale verplichtingen en aangiftekalender voor je VOF</div>

  <div class="year-nav">
    <button class="btn-yr" onclick="changeYear(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="year-label" id="year-label">2026</div>
    <button class="btn-yr" onclick="changeYear(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>

  <div id="list-wrap"></div>
</div>

<!-- SCHERM 2: MAP -->
<div class="screen" id="screen-map">
  <div class="map-body">
    <button type="button" class="map-back-link" onclick="goBack()">← Terug naar overzicht</button>
    <input type="file" multiple id="file-inp" style="display:none" onchange="addFiles(this.files)">

    <div class="files-header">
      <div class="files-title">Bestanden</div>
      <div class="files-count" id="files-count"></div>
    </div>
    <div class="files-grid" id="files-grid"></div>

    <div class="notes-label">Notities</div>
    <textarea class="notes-ta" id="notes-ta" placeholder="Bijv. referentienummer, ingestuurde bedragen, bijzonderheden..."></textarea>
    <button class="btn-save" onclick="saveNotes()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>
      Opslaan
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let year = new Date().getFullYear();
let openId = null;

// STATE
function load() { try { return JSON.parse(localStorage.getItem('bkh3')||'{}'); } catch { return {}; } }
function save() { try { localStorage.setItem('bkh3', JSON.stringify(st)); } catch {} }
let st = load();
function entry(id) { return st[id] || { checked:false, files:[], notes:'' }; }
function upd(id, d) { st[id] = { ...entry(id), ...d }; save(); }

// AANGIFTES
function aangiftes(y) {
  return [
    { id:`btw1-${y}`, naam:'BTW Aangifte', period:`1e kwartaal ${y} (jan - mrt)`, deadline:`${y}-04-30`, cat:'Omzetbelasting (BTW)' },
    { id:`btw2-${y}`, naam:'BTW Aangifte', period:`2e kwartaal ${y} (apr - jun)`, deadline:`${y}-07-31`, cat:'Omzetbelasting (BTW)' },
    { id:`btw3-${y}`, naam:'BTW Aangifte', period:`3e kwartaal ${y} (jul - sep)`, deadline:`${y}-10-31`, cat:'Omzetbelasting (BTW)' },
    { id:`btw4-${y}`, naam:'BTW Aangifte', period:`4e kwartaal ${y} (okt - dec)`, deadline:`${y+1}-01-31`, cat:'Omzetbelasting (BTW)' },
    { id:`ib-${y}`,   naam:'Inkomstenbelasting', period:`Belastingjaar ${y}`,      deadline:`${y+1}-05-01`, cat:'Inkomstenbelasting' },
    { id:`icp1-${y}`, naam:'ICP Opgave', period:`1e kwartaal ${y}`,               deadline:`${y}-04-30`, cat:'Overige Opgaven' },
  ];
}

// HELPERS
function daysLeft(d) { const n=new Date(); n.setHours(0,0,0,0); const t=new Date(d); t.setHours(0,0,0,0); return Math.round((t-n)/86400000); }
function fmtDate(s) { if(!s) return '-'; const[y,m,d]=s.split('-'); const mo=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec']; return `${parseInt(d,10)} ${mo[m-1]} ${y}`; }
function fmtSize(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'; }

function badge(id, deadline) {
  const e = entry(id);
  if (e.checked) return { cls:'badge-done', txt:'Ingediend' };
  const d = daysLeft(deadline);
  if (d < 0)   return { cls:'badge-urgent', txt:'Verlopen' };
  if (d <= 14) return { cls:'badge-urgent', txt:`Nog ${d} dagen` };
  if (d <= 30) return { cls:'badge-soon',   txt:`Nog ${d} dagen` };
  return { cls:'badge-future', txt:`Nog ${d} dagen` };
}

function rowClass(id, deadline) {
  const e = entry(id);
  if (e.checked) return 'done';
  const d = daysLeft(deadline);
  if (d <= 14) return 'urgent';
  if (d <= 30) return 'soon';
  return '';
}

// RENDER OVERZICHT
function renderList() {
  document.getElementById('year-label').textContent = year;
  const all = aangiftes(year);
  const undone = all.filter(a => !entry(a.id).checked).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const done   = all.filter(a =>  entry(a.id).checked).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));

  let html = '';

  // Group undone by category
  if (undone.length) {
    const cats = [...new Set(undone.map(a => a.cat))];
    cats.forEach(cat => {
      const items = undone.filter(a => a.cat === cat);
      html += `<div class="section-label">${cat}</div><div class="aangifte-list">`;
      html += items.map(a => row(a)).join('');
      html += `</div>`;
    });
  }
  if (done.length) {
    html += `<div class="section-label">Ingediend</div><div class="aangifte-list">`;
    html += done.map(a => row(a)).join('');
    html += `</div>`;
  }

  document.getElementById('list-wrap').innerHTML = html;
}

function row(a) {
  const e = entry(a.id);
  const fc = (e.files||[]).length;
  const b = badge(a.id, a.deadline);
  const dlColor = e.checked?'var(--green)':daysLeft(a.deadline)<=14?'var(--red)':daysLeft(a.deadline)<=30?'var(--orange)':'var(--dark)';

  return `<div class="aangifte-row ${rowClass(a.id,a.deadline)}" onclick="openMap('${a.id}')">
    <div class="check-cell" onclick="event.stopPropagation()">
      <div class="check-box ${e.checked?'checked':''}" onclick="toggleCheck('${a.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <div class="info-cell">
      <div class="row-name">${a.naam}</div>
      <div class="row-period">${a.period}</div>
    </div>
    <div class="files-cell"><strong>${fc}</strong>bestand${fc!==1?'en':''}</div>
    <div class="deadline-cell">
      <div class="dl-label">Deadline</div>
      <div class="dl-date" style="color:${dlColor}">${fmtDate(a.deadline)}</div>
    </div>
    <div class="badge-cell"><span class="badge ${b.cls}">${b.txt}</span></div>
    <div class="arrow-cell"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>`;
}

// TOGGLE CHECK
function toggleCheck(id) {
  const e = entry(id);
  upd(id, { checked: !e.checked });
  renderList();
  showToast(!e.checked ? 'Gemarkeerd als ingediend' : 'Teruggezet naar openstaand');
}

// JAAR
function changeYear(d) { year += d; renderList(); }

// OPEN MAP
function openMap(id) {
  openId = id;
  const all = aangiftes(year);
  const a = all.find(x => x.id === id); if (!a) return;
  const e = entry(id);

  document.getElementById('notes-ta').value = e.notes || '';
  renderFiles();

  document.getElementById('screen-overzicht').classList.remove('active');
  document.getElementById('screen-map').classList.add('active');
  window.scrollTo(0,0);
}

// RENDER FILES
function renderFiles() {
  const e = entry(openId);
  const files = e.files || [];
  const grid = document.getElementById('files-grid');
  const cnt  = document.getElementById('files-count');
  cnt.textContent = files.length + ' bestand' + (files.length!==1?'en':'');

  if (!files.length) {
    grid.innerHTML = `<div class="files-empty files-empty-trigger" style="grid-column:1/-1" role="button" tabindex="0" aria-label="Bestand kiezen of hierheen slepen"
      onclick="document.getElementById('file-inp').click()"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();document.getElementById('file-inp').click();}"
      ondragover="event.preventDefault();this.classList.add('files-empty--over')"
      ondragleave="this.classList.remove('files-empty--over')"
      ondrop="event.preventDefault();this.classList.remove('files-empty--over');addFiles(event.dataTransfer.files)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>Nog geen bestanden — sleep ze hierheen of <span class="files-empty-accent">klik in dit vlak</span> om te uploaden.</p>
    </div>`;
    return;
  }

  const extCol = { pdf:'#c0392b',xlsx:'#16733c',xls:'#16733c',csv:'#16733c',docx:'#1a5f8a',doc:'#1a5f8a',jpg:'#b45a00',jpeg:'#b45a00',png:'#b45a00',pptx:'#c0392b' };

  grid.innerHTML = files.map((f,i) => {
    const ext = f.name.split('.').pop().toLowerCase();
    const col = extCol[ext] || '#888';
    return `<div class="file-tile" onclick="openFile(${i})">
      <button class="file-del" onclick="event.stopPropagation();delFile(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="file-doc">
        <svg class="doc-bg" viewBox="0 0 40 48" fill="none">
          <path d="M0 4C0 1.79086 1.79086 0 4 0H26L40 14V44C40 46.2091 38.2091 48 36 48H4C1.79086 48 0 46.2091 0 44V4Z" fill="${col}15" stroke="${col}35" stroke-width="1.2"/>
          <path d="M26 0L40 14H30C27.7909 14 26 12.2091 26 10V0Z" fill="${col}35"/>
        </svg>
        <div class="file-doc-ext">${ext}</div>
      </div>
      <div class="file-name" title="${f.name}">${f.name}</div>
      <div class="file-size">${f.size}</div>
    </div>`;
  }).join('');
}

function openFile(i) {
  const f = (entry(openId).files||[])[i];
  if (!f) return;
  if (f.url) { const a=document.createElement('a'); a.href=f.url; a.download=f.name; a.click(); }
  showToast('Bestand: ' + f.name);
}

function delFile(i) {
  const e = entry(openId);
  const files = [...(e.files||[])];
  const name = files[i] ? files[i].name : 'Bestand';
  files.splice(i,1);
  upd(openId, { files });
  renderFiles();
  renderList();
  showToast(name + ' verwijderd');
}

function addFiles(list) {
  const e = entry(openId);
  const files = [...(e.files||[])];
  let n = 0;
  const readers = Array.from(list).map(f => new Promise(res => {
    const r = new FileReader();
    r.onload = ev => { files.push({ name:f.name, size:fmtSize(f.size), url:ev.target.result }); n++; res(); };
    r.readAsDataURL(f);
  }));
  Promise.all(readers).then(() => {
    upd(openId, { files });
    renderFiles();
    renderList();
    showToast(n + ' bestand' + (n!==1?'en':'') + ' toegevoegd');
    const inp = document.getElementById('file-inp');
    if (inp) inp.value = '';
  });
}

function saveNotes() {
  upd(openId, { notes: document.getElementById('notes-ta').value });
  showToast('Notities opgeslagen');
}

function goBack() {
  openId = null;
  document.getElementById('screen-map').classList.remove('active');
  document.getElementById('screen-overzicht').classList.add('active');
  renderList();
  window.scrollTo(0,0);
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

renderList();
</script>
</main>
</div>
</body>

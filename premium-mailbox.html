<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mailbox – Softora.nl</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0ede8; --crimson: #9b2355; --crimson-light: #c4346a;
  --text-dark: #1a1a2e; --text-mid: #555; --text-light: #999;
  --border: #e2ddd6; --card: #ffffff; --tag: #f5f0eb;
  --green: #16733c; --blue: #1a5f8a; --orange: #b45a00;
}
html, body { height: 100%; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text-dark); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* TOP BAR */
.topbar { height: 52px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
.topbar-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: 1px; color: var(--crimson); margin-right: 8px; }
.topbar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-light); }
.topbar-search { flex: 1; max-width: 400px; margin-left: auto; position: relative; }
.topbar-search input { width: 100%; padding: 7px 12px 7px 32px; border: 1px solid var(--border); border-radius: 4px; font-family: 'Barlow', sans-serif; font-size: 13px; background: var(--bg); color: var(--text-dark); outline: none; transition: border-color .15s; }
.topbar-search input:focus { border-color: var(--crimson); background: #fff; }
.topbar-search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: var(--text-light); pointer-events: none; }
.btn-compose { display: flex; align-items: center; gap: 7px; padding: 7px 16px; background: var(--crimson); color: #fff; border: none; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background .15s; white-space: nowrap; }
.btn-compose:hover { background: var(--crimson-light); }
.btn-compose svg { width: 13px; height: 13px; }

/* LAYOUT */
.layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.mail-sidebar { width: 190px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); padding: 16px 0; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.folder-item { display: flex; align-items: center; gap: 10px; padding: 8px 18px; font-size: 13px; font-weight: 500; color: var(--text-mid); cursor: pointer; transition: all .12s; border-radius: 0; position: relative; }
.folder-item:hover { background: var(--tag); color: var(--text-dark); }
.folder-item.active { color: var(--crimson); background: rgba(155,35,85,.06); font-weight: 600; }
.folder-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--crimson); border-radius:0 2px 2px 0; }
.folder-icon { width: 15px; height: 15px; opacity: .6; flex-shrink: 0; }
.folder-item.active .folder-icon { opacity: 1; }
.folder-badge { margin-left: auto; background: var(--crimson); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.folder-divider { height: 1px; background: var(--border); margin: 8px 16px; }
.folder-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-light); padding: 10px 18px 4px; }

/* MAIL LIST */
.mail-list { width: 310px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--card); }
.mail-list-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--tag); }
.mail-list-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-light); }
.mail-list-count { font-size: 11px; color: var(--text-light); }
.mail-items { flex: 1; overflow-y: auto; }
.mail-item { padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; position: relative; }
.mail-item:hover { background: var(--tag); }
.mail-item.active { background: rgba(155,35,85,.05); border-left: 3px solid var(--crimson); }
.mail-item.unread .mail-from { font-weight: 700; color: var(--text-dark); }
.mail-item.unread .mail-subject { font-weight: 600; color: var(--text-dark); }
.unread-dot { position: absolute; left: 5px; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; background: var(--crimson); border-radius: 50%; }
.mail-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.mail-from { font-size: 13px; font-weight: 500; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.mail-time { font-size: 11px; color: var(--text-light); white-space: nowrap; }
.mail-subject { font-size: 12px; color: var(--text-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.mail-preview { font-size: 11px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mail-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.mail-tag { font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; }
.tag-offerte { background: rgba(26,95,138,.1); color: var(--blue); }
.tag-factuur { background: rgba(22,115,60,.1); color: var(--green); }
.tag-klant { background: rgba(155,35,85,.1); color: var(--crimson); }
.tag-urgent { background: rgba(192,57,43,.1); color: #c0392b; }
.tag-info { background: rgba(180,90,0,.1); color: var(--orange); }

/* MAIL DETAIL */
.mail-detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-light); }
.detail-empty svg { width: 40px; height: 40px; opacity: .25; }
.detail-empty p { font-size: 13px; }

.detail-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 18px 24px 16px; flex-shrink: 0; }
.detail-subject { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: .5px; margin-bottom: 10px; }
.detail-meta { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.detail-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
.detail-from-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }
.detail-from { font-size: 13px; font-weight: 600; color: var(--text-dark); }
.detail-email { font-size: 11px; color: var(--text-light); }
.detail-date { font-size: 11px; color: var(--text-light); white-space: nowrap; }
.detail-actions { display: flex; gap: 6px; }
.btn-action { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-mid); cursor: pointer; transition: all .15s; }
.btn-action:hover { border-color: var(--crimson); color: var(--crimson); }
.btn-action svg { width: 12px; height: 12px; }
.btn-action.primary { background: var(--crimson); color: #fff; border-color: var(--crimson); }
.btn-action.primary:hover { background: var(--crimson-light); border-color: var(--crimson-light); }

.detail-body { flex: 1; overflow-y: auto; padding: 24px; }
.detail-body-text { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 24px; font-size: 14px; line-height: 1.8; color: var(--text-dark); white-space: pre-wrap; }

/* COMPOSE MODAL */
.compose-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 50; display: none; align-items: flex-end; justify-content: flex-end; padding: 24px; }
.compose-overlay.open { display: flex; }
.compose-box { width: 520px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,.18); display: flex; flex-direction: column; overflow: hidden; animation: slideup .2s ease; }
@keyframes slideup { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none} }
.compose-head { padding: 12px 16px; background: var(--text-dark); color: #fff; display: flex; align-items: center; justify-content: space-between; }
.compose-head-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.compose-x { background: none; border: none; color: rgba(255,255,255,.6); cursor: pointer; font-size: 18px; line-height: 1; padding: 0; transition: color .15s; }
.compose-x:hover { color: #fff; }
.compose-field { display: flex; align-items: center; border-bottom: 1px solid var(--border); }
.compose-field-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-light); padding: 10px 14px; width: 60px; flex-shrink: 0; }
.compose-field input { flex: 1; padding: 10px 12px; border: none; font-family: 'Barlow', sans-serif; font-size: 13px; color: var(--text-dark); outline: none; background: transparent; }
.compose-body { padding: 0; }
.compose-body textarea { width: 100%; min-height: 200px; padding: 14px; border: none; font-family: 'Barlow', sans-serif; font-size: 13px; color: var(--text-dark); resize: none; outline: none; background: transparent; line-height: 1.6; }
.compose-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.btn-send { padding: 8px 20px; background: var(--crimson); color: #fff; border: none; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background .15s; }
.btn-send:hover { background: var(--crimson-light); }
.btn-discard { padding: 8px 14px; background: none; color: var(--text-light); border: 1px solid var(--border); border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .15s; }
.btn-discard:hover { color: var(--red); border-color: var(--red); }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--text-dark); color: #fff; padding: 10px 18px; border-radius: 5px; font-size: 13px; opacity: 0; transition: all .25s; pointer-events: none; z-index: 99; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<div class="toast" id="toast"></div>

let activeFolder = 'inbox';
let activeMail = null;
let filteredMails = [];

function setFolder(folder, el) {
  activeFolder = folder;
  activeMail = null;
  document.querySelectorAll('.folder-item').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  const labels = { inbox:'Inbox', starred:'Gemarkeerd', sent:'Verzonden', drafts:'Concepten', spam:'Spam', trash:'Prullenbak', offerte:'Offertes', factuur:'Facturen', klant:'Klanten' };
  document.getElementById('folder-label').textContent = labels[folder] || folder;
  document.getElementById('mail-detail').innerHTML = `<div class="detail-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg><p>Selecteer een e-mail om te lezen</p></div>`;
  renderList();
}

function getMailsForFolder(folder) {
  if (['offerte','factuur','klant'].includes(folder)) return mails.filter(m => m.tags.includes(folder));
  if (folder === 'starred') return mails.filter(m => m.starred);
  return mails.filter(m => m.folder === folder);
}

function filterMails() { renderList(); }

function renderList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  let list = getMailsForFolder(activeFolder);
  if (q) list = list.filter(m => m.from.toLowerCase().includes(q) || m.subject.toLowerCase().includes(q) || m.preview.toLowerCase().includes(q));
  filteredMails = list;
  document.getElementById('mail-count').textContent = list.length + ' mail' + (list.length !== 1 ? 's' : '');

  const wrap = document.getElementById('mail-items');
  if (!list.length) { wrap.innerHTML = `<div style="padding:40px;text-align:center;font-size:13px;color:var(--text-light)">Geen e-mails gevonden.</div>`; return; }

  wrap.innerHTML = list.map(m => `
    <div class="mail-item ${m.unread ? 'unread' : ''} ${activeMail === m.id ? 'active' : ''}" onclick="openMail(${m.id})">
      ${m.unread ? '<div class="unread-dot"></div>' : ''}
      <div class="mail-item-top">
        <div class="mail-from">${m.from}</div>
        <div class="mail-time">${m.time}</div>
      </div>
      <div class="mail-subject">${m.subject}</div>
      <div class="mail-preview">${m.preview}</div>
      ${m.tags.length ? `<div class="mail-tags">${m.tags.map(t => `<span class="mail-tag tag-${t}">${t}</span>`).join('')}</div>` : ''}
    </div>`).join('');

  const unread = mails.filter(m => m.folder === 'inbox' && m.unread).length;
  const badge = document.getElementById('badge-inbox');
  badge.textContent = unread;
  badge.style.display = unread ? 'flex' : 'none';
}

function openMail(id) {
  const m = mails.find(m => m.id === id);
  if (!m) return;
  activeMail = id;
  m.unread = false;
  renderList();

  document.getElementById('mail-detail').innerHTML = `
    <div class="detail-header">
      <div class="detail-subject">${m.subject}</div>
      <div class="detail-meta">
        <div class="detail-from-wrap">
          <div class="detail-avatar" style="background:${getColor(m.from)}">${initials(m.from)}</div>
          <div>
            <div class="detail-from">${m.from}</div>
            <div class="detail-email">${m.email}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <div class="detail-date">${m.date} · ${m.time}</div>
          <div class="detail-actions">
            <button class="btn-action" onclick="toggleStar(${m.id})">
              <svg viewBox="0 0 24 24" fill="${m.starred ? '#9b2355' : 'none'}" stroke="${m.starred ? '#9b2355' : 'currentColor'}" stroke-width="1.8" width="12" height="12"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              ${m.starred ? 'Gemarkeerd' : 'Markeren'}
            </button>
            <button class="btn-action" onclick="replyMail('${m.email}', '${m.subject}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>
              Beantwoorden
            </button>
            <button class="btn-action" onclick="deleteMail(${m.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>
              Verwijderen
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-body-text">${m.body}</div>
    </div>`;
}

function toggleStar(id) {
  const m = mails.find(m => m.id === id);
  if (!m) return;
  m.starred = !m.starred;
  openMail(id);
  renderList();
}

function deleteMail(id) {
  const m = mails.find(m => m.id === id);
  if (!m) return;
  m.folder = 'trash';
  activeMail = null;
  document.getElementById('mail-detail').innerHTML = `<div class="detail-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg><p>Selecteer een e-mail om te lezen</p></div>`;
  renderList();
  toast('Mail verplaatst naar prullenbak');
}

function replyMail(email, subject) {
  document.getElementById('c-to').value = email;
  document.getElementById('c-subject').value = 'Re: ' + subject;
  openCompose();
}

function openCompose() { document.getElementById('compose-overlay').classList.add('open'); }
function closeCompose() {
  document.getElementById('compose-overlay').classList.remove('open');
  ['c-to','c-subject','c-body'].forEach(id => document.getElementById(id).value = '');
}

function sendMail() {
  const to = document.getElementById('c-to').value.trim();
  const subject = document.getElementById('c-subject').value.trim();
  if (!to || !subject) { toast('Vul ontvanger en onderwerp in'); return; }
  mails.push({ id: Date.now(), folder:'sent', from:'Jij (Softora.nl)', email:'info@softora.nl', subject, preview: document.getElementById('c-body').value.slice(0,80)+'…', body: document.getElementById('c-body').value, time:'Zojuist', date:'Vandaag', unread:false, starred:false, tags:[] });
  closeCompose();
  toast('✓ Mail verzonden');
}

function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('compose-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('compose-overlay')) closeCompose();
});

renderList();
</script>
</body>
</html>

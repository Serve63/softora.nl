<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maandelijkse Kosten – Softora.nl</title>
<link rel="stylesheet" href="/assets/iphone-optimizations.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/personnel-theme.css?v=20260401-3">
<script>
  (function () {
    document.documentElement.setAttribute("data-personnel-loading", "true");
    try {
      document.documentElement.setAttribute("data-theme-mode", "light");
      document.documentElement.setAttribute("data-theme", "light");
    } catch (_) {
      /* ignore */
    }
  })();
</script>
<script src="assets/personnel-theme.js?v=20260402-4" defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0ede8;
  --crimson: #9b2355;
  --crimson-light: #c4346a;
  --text-dark: #1a1a2e;
  --text-mid: #555;
  --text-light: #999;
  --border: #e2ddd6;
  --card: #ffffff;
  --tag: #f5f0eb;
  --red: #c0392b;
  --green: #16733c;
}
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
}
.dashboard-layout {
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: 320px;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  z-index: 100;
}
.main-content {
  margin-left: 320px;
  width: calc(100% - 320px);
  min-height: 100vh;
  padding: 48px;
}
.page-shell {
  width: min(1260px, 100%);
}

.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 36px;
  gap: 16px;
}
.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 1px;
  color: var(--crimson);
  margin-bottom: 6px;
}
.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.page-sub { font-size: 13px; color: var(--text-light); margin-top: 3px; }

.totals-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.totaal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 22px;
}
.totaal-card.accent { border-color: var(--crimson); border-width: 2px; }
.totaal-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 8px;
}
.totaal-amount {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 34px;
  font-weight: 800;
  color: var(--text-dark);
}
.totaal-amount.red { color: var(--red); }
.totaal-amount.green { color: var(--green); }
.totaal-note { font-size: 11px; color: var(--text-light); margin-top: 4px; }

.category {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 16px;
}
.category-header {
  padding: 13px 20px;
  background: var(--tag);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.category-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dark);
  display: flex;
  align-items: center;
  gap: 10px;
}
.category-total {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--text-dark);
}

.cost-row {
  display: grid;
  grid-template-columns: 1fr 120px 110px 90px;
  align-items: center;
  gap: 0;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.cost-row:last-child { border-bottom: none; }
.cost-row:hover { background: var(--tag); }
.cost-row.head {
  padding: 7px 20px;
  background: var(--tag);
  border-bottom: 1px solid var(--border);
}
.cost-row.head span {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-light);
}

.cost-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
.cost-note { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.cost-freq { font-size: 11px; color: var(--text-light); }
.cost-amount { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--text-dark); }
.cost-status { justify-self: end; }
.status-pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
}
.pill-active { background: rgba(22,115,60,.1); color: var(--green); }
.pill-pause { background: rgba(180,90,0,.1); color: #b45a00; }
.pill-yearly { background: rgba(155,35,85,.1); color: var(--crimson); }

.add-row {
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px dashed var(--border);
}
.add-inputs {
  display: grid;
  grid-template-columns: 1fr 120px 110px 90px;
  gap: 8px;
  flex: 1;
}
.add-inputs input, .add-inputs select {
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  color: var(--text-dark);
  background: var(--bg);
  outline: none;
  width: 100%;
  transition: border-color .15s;
}
.add-inputs input:focus,
.add-inputs select:focus { border-color: var(--crimson); background: #fff; }
.btn-add {
  padding: 7px 14px;
  background: var(--crimson);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-add:hover { background: var(--crimson-light); }

.btn-del {
  width: 22px;
  height: 22px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .15s;
  padding: 0;
}
.btn-del:hover { color: var(--red); }
.btn-del svg { width: 13px; height: 13px; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--text-dark);
  color: #fff;
  padding: 10px 16px;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transform: translateY(8px);
  transition: all .25s;
  pointer-events: none;
  z-index: 99;
}
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 1100px) {
  .sidebar {
    position: static;
    width: 100%;
    height: auto;
  }
  .main-content {
    margin-left: 0;
    width: 100%;
    padding: 24px;
  }
  .totals-row {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 860px) {
  .header {
    flex-direction: column;
    align-items: flex-start;
  }
  .cost-row,
  .add-inputs {
    grid-template-columns: 1fr;
  }
  .cost-status {
    justify-self: start;
  }
  .add-row {
    flex-direction: column;
    align-items: stretch;
  }
}
</style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar"></aside>
  <main class="main-content">
    <div class="page-shell">
      <div class="header">
        <div>
          <div class="logo">SOFTORA.NL</div>
          <div class="page-title">Maandelijkse Kosten</div>
          <div class="page-sub">Overzicht van alle vaste lasten</div>
        </div>
        <div style="font-size:12px;color:var(--text-light)" id="last-updated"></div>
      </div>

      <div class="totals-row">
        <div class="totaal-card accent">
          <div class="totaal-label">Totaal per maand</div>
          <div class="totaal-amount red" id="totaal-maand">€0,00</div>
          <div class="totaal-note">Alle actieve kosten</div>
        </div>
        <div class="totaal-card">
          <div class="totaal-label">Per jaar (schatting)</div>
          <div class="totaal-amount" id="totaal-jaar">€0,00</div>
          <div class="totaal-note">Maandbedrag × 12</div>
        </div>
        <div class="totaal-card">
          <div class="totaal-label">Aantal posten</div>
          <div class="totaal-amount" id="totaal-posten">0</div>
          <div class="totaal-note">Actieve kostenposten</div>
        </div>
      </div>

      <div id="categories-wrap"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let data = {
  'Hosting & Domeinen': [
    { id:1, naam:'Hostinger VPS', note:'Webhosting server', freq:'maandelijks', bedrag:9.99, status:'active' },
    { id:2, naam:'softora.nl domein', note:'Jaarlijkse verlenging', freq:'jaarlijks', bedrag:1.25, status:'yearly' },
    { id:3, naam:'TransIP backup', note:'Extra opslag', freq:'maandelijks', bedrag:3.00, status:'active' },
  ],
  'Software & Tools': [
    { id:4, naam:'Adobe Creative Cloud', note:'Photoshop, Illustrator', freq:'maandelijks', bedrag:59.99, status:'active' },
    { id:5, naam:'ChatGPT Plus', note:'AI assistent', freq:'maandelijks', bedrag:20.00, status:'active' },
    { id:6, naam:'Figma Pro', note:'Design tool', freq:'maandelijks', bedrag:15.00, status:'active' },
    { id:7, naam:'Notion', note:'Project management', freq:'maandelijks', bedrag:8.00, status:'pause' },
  ],
  'Marketing & SEO': [
    { id:8, naam:'Google Workspace', note:'Gmail, Drive, Docs', freq:'maandelijks', bedrag:6.00, status:'active' },
    { id:9, naam:'Ubersuggest', note:'SEO tool', freq:'maandelijks', bedrag:12.00, status:'active' },
  ],
  'Overig': [
    { id:10, naam:'Boekhoudpakket', note:'Administratie software', freq:'maandelijks', bedrag:18.00, status:'active' },
  ],
};
let nextId = 20;

const freqLabel = { maandelijks:'Maandelijks', jaarlijks:'Jaarlijks', kwartaal:'Per kwartaal' };
const statusLabel = { active:'Actief', pause:'Gepauzeerd', yearly:'Jaarlijks' };
const statusClass = { active:'pill-active', pause:'pill-pause', yearly:'pill-yearly' };

function catKey(cat) {
  return String(cat).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function toMonthly(item) {
  if (item.status === 'pause') return 0;
  if (item.freq === 'jaarlijks') return item.bedrag;
  if (item.freq === 'kwartaal') return item.bedrag / 3;
  return item.bedrag;
}

function fmtEur(n) {
  return '€' + n.toLocaleString('nl-NL', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function updateTotals() {
  let total = 0;
  let count = 0;
  Object.values(data).flat().forEach((item) => {
    total += toMonthly(item);
    if (item.status !== 'pause') count++;
  });
  document.getElementById('totaal-maand').textContent = fmtEur(total);
  document.getElementById('totaal-jaar').textContent = fmtEur(total * 12);
  document.getElementById('totaal-posten').textContent = count;
}

function render() {
  const wrap = document.getElementById('categories-wrap');
  wrap.innerHTML = '';

  Object.entries(data).forEach(([cat, items]) => {
    const catTotal = items.reduce((s, i) => s + toMonthly(i), 0);
    const key = catKey(cat);
    const block = document.createElement('div');
    block.className = 'category';
    block.innerHTML = `
      <div class="category-header">
        <div class="category-title">${cat}</div>
        <div class="category-total">${fmtEur(catTotal)}<span style="font-size:11px;font-weight:400;color:var(--text-light);margin-left:4px">/mnd</span></div>
      </div>
      <div class="cost-row head">
        <span>Post</span><span>Frequentie</span><span>Bedrag</span><span style="text-align:right">Status</span>
      </div>
      <div id="rows-${key}">
        ${items.map((item) => `
          <div class="cost-row" id="item-${item.id}">
            <div>
              <div class="cost-name">${item.naam}</div>
              <div class="cost-note">${item.note}</div>
            </div>
            <div class="cost-freq">${freqLabel[item.freq]}</div>
            <div class="cost-amount">${fmtEur(item.bedrag)}</div>
            <div class="cost-status" style="display:flex;align-items:center;justify-content:flex-end;gap:8px">
              <span class="status-pill ${statusClass[item.status]}">${statusLabel[item.status]}</span>
              <button class="btn-del" onclick="deleteItem(${JSON.stringify(cat)},${item.id})" title="Verwijderen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              </button>
            </div>
          </div>`).join('')}
      </div>
      <div class="add-row">
        <div class="add-inputs">
          <input type="text" placeholder="Naam" id="new-naam-${key}">
          <select id="new-freq-${key}">
            <option value="maandelijks">Maandelijks</option>
            <option value="jaarlijks">Jaarlijks</option>
            <option value="kwartaal">Per kwartaal</option>
          </select>
          <input type="number" placeholder="Bedrag" step="0.01" min="0" id="new-bedrag-${key}">
          <select id="new-status-${key}">
            <option value="active">Actief</option>
            <option value="pause">Gepauzeerd</option>
            <option value="yearly">Jaarlijks</option>
          </select>
        </div>
        <button class="btn-add" onclick="addItem(${JSON.stringify(cat)})">+ Toevoegen</button>
      </div>`;
    wrap.appendChild(block);
  });

  updateTotals();
}

function addItem(cat) {
  const key = catKey(cat);
  const naam = document.getElementById(`new-naam-${key}`).value.trim();
  const freq = document.getElementById(`new-freq-${key}`).value;
  const bedrag = parseFloat(document.getElementById(`new-bedrag-${key}`).value);
  const status = document.getElementById(`new-status-${key}`).value;
  if (!naam || isNaN(bedrag) || bedrag <= 0) return showToast('Vul naam en bedrag in');
  data[cat].push({ id: nextId++, naam, note: '', freq, bedrag, status });
  render();
  showToast('✓ ' + naam + ' toegevoegd');
}

function deleteItem(cat, id) {
  data[cat] = data[cat].filter((i) => i.id !== id);
  render();
  showToast('✓ Post verwijderd');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

const now = new Date();
document.getElementById('last-updated').textContent =
  'Bijgewerkt: ' + now.toLocaleDateString('nl-NL', { day:'numeric', month:'long', year:'numeric' });

render();
</script>
</body>
</html>

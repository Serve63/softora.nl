<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softora | Maandelijkse kosten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/personnel-theme.css">
    <script>
        (function () {
            document.documentElement.setAttribute("data-personnel-loading", "true");
            try {
                localStorage.setItem("softora_premium_personnel_theme_mode", "light");
                localStorage.setItem("softora_premium_public_theme_mode", "light");
                document.documentElement.setAttribute("data-theme-mode", "light");
                document.documentElement.setAttribute("data-theme", "light");
            } catch (error) {
                /* ignore storage errors */
            }
        })();
    </script>
    <script src="assets/personnel-theme.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: var(--bg-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 320px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            margin-left: 320px;
            width: calc(100% - 320px);
            min-height: 100vh;
            padding: clamp(1.2rem, 2.4vw, 2rem);
        }

        .costs-shell {
            width: min(1280px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 1rem;
        }

        .costs-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
        }

        .costs-title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.45rem, 3vw, 3.2rem);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            line-height: 1;
        }

        .costs-subtitle {
            margin-top: 0.4rem;
            color: var(--text-secondary);
            font-size: 1.02rem;
        }

        .add-row-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-primary);
            font-family: 'Oswald', sans-serif;
            font-size: 1.02rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 12px;
            padding: 0.7rem 1.05rem;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease;
            white-space: nowrap;
        }

        .add-row-btn:hover {
            border-color: rgba(143, 35, 96, 0.35);
            background: rgba(143, 35, 96, 0.05);
        }

        .costs-table-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 14px 40px rgba(20, 18, 34, 0.05);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
            width: 100%;
        }

        .costs-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
        }

        .costs-table thead th {
            font-family: 'Oswald', sans-serif;
            font-size: 0.88rem;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            text-align: left;
            padding: 1rem 1rem 0.8rem;
            border-bottom: 1px solid var(--border);
            background: rgba(248, 248, 251, 0.88);
            white-space: nowrap;
        }

        .costs-table tbody td {
            padding: 0.55rem 1rem;
            border-bottom: 1px solid rgba(180, 182, 195, 0.32);
            vertical-align: middle;
        }

        .costs-table tbody tr:last-child td {
            border-bottom: 0;
        }

        .cost-input {
            width: 100%;
            min-height: 45px;
            padding: 0.7rem 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 1rem;
            color: var(--text-primary);
            background: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .cost-input:focus {
            border-color: rgba(143, 35, 96, 0.42);
            box-shadow: 0 0 0 3px rgba(143, 35, 96, 0.1);
        }

        .remove-row-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: #8f2360;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .remove-row-btn:hover {
            border-color: rgba(143, 35, 96, 0.4);
            background: rgba(143, 35, 96, 0.08);
        }

        .table-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            padding: 0.95rem 1rem 1rem;
            border-top: 1px solid var(--border);
            background: rgba(248, 248, 251, 0.7);
        }

        .total-monthly {
            margin-left: auto;
            display: inline-flex;
            align-items: baseline;
            gap: 0.55rem;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.93rem;
            color: var(--text-secondary);
        }

        .total-monthly strong {
            color: var(--text-primary);
            font-size: 1.4rem;
            letter-spacing: 0.02em;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 1rem;
            }

            .costs-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .table-footer {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <section class="costs-shell">
                <header class="costs-head">
                    <div>
                        <h1 class="costs-title">Maandelijkse kosten</h1>
                        <p class="costs-subtitle">Vul hier je producten en vaste maandelijkse kosten in rijen in.</p>
                    </div>
                    <button id="addRowTop" class="add-row-btn" type="button">+ Regel toevoegen</button>
                </header>

                <article class="costs-table-card">
                    <div class="table-scroll">
                        <table class="costs-table" aria-label="Maandelijkse kosten overzicht">
                            <thead>
                                <tr>
                                    <th style="width: 30%">Product / dienst</th>
                                    <th style="width: 22%">Categorie</th>
                                    <th style="width: 18%">Kosten p/m (EUR)</th>
                                    <th style="width: 25%">Notitie</th>
                                    <th style="width: 5%"></th>
                                </tr>
                            </thead>
                            <tbody id="monthlyCostsRows"></tbody>
                        </table>
                    </div>
                    <footer class="table-footer">
                        <button id="addRowBottom" class="add-row-btn" type="button">+ Regel toevoegen</button>
                        <div class="total-monthly">
                            <span>Totaal per maand</span>
                            <strong id="monthlyTotal">EUR 0,00</strong>
                        </div>
                    </footer>
                </article>
            </section>
        </main>
    </div>

    <script>
        (function () {
            const storageKey = 'softora_premium_monthly_cost_rows_v1';
            const tbody = document.getElementById('monthlyCostsRows');
            const totalEl = document.getElementById('monthlyTotal');
            const addRowTop = document.getElementById('addRowTop');
            const addRowBottom = document.getElementById('addRowBottom');

            if (!tbody || !totalEl || !addRowTop || !addRowBottom) return;

            const euroFormatter = new Intl.NumberFormat('nl-NL', {
                style: 'currency',
                currency: 'EUR',
            });

            function newRow(overrides) {
                const input = overrides && typeof overrides === 'object' ? overrides : {};
                return {
                    id: String(input.id || ('row_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9))),
                    product: String(input.product || ''),
                    category: String(input.category || ''),
                    amount: String(input.amount || ''),
                    note: String(input.note || ''),
                };
            }

            function loadRows() {
                try {
                    const raw = localStorage.getItem(storageKey);
                    if (!raw) return [newRow()];
                    const parsed = JSON.parse(raw);
                    if (!Array.isArray(parsed)) return [newRow()];
                    const cleaned = parsed
                        .filter(function (row) { return row && typeof row === 'object'; })
                        .map(function (row) { return newRow(row); })
                        .slice(0, 200);
                    return cleaned.length ? cleaned : [newRow()];
                } catch (error) {
                    return [newRow()];
                }
            }

            let rows = loadRows();
            let saveTimer = 0;

            function saveRows() {
                try {
                    localStorage.setItem(storageKey, JSON.stringify(rows));
                } catch (error) {
                    /* ignore storage errors */
                }
            }

            function scheduleSave() {
                window.clearTimeout(saveTimer);
                saveTimer = window.setTimeout(saveRows, 240);
            }

            function normalizeAmount(value) {
                const normalized = String(value || '')
                    .replace(/\s+/g, '')
                    .replace(',', '.')
                    .replace(/[^0-9.-]/g, '');
                const parsed = Number.parseFloat(normalized);
                if (!Number.isFinite(parsed)) return 0;
                return Math.max(parsed, 0);
            }

            function buildInput(field, value, placeholder) {
                const input = document.createElement('input');
                input.className = 'cost-input';
                input.type = 'text';
                input.dataset.field = field;
                input.value = value;
                input.placeholder = placeholder;
                input.autocomplete = 'off';
                return input;
            }

            function render() {
                tbody.innerHTML = '';

                rows.forEach(function (row) {
                    const tr = document.createElement('tr');
                    tr.dataset.rowId = row.id;

                    const productCell = document.createElement('td');
                    productCell.appendChild(buildInput('product', row.product, 'Bijv. Retell AI licentie'));
                    tr.appendChild(productCell);

                    const categoryCell = document.createElement('td');
                    categoryCell.appendChild(buildInput('category', row.category, 'Bijv. Software'));
                    tr.appendChild(categoryCell);

                    const amountCell = document.createElement('td');
                    amountCell.appendChild(buildInput('amount', row.amount, '0,00'));
                    tr.appendChild(amountCell);

                    const noteCell = document.createElement('td');
                    noteCell.appendChild(buildInput('note', row.note, 'Optioneel'));
                    tr.appendChild(noteCell);

                    const removeCell = document.createElement('td');
                    const removeButton = document.createElement('button');
                    removeButton.type = 'button';
                    removeButton.className = 'remove-row-btn';
                    removeButton.textContent = 'X';
                    removeButton.dataset.removeRow = row.id;
                    removeButton.setAttribute('aria-label', 'Verwijder regel');
                    removeCell.appendChild(removeButton);
                    tr.appendChild(removeCell);

                    tbody.appendChild(tr);
                });

                const total = rows.reduce(function (sum, row) {
                    return sum + normalizeAmount(row.amount);
                }, 0);
                totalEl.textContent = euroFormatter.format(total);
            }

            function addRow() {
                rows.push(newRow());
                render();
                scheduleSave();
                const lastProductInput = tbody.querySelector('tr:last-child input[data-field="product"]');
                if (lastProductInput) lastProductInput.focus();
            }

            async function removeRow(rowId) {
                if (!rowId) return;

                let approved = true;
                if (window.SoftoraDialog && typeof window.SoftoraDialog.confirm === 'function') {
                    approved = await window.SoftoraDialog.confirm('Weet je zeker dat je deze kostenregel wilt verwijderen?', {
                        title: 'Regel verwijderen',
                        confirmText: 'Verwijderen',
                        cancelText: 'Annuleren',
                    });
                }
                if (!approved) return;

                rows = rows.filter(function (row) {
                    return row.id !== rowId;
                });

                if (!rows.length) {
                    rows = [newRow()];
                }

                render();
                scheduleSave();
            }

            tbody.addEventListener('input', function (event) {
                const target = event.target;
                if (!(target instanceof HTMLInputElement)) return;

                const field = String(target.dataset.field || '');
                if (!field) return;

                const rowElement = target.closest('tr[data-row-id]');
                const rowId = rowElement ? String(rowElement.dataset.rowId || '') : '';
                if (!rowId) return;

                const row = rows.find(function (item) {
                    return item.id === rowId;
                });
                if (!row) return;

                row[field] = target.value;
                const total = rows.reduce(function (sum, item) {
                    return sum + normalizeAmount(item.amount);
                }, 0);
                totalEl.textContent = euroFormatter.format(total);
                scheduleSave();
            });

            tbody.addEventListener('click', function (event) {
                const target = event.target;
                if (!(target instanceof Element)) return;
                const btn = target.closest('[data-remove-row]');
                if (!btn) return;
                event.preventDefault();
                const rowId = String(btn.getAttribute('data-remove-row') || '');
                removeRow(rowId);
            });

            addRowTop.addEventListener('click', function () {
                addRow();
            });

            addRowBottom.addEventListener('click', function () {
                addRow();
            });

            window.addEventListener('beforeunload', function () {
                window.clearTimeout(saveTimer);
                saveRows();
            });

            render();
        })();
    </script>
</body>
</html>

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      production-security:
        dependency-type: production
        update-types:
          - patch
          - minor
    labels:
      - dependencies
      - security

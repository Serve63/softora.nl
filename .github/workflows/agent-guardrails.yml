name: Agent Guardrails

on:
  workflow_dispatch:

jobs:
  agent-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check agent guardrails
        run: npm run check:guardrails

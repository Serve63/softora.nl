name: Repo Hygiene

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repository hygiene
        run: bash scripts/check-repo-hygiene.sh

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/assets/iphone-optimizations.css">
<title>Softora | Kladblok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/personnel-theme.css">
    <script>
        (function () {
            document.documentElement.setAttribute("data-personnel-loading", "true");
            try {
                document.documentElement.setAttribute("data-theme-mode", "light");
                document.documentElement.setAttribute("data-theme", "light");
            } catch (error) {
                /* ignore storage errors */
            }
        })();
    </script>
    <script src="assets/personnel-theme.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: var(--bg-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 320px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            margin-left: 320px;
            width: calc(100% - 320px);
            min-height: 100vh;
            padding: clamp(1.2rem, 2.4vw, 2rem);
        }

        .notepad-shell {
            width: min(1160px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 1rem;
        }

        .notepad-title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.45rem, 3vw, 3.2rem);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            line-height: 1;
        }

        .notepad-subtitle {
            margin-top: 0.35rem;
            font-size: 1.02rem;
            color: var(--text-secondary);
        }

        .editor-sheet {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 14px 40px rgba(20, 18, 34, 0.05);
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 8rem);
            padding: 1rem 1.1rem 1.2rem;
        }

        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            padding: 0.25rem 0.25rem 0.85rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.85rem;
        }

        .editor-toolbar h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
        }

        .notepad-editor {
            flex: 1;
            width: 100%;
            min-height: 540px;
            padding: 0.45rem;
            outline: none;
            border: 0;
            background: transparent;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            cursor: text;
        }

        .notepad-editor:empty::before {
            content: attr(data-placeholder);
            color: var(--text-tertiary);
        }

        @media (max-width: 900px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 1rem;
            }

            .editor-sheet {
                min-height: 76vh;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <section class="notepad-shell">
                <header>
                    <h1 class="notepad-title">Kladblok</h1>
                    <p class="notepad-subtitle">Typ hier je losse notities.</p>
                </header>

                <article class="editor-sheet">
                    <div class="editor-toolbar">
                        <h2>Notities</h2>
                    </div>
                    <div
                        id="notepadEditor"
                        class="notepad-editor"
                        contenteditable="true"
                        spellcheck="true"
                        data-placeholder="Typ hier je notities..."
                        aria-label="Kladblok notities"
                    ></div>
                </article>
            </section>
        </main>
    </div>

    <script>
        (function () {
            const REMOTE_SCOPE = 'premium_notepad';
            const REMOTE_KEY = 'softora_premium_notepad_html_v1';
            const editor = document.getElementById('notepadEditor');
            if (!editor) return;

            async function fetchUiStateGet(scope) {
                const encodedScope = encodeURIComponent(String(scope || ''));
                const urls = [
                    `/api/ui-state-get?scope=${encodedScope}`,
                    `/api/ui-state/${encodedScope}`
                ];
                let lastError = null;

                for (const url of urls) {
                    try {
                        const res = await fetch(url, { method: 'GET', cache: 'no-store' });
                        if (!res.ok) throw new Error(`UI-state GET mislukt (${res.status})`);
                        return await res.json().catch(function () { return {}; });
                    } catch (error) {
                        lastError = error;
                    }
                }

                throw lastError || new Error('UI-state GET mislukt');
            }

            async function fetchUiStateSet(scope, body) {
                const encodedScope = encodeURIComponent(String(scope || ''));
                const urls = [
                    `/api/ui-state-set?scope=${encodedScope}`,
                    `/api/ui-state/${encodedScope}`
                ];
                let lastError = null;

                for (const url of urls) {
                    try {
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body || {})
                        });
                        if (!res.ok) throw new Error(`UI-state POST mislukt (${res.status})`);
                        return await res.json().catch(function () { return {}; });
                    } catch (error) {
                        lastError = error;
                    }
                }

                throw lastError || new Error('UI-state POST mislukt');
            }

            async function loadInitialValue() {
                try {
                    const state = await fetchUiStateGet(REMOTE_SCOPE);
                    const html = String(state && state.values && state.values[REMOTE_KEY] || '');
                    if (html) editor.innerHTML = html;
                } catch (error) {
                    console.error('Kladblok laden via Supabase mislukt:', error);
                }
            }

            async function save() {
                try {
                    await fetchUiStateSet(REMOTE_SCOPE, {
                        patch: {
                            [REMOTE_KEY]: editor.innerHTML
                        },
                        source: 'premium-kladblok',
                        actor: 'browser'
                    });
                } catch (error) {
                    console.error('Kladblok opslaan via Supabase mislukt:', error);
                }
            }

            let saveTimer = 0;
            editor.addEventListener('input', function () {
                window.clearTimeout(saveTimer);
                saveTimer = window.setTimeout(function () {
                    void save();
                }, 240);
            });

            window.addEventListener('beforeunload', function () {
                window.clearTimeout(saveTimer);
                void save();
            });

            void loadInitialValue();
        })();
    </script>
</body>
</html>
